body:
  text: 大戴禮記卷第五曾子制言上第五十四曾子曰夫行也者行禮之謂也夫禮貴者敬焉老者孝焉幼者慈焉少者友焉賤者惠焉此禮也行之則行也立之則義也今之所謂行者犯其上危其下衡道而強立之天下無道故若天下有道則有司之所求也故君子不貴興道之士而貴有恥之士也若由富貴興道者與貧賤吾恐其或失也若由貧賤興道者與富貴吾恐其羸驕也夫有恥之士富而不以道則恥之貧而不以道則恥之弟子無曰不我知也鄙夫鄙婦相會于牆陰可謂密矣明日則或揚其言矣故士執仁與義而不聞行之未篤故也胡為其莫之聞也殺六畜不當及親吾信之矣使民不時失國吾信之矣蓬生麻中不扶自直白沙在泥與之皆黑是故人之相與也譬如舟車然相濟達也己先則援之彼先則推之是故人非人不濟馬非馬不走土非土不高水非水不流君子之為弟也行則為人負無席則寢其趾使之為夫人則否近市無賈在田無野行無據旅苟若此則夫杖可因篤焉富以苟不如貧以譽生以辱不如死以榮辱可避避之而已矣及其不可避也君子視死若歸父母之讎不與同生兄弟之讎不與聚國朋友之讎不與聚鄉族人之讎不與聚鄰良賈深藏如虛君子有盛教如無弟子問於曾子曰夫士何如則可以為達矣曾子曰不能則學疑則問欲行則比賢雖有險道循行達矣今之弟子病下人不知事賢恥不知而又不問欲作則其知不足是以惑暗惑暗終其世而已矣是謂窮民也曾子門弟子或將之晉曰吾無知焉曾子曰何必然往矣有知焉謂之友無知焉謂之主且夫君子執仁立志先行後言千里之外皆為兄弟苟是之不為則雖汝親庸孰能親汝乎曾子制言中第五十五曾子曰君子進則能達退則能靜豈貴其能達哉貴其有功也豈貴其能靜哉貴其能守也夫唯進之何功退之何守是故君子進退有二觀焉故君子進則能益上之譽而損下之憂不得志不安貴位不博厚祿負耜而行道凍餓而守仁則君子之義也其功守之義有知之則願也莫之知苟吾自知也吾不仁其人雖獨也吾弗親也故君子不假貴而取寵不比譽而取食直行而取禮比説而取友有説我則願也莫我説苟吾自説也故君子無悒悒於貧無勿勿於賤無憚憚於不聞布衣不完蔬食不飽蓬戶穴牖日孜孜上仁知我吾無欣欣不知我吾無悒悒是以君子直言直行不宛言而取富不屈行而取位畏之見逐智之見殺固不難詘身而為不仁宛言而為不智則君子弗為也君子雖言不受必忠曰道雖行不受必忠曰仁雖諫不受必忠曰智天下無道循道而行衡塗而僨手足不掩四支不被詩云行有死人尚或墐之則此非士之罪也有土者之羞也是故君子以仁為尊天下之為富何為富則仁為富也天下之為貴何為貴則仁為貴也昔者舜匹夫也土地之厚則得而有之人徒之衆則得而使之舜唯以仁得之也是故君子將説富貴必勉於仁也昔者伯夷叔齊死於溝澮之間其仁成名於天下夫二子者居河濟之間非有土地之厚貨粟之富也言為文章行為表綴於天下是故君子思仁義晝則忘食夜則忘寐日旦就業夕而自省以役其身亦可謂守業矣曾子制言下第五十六曾子曰天下有道則君子欣然以交同天下無道則衡言不革諸侯不聽則不干其土聽而不賢則不踐其朝是以君子不犯禁而入入境及郊問禁請命不避患而出危邑則秉德之士不讇矣故君子不讇富貴以為己説不乘貧賤以居己尊凡行不義則吾不事不仁則吾不長奉相仁義則吾與之聚群嚮爾寇盜則吾與慮國有道則突若入焉國無道則突若出焉如此之謂義夫有世義者哉曰仁者殆恭者不入慎者不見使正直者則邇於刑弗違則殆於罪是故君子錯在高山之上深澤之污聚橡栗藜藿而食之生耕稼以老十室之邑是故昔者禹見耕者五耦而式過十室之邑則下為秉德之士存焉曾子疾病第五十七曾子疾病曾元抑首曾華抱足曾子曰微乎吾無夫顏氏之言吾何以語汝哉然而君子之務盡有之矣夫華繁而實寡者天也言多而行寡者人也鷹隼以山為卑而曾巢其上魚鱉黿鼉以淵為淺而蹶穴其中卒其所以得之者餌也是故君子苟能無以利害義則辱何由至哉親戚不悅不敢外交近者不親不敢求遠小者不審不敢言大故人之生也百歲之中有疾病焉有老幼焉故君子思其不復者而先施焉親戚既歿雖欲孝誰為孝年既耆艾雖欲弟誰為弟故孝有不及弟有不時其此之謂與言不遠身言之主也行不遠身行之本也言有主行有本謂之有聞矣君子尊其所聞則高明矣行其所聞則廣大矣高明廣大不在於他在加之志而已矣與君子遊苾乎如入蘭芷之室久而不聞其香則與之化矣與小人遊膱乎如入鮑魚之次久而不聞其臭則與之化矣是故君子慎其所去就與君子遊如長日加益而不自知也與小人遊如履薄冰每履而下幾何而不陷乎哉吾不見好學盛而不衰者矣吾不見好教如食疾子矣吾不見日省而月考之其友者矣吾不見孜孜而與來而改者矣曾子天圓第五十八單居離問於曾子曰天員而地方者誠有之乎曾子曰離而聞之云乎單居離曰弟子不察此以敢問也曾子曰天之所生上首地之所生下首上首之謂員下首之謂方如誠天圓而地方則是四角之不掩也且來吾語汝參嘗聞之夫子曰天道曰圓地道曰方方曰幽而圓曰明明者吐氣者也是故外景幽者含氣者也是故內景故火日外景而金水內景吐氣者施而含氣者化是以陽施而陰化也陽之精氣曰神陰之精氣曰靈神靈者品物之本也而禮樂仁義之祖也而善否治亂所由興作也陰陽之氣各靜其所則靜矣偏則風俱則靁交則電亂則霧和則雨陽氣勝則散為雨露陰氣勝則凝為霜雪陽之專氣為雹陰之專氣為霰霰雹者一氣之化也毛蟲毛而後生羽蟲羽而後生毛羽之蟲陽氣之所生也介蟲介而後生鱗蟲鱗而後生介鱗之蟲陰氣之所生也唯人為倮胸而生也陰陽之精也毛蟲之精者曰麟羽蟲之精者曰鳳介蟲之精者曰龜鱗蟲之精者曰龍倮蟲之精者曰聖人龍非風不舉龜非火不兆此皆陰陽之際也茲四者所以役聖人之也是故聖人為天地主為山川主為鬼神主為宗廟主聖人慎守日月之數以察星辰之行以序四時之順逆謂之曆截十二管以宗八音之上下清濁謂之律也律居陰而治陽曆居陽而治陰律曆迭相治也其間不容髮聖人立五禮以為民望制五衰以別親疏和五聲之樂以導民氣合五味之調以察民情正五色之位成五穀之名序五牲之先後貴賤諸侯之祭牛羊豕曰太牢大夫之祭牲羊豕曰少牢士之祭牲特豕曰饋食無祿者稷饋稷饋者無尸無尸者厭也宗廟曰芻豢山川曰犧牷割列穰瘞是有五牲此之謂品物之本禮樂之祖善否治亂之所由興作也
