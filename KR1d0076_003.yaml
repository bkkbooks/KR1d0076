body:
  text: 大戴禮記卷第三保傅第四十八殷為天子三十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性非甚相遠也何殷周之君有道之長而秦無道之暴也其故可知也古之王者太子乃生固舉以禮使士負之有司齊夙端冕見之南郊見之于天也過闕則下過廟則趨孝子之道也故自為赤子時而教固以行矣昔者周成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅其德義師導之教順此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故孩提有識三公三少固明孝仁禮義以導習之也逐去邪人不使見惡行於是比選天下端士孝悌博聞有道術者以輔翼之使之與太子居處出入故太子乃生而目見正事聞正言行正道左右前後皆正人也夫習與正人居不能毋正也猶生長於齊不能不齊言也習與不正人居不能毋不正也猶生長於楚不能不楚言也故擇其所嗜必先受業乃得嘗之擇其所樂必先有習乃得為之孔子曰少成若天性習貫之為常此殷周之所以長有常道也及太子少長知好色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親疏有序如恩相及矣帝入南學上齒而貴信則長幼有差如民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不踰矣帝入太學承師問道退習而端於太傅太傅罰其不則而達其不及則德智長而治道得矣此五義者既成於上則百姓黎民化緝於下矣學成治就此殷周之所以長有道也及太子既冠成人免於保傅之嚴則有司過之史有徹膳之宰太子有過史必書之史之義不得不書過不書過則死過書而宰徹其膳夫膳宰之義不得不徹膳不徹膳則死於是有進善之旍有誹謗之木有敢諫之鼓瞽史誦詩工誦正諫大夫進諫士傳民語習與智長故切而不攘化與心成故中道若性是殷周之所以長有道也三代之禮天子春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親饋之所以明有孝也行中鸞和步中采茨趨中肆夏所以明有度也其於禽獸見其生不食其死聞其聲不嘗其肉故遠庖廚所以長恩且明有仁也食以禮徹以樂失度則史書之工誦之三公進而讀之宰夫減其膳是天子不得為非也明堂之位曰篤仁而好學多聞而道慎天子疑則問應而不窮者謂之道道者導天子以道者也常立於前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志也常立於左是太公也潔廉而切直匡過而諫邪者謂之弼弼者拂天子之過者也常立於右是召公也博聞強記接給而善對者謂之承承者承天子之遺忘者也常立於後是史佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事殷周之所以長久者其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所尚者告訐也固非貴禮義也所尚者刑罰也故趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故今日即位而明日射人忠諫者謂之誹謗深為之計者謂之訞誣其視殺人若艾草菅然豈胡亥之性惡哉彼其所以習導之者非其治故也鄙語曰不習為吏如視已成事又曰前車覆後車誡夫殷周之所以長久者其已事可知也然如不能從者是不法聖知也秦世之所以亟絶者其轍迹可見也然而不辟者是前車覆而後車必覆也夫存亡之敗治亂之機其要在是矣天下之命懸於太子太子之善在於早諭教與選左右心未疑而先教諭則化易成也夫開於道術知義理之指則教之功也若夫服習積貫則左右而已夫胡越之人生而同聲嗜欲不異及其長而成俗也絫數譯而不能相通行有雖死能不相為者教習然也故曰選左右早諭教最急夫教得而左右正左右正則太子正矣太子正而天下定矣書曰一人有慶萬民賴之此時務也天子不諭於先聖王之德不知國君畜民之道不見禮義之正不察應事之理不博古之典傳不間於威儀之數詩書禮樂無經學業不法凡是其屬太師之任也天子無恩於父母不惠於庶民無禮於太臣不中於制獄無經於百官不哀於喪不敬於祭不信於諸侯不誡於戎事不誠於賞罰不厚於德不強於行賜與侈於近臣鄰愛於疏遠卑賤不能懲忿窒欲不從大師之言凡是之屬太傅之任也天子處位不端受業不敬言語不序聲音不中律進退節度無禮升降揖讓無容周旋俯仰視瞻無儀安顧咳唾趨行不得色不比順隱琴瑟凡此其屬太保之任也天子宴業詭其學左右之習反其師答遠方諸侯不知文雅之辭應群臣左右不知已諾之正簡聞小誦不博不習凡此其屬少師之任也天子居處出入不以禮冠帶衣服不以制御器在側不以度縱美雜采不以章忿怒説喜不以義賦與集讓不以節凡此其屬少傅之任也天子宴私安如易樂而湛飲酒而醉食肉而飽飽而強飢而婪暑而喝寒而嗽寢而莫宥坐而莫侍行而莫先莫後天子自為開門戶取玩好自執器皿亟顧環面御器之不舉不藏凡此其屬少保之任也號呼歌謠聲音不中律宴樂雅誦送樂序凡此其屬詔工之任也不知日月之時節不知先王之諱與大國之忌不知風雨雷電之眚凡此其屬太史之任也易曰正其本萬物理失之毫釐差之千里故君子慎始也春秋之元詩之關雎禮之冠婚易之乾川皆慎始敬終云爾素誠繁成謹為子孫娶妻嫁女必擇孝悌世世有行義者如是則其子孫慈孝不敢淫暴黨無不善三族輔之故曰鳳凰生而有仁義之意虎狼生而有貪戾之心兩者不等各以其母嗚呼戒之哉無養乳虎將傷天下故曰素成胎教之道書之玉板藏之金匱置之宗廟以為後世戒青史氏之記曰古者胎教之道王后腹之七月而就宴室太史持銅而御戶左太宰持斗而御戶右比及三月者王后所求聲音非禮樂則太師縕瑟而稱不習所求滋味者非正味則太宰倚斗而言曰不敢以待王太子太子生而泣太師吹銅曰聲中某律太宰曰滋味上某然后卜名上無取於天下無取於墬中無取於名山通谷無拂於鄉俗是故君子名難知而易諱也此所以養恩之道也古者年八歲而入就小學學小藝焉履小節焉束髮而就大學學大藝焉履大節焉居則習禮文行則鳴珮玉升車則聞和鸞之聲是以非僻之心無自入也在衡為鸞在軾為和馬動而鸞鳴鸞鳴而和應聲曰和和則敬此御之節也上車以和鸞為節下車以珮玉為度上有雙衡下有雙璜衝牙玭珠以納其間琚瑀以雜之行以采茨趨以肆夏步環中規折還中矩進則揖之退則揚之然后玉鏘鳴也古之為路車也蓋圓以象天二十八橑以象列星軫方以象地三十輻以象月故仰則觀天文俯則察地理前視則睹鸞和之聲側聽則觀四時之運此車教之道也周后妃任成王於身立而不跛坐而不差獨處而不倨雖怒而不詈胎教之謂也成王生仁者養之孝者繈之四賢傍之成王有知而選太公為師周公為傅此前有與計而後有與慮也是以封泰山而禪梁甫朝諸侯而一天下由此觀之立左右不可不練也昔者禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵而夫差以見禽於越文公以晉國霸而厲公以見殺於匠黎之宮威王以齊強於天下而簡公以弒於檀臺穆公以秦顯名尊號而二世以刺於望夷之宮其所以君王者同而功迹不等者所任異也故成王處繈抱之中朝諸侯周公用事也武靈王五十而弒沙丘任李兌也齊桓公得管仲九合諸侯一匡天下爯為義王失管仲任豎刁狄牙身死不葬而為天下笑一人之身榮辱具施焉者在所任也故魏有公子無忌而削地復得趙得藺相如而秦兵不敢出安陵任周瞻而國人獨立楚有申包胥而昭王反復齊有田單襄王得其國由是觀之無賢佐俊仕而能成功立名安危繼絶者未之有也是以國不務大而務得民心佐不務多而務得賢臣得民心者民從之有賢佐者士歸之文王請除炮烙之刑而殷民從湯去張網者之三面而二垂至越王不頽舊冢而吳人服以其前為慎於人也故同聲則處異而相應意合則未見而相親賢者立於本朝而天下之豪相率而趨之也何以知其然也管仲者桓公之讎也鮑叔以為賢於己而進之桓公七十言而説乃聽遂使桓公除仇讎之心而委之國政焉桓公垂拱無事而朝諸侯鮑叔之力也管仲之所以北走桓公而無自危之心者同聲於鮑叔也衛靈公之時蘧伯玉賢而不用迷子瑕不肖而任事史鰌患之數言蘧伯玉賢而不聽病且死謂其子曰我即死治喪於北堂吾生不能進蘧伯玉而退迷子瑕是不能正君也生不能正君者死不當成禮而置尸於北堂於我足矣靈公往弔問其故其子以父言聞靈公造然失容曰吾失矣立召蘧伯玉而貴之召迷子瑕而退之徙喪於堂成禮而後去衛國以治史鰌之力也夫生則欲進賢而退不肖死且未止又以尸諫可謂忠而不衰矣紂殺王子比干而箕子被髮陽狂靈公殺泄冶而鄧元去陳以族從自是之後殷并於周陳亡於楚以其殺比干與泄冶而失箕子與鄧元也燕昭王得郭隗而鄒衍樂毅自齊魏至於是舉兵而攻齊棲閔王於莒燕支地計衆不與齊均也然如所以能申意至於此者由得士也故無常安之國無宜治之民得賢者安存失賢者危亡自古及今未有不然者也明鏡者所以察形也往古者所以知今也夫知惡古之危亡不務襲迹於其所以安存則未有以異於卻走而求及於前人也太公知之故興微子之後而封比干之墓夫聖人之於聖者之死尚如此其厚也況當世而生存者乎其不可失可知也
