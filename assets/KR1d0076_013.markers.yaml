  - {type: variant, offset: 60, length: 0, content: '', krp: 蹕𤣥端緇布冠及𤣥冠之服也玉繅曰始冠緇布之冠自諸侯下逹冠而弊之可二服皆}
  - {type: punctuation, offset: 61, content: ，, id: KR1d0076_CHANT_013-bkkpn13}
  - {type: 'tls:seg', offset: 61, content: '', id: KR1d0076_CHANT_013-1a.13}
  - {type: variant, offset: 61, length: 0, content: '', SBCK: 玄端緇布冠及玄冠之服也王藻曰始冠緇布之冠自諸侯逹官而弊之可二服皆鞸也古者田狩而食其肉衣其皮先以兩皮如鞸以蔽其前後及後丗聖人易之以布帛猶存其蔽前示不忘古尊祭服異其名曰鞸其制上廣一尺下廣二尺長三尺其徑五寸肩博二寸}
  - {type: page-break, offset: 61, content: '', id: KR1d0076_SBCK_013-1b}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 也古者田狩而食其肉衣其皮先以兩皮如鞸以蔽其前後及後世聖人易之以布帛猶存其皮前示不妄古尊祭服異其名曰芾其制上廣一尺下廣二尺長三尺其頸五寸肩革帶博二寸}
  - {type: variant, offset: 61, length: 0, content: '', krp: 也古者田狩而食其肉衣其皮先以兩皮如鞸以蔽其前後及後世聖人易之以布帛猶存其皮前示不妄古尊祭服異其名曰芾其制上廣一尺下廣二尺長三尺其頸五寸肩革帶博二寸}
