  - {type: variant, offset: 62, length: 0, content: '', WYG: 案王字篇内凡十九見曰王言者二曰明王者十六曰霸王者一程本朱本沈本竝訛作主劉本袁本髙安本昔者明王必盡知天下良士之名此一處未訛今據以訂正考鄭康成注坊記云大夫有臣者稱之曰主不言君避諸侯也韋昭注國語于魯語云大夫稱主妻亦如之于晉語云大夫妻稱主從夫稱也爾雅釋詁林烝天帝皇王后辟公侯君也主字不得列其間曲禮凡執主器注云主君也疏云禮大夫稱主今此言主上通天子諸侯下含大夫為君者故幷曰主蓋曲禮稱凡執主器概就為臣者言不遺其臣于大夫者今此篇陳明王所以王天下之道不得稱主明矣況霸王對舉謂霸者王者不可言霸王甚明王肅私定家語多勦襲此書仍作王言篇}
