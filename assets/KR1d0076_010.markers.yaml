  - {type: variant, offset: 177, length: 0, content: '', SBCK: 孔子射矍相之圃盖觀堵如者墻使公罔之䘮序􅀧楊觶而語公罔之裘楊觶而語曰㓜壯孝弟耆耋好禮不從流俗攸身以俟死者不在此位也蓋去者半處者半序􅀧又楊觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋勤有存者}
