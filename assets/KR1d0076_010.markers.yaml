  - {type: variant, offset: 2492, length: 0, content: '', WYG: 周禮司服職曰公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自絺冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服玉藻曰君命屈狄再命褘衣内司服職曰辨外内命婦之服鞠衣展衣緣衣素紗其于祭也君與夫人皆申其服祭統曰公衮冕立于阼夫人副褘立于東房是也臣及命婦助祭于君皆盡其服自祭于家咸降一等隂爵不敢申也雜記曰大夫冕而祭于公弁而祭于己士弁而祭于公冠而祭于己特牲饋食禮曰主婦纚笄宵衣立于房中是也然鄭氏頓貶公侯使一同𤣥冕以祭于己非其差也且諸侯專國禮樂車服王命有之何獨抑其服乎玉藻曰𤣥端以祭裨冕以朝孫炎云端當為冕𤣥冕祭服之下也其祭先君亦裨冕矣孫説為合下未即吉故略同爵弁也君命屈狄與再命褘衣者謂其夫為君則命其妻以屈狄加再等之命則上公夫人乃褘衣孫鄭等改鞠衣非也又云一命展衣者此則申子男臣妻之服耳言小國臣妻一命者亦展衣不命者則亦緣衣鄭𤣥又分公卿大夫及其妻為三等而升降其服經云孤絺冕卿大夫𤣥冕何為易之又命小國之卿及内子更同列國之卿孤絺冕與鞠衣錯易其次尤非宜也}
