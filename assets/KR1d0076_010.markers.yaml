  - {type: variant, offset: 2492, length: 0, content: '', SBCK: 周禮司服職曰公之服自衮冕而下如王之服自鷩冕而即如公之服子男之服自毳冕而下如侯伯之服孫之服自絺冕而下如子男之服大夫之服自玄冕而下如􅀌之服玉藻曰君命屈狄再命禕衣内司服職曰辨内外命婦之服鞠衣展衣縁衣素紗其於祭也君與夫人皆申其服祭統曰公衮冕立於阼夫人副禕立於東房是也臣及命婦助祭於君皆盡其服自祭於家咸降一等隂爵不致申也雜記曰大夫冕而祭於公卒而祭於巳士弁而祭於公冠而祭於巳特牲饋食禮曰主婦纚笄窅衣立於房中是也然鄭氏頓貶公侯使一同玄冕以祭於巳非其差也且諸侯專國禮樂車服王命有之何獨抑其服乎王藻曰玄端以祭禆冕以朝孫炎云端當爲冕玄冕祭服之下也其祭先君亦禆冕矣孫說爲合下未即告故略同爵弁也君命屈狄與再命禕衣者謂其夫爲君則命其妻以屈狄加再等之命則上公夫人乃禕衣孫鄭等改禕衣非也又六一命展衣者此則申子男臣妻之服耳言小國臣妻一命者亦展衣不命者則亦緣衣玄又分公􅀸大夫及其妻爲三等而升降其服經云􅀌絺冕􅀸大夫玄冠何爲易之又命小國之􅀸及内子更同列國之􅀸􅀌絺冕與鞠衣錯易其次尤非冝耶}
