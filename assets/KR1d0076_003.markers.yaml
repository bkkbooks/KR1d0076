  - {type: variant, offset: 2709, length: 0, content: '', SBCK: 二垂至湯常出田見野張網四靣祝曰自下上四方皆入吾網湯曰噫盡之矣乃去其三靣而祝曰欲左欲右不用命者乃入吾網諸侯聞之曰湯德至矣乃及禽獸於是朝啇者三十國二垂謂天地之際言通感處逺淮南子曰文王砥德修政}
