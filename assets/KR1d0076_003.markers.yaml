  - {type: variant, offset: 2578, length: 0, content: '', SBCK: 葬之爲言藏也管仲死􅁊公任豎刁狄牙使專國政􅁊公卒二子各欲立其所傅之公子而諸子並爭國乱無主􅁊公屍在􅇃積六十七日十二月乙亥其子無詭立乃棺赴焉五日辛巳夜殯至九月而後葬矣}
  - {type: variant, offset: 2578, length: 0, content: '', WYG: 葬之為言藏也管仲死桓公任豎刁狄牙使專國政桓公卒二子各欲立其所傅之公子而諸子竝爭國亂無主桓公屍在牀積六十七日十二月乙亥其子無詭立乃棺赴焉七日辛巳夜殯至九月而後𦵏矣}
