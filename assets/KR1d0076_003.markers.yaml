  - {type: variant, offset: 2397, length: 0, content: '', SBCK: 也白虎通曰王者易姓而起必升到太山報告之義天以高爲尊地以厚爲德故增太山之高以報天附梁甫之厚以報地明以成功事就有益於天地􅀂高者加高而廣者増厚矣尚書中􅀱曰昔者聖主功成道洽符出乃封太山禮緯曰刑法格藏丗作頌聲封於太山考績柴燎禪於梁甫尅石紀號英炳巍巍功平丗敎白虎通又曰王始起日月尚促德化未宣獄訟未息近不治逺不安故太平廵狩也案古授命之君太平然后行廵守封禪之事者諒有義也故管夷吾記凡封禪之君七十二家至於三代唯夏禹殷湯周成王而巳其封山之禮要於岱禪地之義別以云繹其故何也以岱宗東方之岳非所易者其於衆山可因義取尚敬白虎通以繹繹者爲無窮之意亭亭者爲德法審著凡封禪之禮固於􅁪霍及繼體之君獨言太山及受命者舉其始也封謂􅀒土石於太山之隂壇而祭天也禪謂除地於梁甫之隂爲墠以祭地也變墠爲禪神之}
  - {type: page-break, offset: 2397, content: '', id: KR1d0076_SBCK_003-11a}
  - {type: variant, offset: 2397, length: 0, content: '', WYG: 也白虎通曰王者易姓而起必升封泰山報告之義天以髙為尊地以厚為德故增泰山之髙以報天附梁甫之厚以報地明以成功事就有益于天地若髙者加髙而厚者增厚矣尚書中候曰昔者聖王功成道洽符出乃封泰山禮緯曰刑法格藏世作頌聲封于泰山考績柴燎禪于梁甫刻石紀號英炳巍巍功平世教白虎通又曰王始起日月尚促德化未宣獄訟未息近不治遠不安故太平巡狩也按古受命之君太平然後行巡狩封禪之事者諒有義也故管夷吾記凡封禪之君七十二家至于三代惟夏禹殷湯周成王而已其封山之禮要于岱禪地之禮别以云繹其故何也以岱宗東方之岳非所易者其于衆山可因義取尚故白虎通以繹繹者為無窮之意亭亭者為德法審著凡封禪之禮周于恒霍及繼體之君獨言泰山及受命者舉其始也封謂負土石于泰山之隂為壇而祭天也禪謂除地于梁甫之隂為墠以祭地也變墠為禪者神之}
