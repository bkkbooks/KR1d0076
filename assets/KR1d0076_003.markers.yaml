  - {type: variant, offset: 2630, length: 0, content: '', SBCK: 襄王閔王之子章也􅀄齊之敗楚使悼齒將兵救齊因相閔王悼齒遂殺閔王其子章變易姓名爲莒太史齒去莒中齊三臣相聚求閔王之子欲立之於是莒人共立法章爲襄王也以保莒城而布告齊國曰旣立在於莒也襄王五年而卒田單以即墨之師攻破燕迎襄王於莒入臨菑齊故地盡復屬齊封田單爲安平君}
  - {type: variant, offset: 2630, length: 0, content: '', WYG: 襄王閔王之子法章也初齊之敗楚使淖齒將兵救齊因相閔王淖齒遂殺閔王其子法章變易姓名為莒太史家庸齒去莒莒中齊亡臣相聚求閔王之子欲立之于是莒人共立法章是為襄王也以保莒城而布告齊國曰王既立在于莒也襄王五年而田單卒以即墨之師攻破燕迎襄王于莒入臨淄齊故地盡復屬齊封田單為安平君}
