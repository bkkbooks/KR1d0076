  - {type: variant, offset: 2330, length: 0, content: '', SBCK: 大任孕文王目不視惡色耳不聽淫聲口不起惡言故君子謂大任爲能胎教也古者婦人孕子之禮寢不側坐不邊䠤不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲誦詩道正事如此則形容端心平正才過人矣任子之時必愼所感感於善則善感於惡則惡也}
