  - {type: variant, offset: 2114, length: 0, content: '', SBCK: 小學謂庠門師庠門一作虎門保之學也大學王宮之東者束髮謂成童白虎通曰八歲入小學十五入太學是也此太子之禮尚書大傅曰公􅀸之太子大夫元氏嫡子年十三始入小學見小節而踐小義年二十入大學見大節而踐大義此王子入學之期也又曰十五年入小學十八入大學者謂諸子姓旣成者至十五入小學其早成者十八入大學内則曰十年出就外傅居􅀫於外學書計者謂公􅀸巳下教子於家也}
  - {type: variant, offset: 2114, length: 0, content: '', WYG: 外舎小學謂虎闈師保之學也案各本脱外舎二字今從永樂大典本補虎闈各本作庠門又于師字下保字上雜入庠門一作虎闈六字今訂刪大學王宫之東者束髪謂成童白虎通曰八嵗入小學十五入大學是也此太子之禮尚書大傳曰公卿之太子大夫元士嫡子年十三始入小學見小節而履小義二十而入大學見大節而踐大義此世子入學之期也又曰十五入小學十八入大學謂諸子性晚成者至十五入小學其早成者十八入大學内則曰十年出就外傅居宿于外學書計者謂公卿以下教子于家也}
