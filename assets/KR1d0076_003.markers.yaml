  - {type: variant, offset: 2482, length: 1, content: 宮, SBCK: 宫穆公秦伯任好也德公之少子宣公之季弟其孫孝公曰昔我穆公自岐之間修德行武東平晉乱以河爲界西覇戎翟地廣千里天子致伯諸侯畢賀顯名尊號謂此也望夷宫在長陵西北長平觀東臨涇水作之以望北夷二丗常夢白虎齧其左驂殺之心不樂乃問占夢者􅁲言涇水爲崇二丗就望夷之宫而祠焉趙高爲丞相二丗以天下兵寇之事而責之趙懼誅遂使其壻閻樂將士卒殺之望夷宫之名}
