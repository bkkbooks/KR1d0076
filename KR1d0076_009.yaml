body:
  text: 大戴禮記卷第九千乘第六十八公曰千乘之國受命於天子通其四疆教其書社脩其濯廟建其宗主設其四佐列其五官處其朝市為仁如何子曰不仁國不化公曰何如之謂仁子曰不淫於色子曰立妃設如太廟然乃中治中治不相陵不相陵斯庶嬪遧遧則事上靜靜斯潔信在中朝大夫必慎以恭出會謀事必敬以慎言長幼小大必中度此國家之所以崇也立子設宗社宗社先示威威明顯見辨爵集德是以母弟官子咸有臣志莫敢援於外大夫中婦私謁不行此所以使五官治執事政也夫政以教百姓百姓齊以嘉善故蠱佞不生此之謂良民國有道則民昌此國家之所以大遂也卿設如大門大門顯美小大尊卑中度開明閉幽內祿出災以順天道近者閑焉遠者稽焉君發禁宰而行之以時通于地散布于小理天之災祥地寶豐省及民共饗其祿共任其災此國家之所以和也國有四輔輔卿也卿設如四體毋易事毋假名毋重食凡事尚賢進能使知事爵不世能之不愆凡民戴名以能食力以時成以事立此所以使民讓也民咸孝弟而安讓此以怨省而亂不作也此國之所以長也下無用則國家富上有義則國家治長有禮則民不爭立有神則國家敬兼而愛之則民無怨心以為無命則民不偷昔者先王立此六者而樹之德此國家之所以茂也設其四佐而官之司徒典春以教民之不時不若不令成長幼老疾孤寡以時通于四疆有闔而不通有煩而不治則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發國功謀齋戒必敬會時必節日歷巫祝執伎以守官俟命而作祈王年禱民命及畜穀蜚征庶虞百草方春三月緩施生育動作百物於時有事享于皇祖皇考朝孤子八人以成春事司馬司夏以教士車甲凡士執伎論功脩四衛強股肱質射御才武聰慧治眾長卒所以為儀綴於國出可以為率誘於軍旅四方諸侯之遊士國中賢餘秀興閱焉方夏三月養長秀蕃庶物於時有事享于皇祖皇考爵士之有慶者七人以成夏事司寇司秋以聽獄訟治民之煩亂執權變民中凡民之不刑崩本以要間作起不敬以欺惑憧愚作於財賄六畜五穀曰盜誘居室家有君子曰義子女專曰𡝩飾五兵及木石曰賊以中情出小曰間大曰講利辤以亂屬曰讒以財投長曰貸凡犯天子之禁陳刑制辟以追國民之不率上教者夫是故一家三夫道行三人飲食哀樂平無獄方秋三月收歛以時於時有事嘗新于皇祖皇考食農夫九人以成秋事司空司冬以制度制地事準揆山林規表衍沃畜水行衰濯浸以節四時之事治地遠近以任民力以節民食太古食壯之食攻老之事公曰功事不少而餱糧不多乎子曰太古之民秀長以壽者食也在今之民羸醜以胔者事也太古無游民食節事時民各安其居樂其宮室服事信上上下交信地移民在今之世上治不平民治不和百姓不安其居不樂其宮老疾用財壯狡用力於茲民游薄事貪食於茲民憂古者殷書為成男成女名屬升于公門此以氣食得節作事得時勸有功夏服君事不及暍冬服君事不及凍是故年穀不成天之飢饉道無殣者在今之世男女屬散名不升于公門此以氣食不節作事不成天之飢饉於時委民不得以疾死是故立民之居必於中國之休地因寒暑之和六畜育焉五穀宜焉辨輕重制剛柔和五味以節食時事東辟之民曰夷精以僥至于大遠有不火食者矣南辟之民曰蠻信以朴至于大遠有不火食者矣西辟之民曰戎勁以剛至于大遠有不火食者矣北辟之民曰狄肥以戾至于大遠有不火食者矣及中國之民曰五方之民有安民和味咸有實用利器知通之信令之及量地度居邑有城郭立朝市地以度邑以度民以觀安危距封後利先慮久固依固可守為奧可久能節四時之事霜露時降方冬三月草木落庶虞藏五穀必入于倉於時有事蒸于皇祖皇考息國老六人以成冬事民咸知孤寡之必不末也咸知有大功之必進等也咸知用勞力之必以時息也推而內之水火入也弗之顧矣而況有強適在前有君長正之者乎公曰善哉四代第六十九公曰四代之政刑論其明者可以為法乎子曰何哉四代之政刑皆可法也公曰以我行之其可乎子曰否不可臣願君之立知而以觀聞也四代之政刑君若用之則緩急將有所不節不節君將約之約之卒將棄法棄法是無以為國家也公曰巧匠輔繩而斲胡為其棄法也子曰心未之度習未之狎此以數踰而棄法也夫規矩準繩鈞衡此昔者先王之所以為天下也小以及大近以知遠今日行之可以知古可以察今其此耶水火金木土穀此謂六府廢一不可進一不可民並用之今日行之可以知古可以察今其此耶昔夏商之未興也伯夷謂此二帝之眇公曰長國治民恒幹論政之大體以教民辨歷大道以時地性興民之陽德以教民事上服周室之典以順事天子脩政勤禮以交諸侯大節無廢小眇其後乎子曰否不可後也詩云東有開明於時雞三號以興庶虞動蜚征作嗇民執功百草咸淳地傾水流之是以天子盛服朝日于東堂以教敬示威于天下也是以祭祀昭有神明燕食昭有慈愛宗廟之事昭有義率禮朝廷昭有五官無廢甲冑之戒昭果毅以聽天子曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死昭哀哀愛無失節是以父慈子孝兄愛弟敬此昔先王之所先施於民也君而後此則為國家失本矣公曰善哉子察教我也子曰鄉也君之言善執國之節也君先眇而後善中備以君之言可以知古可以察今奐然而興民壹始公曰是非吾言也吾一聞於師也子吁焉其色曰嘻君行道矣公曰道耶子曰道也公曰吾未能知人未能取人子曰君何為不觀器視才公曰視可明乎子曰可以表儀公曰願學之子曰平原大藪瞻其草之高豊茂者必有怪鳥獸居之且草可財也如艾而夷之其地必宜五穀高山多林必有怪虎豹蕃孕焉深淵大川必有蛟龍焉民亦如之君察之此可以見器見才矣公曰吾猶未也子曰群然戚然頤然睪然踖然柱然抽然首然僉然湛然淵淵然淑淑然齊齊然節節然穆穆然皇皇然見才色修聲不視聞怪物怪命不改志舌不更氣君見之舉也得之取也有事事也事必與食食必與位無相越踰昔虞舜以天德嗣堯取相十有六人如此公曰嘻美哉子道廣矣曰由德徑徑吾恐惛而不能用也何以哉公曰請問圖德何尚子曰聖知之華也知仁之實也仁信之器也信義之重也義利之本也委利生孽公曰嘻言之至也道天地以民輔之聖人何尚子曰有天德有地德有人德此謂三德三德率行乃有陰陽陽曰德陰曰刑公曰善哉再聞此矣陽德何出子曰陽德出禮禮出刑刑出慮慮則節事於近而揚聲於遠公曰善哉載事何以子曰德以監位位以充局局以觀功功以養民民於此乎上公曰祿不可後乎子曰食為味味為氣氣為志發志為言發言定名名以出信信載義而行之祿不可後也公曰所謂民與天地相參者何謂也子曰天道以視地道以履人道以稽廢一曰失統恐不長饗國公愀然其色子曰君藏玉惟慎用之雖慎敬而勿愛民亦如之執事無貣五官有差喜無並愛卑無加尊淺無測深小無招大此謂樞機樞機賓薦不蒙昔舜徵薦此道於堯堯親用之不亂上下公曰請問民徵子曰無以為也難行公曰願學之幾必能子曰貪於味不讓妨於政願富不久妨於政慕寵假貴妨於政治民惡眾妨於政為父不慈妨於政為子不孝妨於政大縱耳目妨於政好色失志妨於政好見小利妨於政變徙無節撓弱不立妨於政剛毅犯神妨於政鬼神過節妨於政幼勿與眾克勿與比依勿與謀放勿與游徼勿與事臣聞之弗慶非事君也君聞之弗用以亂厥德臣將慶其簡者蓋人有可知者焉貌色聲眾有美焉必有美質在其中者矣貌色聲眾有惡焉必有惡質在其中者矣此者伯夷之所後出也子曰伯夷建國建政脩國脩政公曰善哉虞戴德第七十公曰昔有虞戴德何以深慮何及高舉安取子曰君以聞之唯丘無以更也君之聞如未成也黃帝慕脩之曰明法于天明開施教于民行此以上明于天化也物必起是故民命而弗改也公曰善哉以天教于民可以班乎子曰可哉雖可而弗由此以上知所以行斧鉞也父之於子天也君之於臣天也有子不事父有臣不事君是非反天而到行耶故有子不事父不順有臣不事君必刃順天作刑地生庶物是故聖人之教于民也率天如祖地能用民德是以高舉不過天深慮不過地質知而好仁能用民力此以三常之禮明而名不蹇禮失則壞名失則惛是故上古不諱正天名也天子之官四通正地事也天子御珽諸侯御荼大夫服笏正民德也歛此三者而一舉之戴天履地以順民事天子告朔於諸侯率天道而敬行之以示威於天下也諸侯內貢於天子率名斅地實也是以不至必誅諸侯相見卿為介以其教士畢行使仁守會朝于天子天子以歲二月為壇于東郊建五色設五兵具五味陳六律品奏五聲聽明教置離抗大侯規鵠堅物九卿佐三公三公佐天子天子踐位諸侯各以其屬就位乃升諸侯諸侯之教士教士執弓挾矢揖讓而升履物以射其心志端色容正時以斅伎時有慶以地不時有讓以地天下之有道也有天子存國之有道也君得其正家之不亂也有仁父存是故聖人之教于民也以其近而見者稽其遠而明者天事曰明地事曰昌人事曰樂比兩以慶違此三者謂之愚民愚民曰姦姦必誅是以天下平而國家治民亦無貸居小不約居大則治眾則集寡則繆祀則得福以征則服此唯官民之上德也公曰三代之相授必更制典物道乎子曰否猷德保保惛乎前以小繼大變民示也公曰善哉子之察教我也子曰丘於君唯無言言必盡於他人則否公曰教他人則如何子曰否丘則不能昔商老彭及仲傀政之教大夫官之教士技之教庶人揚則抑抑則揚綴以德行不任以言庶人以言猶以夏后氏之袝懷袍褐也行不越境公曰善哉我則問政子事教我子曰君問已參黃帝之制制之大禮也公曰先聖之道斯為美乎子曰斯為美雖有美者必偏屬於斯昭天之福迎之以祥作地之福制之以昌興民之德守之以長公曰善哉誥志第七十一公曰誥志無荒以會民義齋戒必敬會時必節犧牲必全齊盛必潔上下禋祀外內無失節其可以省怨遠災乎子曰丘未知其可以省怨也公曰然則何以事神子曰以禮會時夫民見其禮則上下援援則樂樂斯毋憂以此怨省而亂不作也夫禮會其四時四孟四季五牲五穀順至必時其節也丘未知其可以為遠災也公曰然則為此何以子曰知仁合則天地成天地成則庶物時庶物時則民財敬民財敬以時作時作則節事節事以動眾動眾則有極有極以使民則勸勸則有功有功則無怨無怨則嗣世久世久唯聖人是故政以勝眾非以陵眾眾以勝事非以傷事事以靖民非以徵民故地廣而民眾非以為災長之祿也丘聞周太史曰政不率天亦不由人則凡事易壞而難成虞史伯夷曰明孟也幽幼也明幽雌雄也雌雄迭興而順至正之統也日歸于西起明于東月歸于東起明于西虞夏之歷正建於孟春於時冰泮發蟄百草權輿瑞雉無釋物乃歲俱生于東以順四時卒于冬萬分於時雞三號平明載于青色撫十二月節卒于丑日月成歲曆再閏以順天道此謂歲虞汁月天曰作明曰與維天是戴地曰作昌曰與惟地是事人曰作樂曰與惟民是嬉民之動能不遠厥事民之悲色不遠厥德此謂表裏時合物之所生而蕃昌之道如此天生物地養物物備興而時用常節曰聖人主祭於天曰天子天子崩步于四川代于四山卒葬曰帝天作仁地作富人作治樂治不倦財富時節是故聖人嗣則治文王治以俟時湯治以伐亂禹治以移眾眾服以立天下堯貴以樂治時舉舜舜治以德使力在國統民如恕在家撫官而國安之勿變勸之勿沮民咸廢惡如進良上誘善而行罰百姓盡於仁而遂安之此古之明制之治天下也仁者為聖貴次力次美次射御次古之治天下者必聖人聖人有國則日月不食星辰不孛海不運河不滿溢川澤不竭山不崩解陵不施川浴不處深淵不涸於時龍至不閉鳳降忘翼鷙獸忘攫爪鳥忘距蜂蠆不螫嬰兒蟁蝱不食夭駒雒出服河出圖自上世以來莫不降仁國家之昌國家之臧信仁是故不賞不罰如民咸盡力車不建戈遠邇咸服胤使來往地賓畢極無怨無惡率惟懿德此無空禮無空名賢人並憂殘毒以時省舉良良舉善善恤民使仁日斅仁賓也
