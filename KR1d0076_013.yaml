body:
  text: 大戴禮記卷第十三公冠第八十公冠自為主迎賓揖升自阼立于席北既醴降自阼其餘自為主者其降也自西階以異其餘皆公同也公玄端以皮弁皆鞸朝服素鞸公冠四加玄冕饗之以三獻之禮無介無樂皆玄端其醻幣朱錦束四馬其慶也太子儗焉太子與庶子其冠皆自為主其禮與士同饗賓也皆同成王冠周公使祝雍祝王曰辭達而勿多也祝雍曰使王近於民遠於年嗇於時惠於財親賢使能陛下離顯先帝之光耀以承皇天嘉祿欽順仲夏之吉日遵並大道邠或秉集萬福之休靈始加昭明之元服推遠稚免之幼志崇積文武之寵德肅勤高祖之清廟六合之內靡不蒙惪陛下永永與天無極孝昭冠辭皇皇上天照臨下土集地之靈降甘風雨庶物群生各得其所靡今靡古維予一人某敬拜皇天之祜薄薄之土承天之神興甘風雨庶卉百穀莫不茂者既安且寧維予一人某敬拜下土之靈維某年某月上日明光于上下勤施于四方旁作穆穆惟予一人某敬拜迎于郊以正月朔日迎日於東郊本命第八十一分於道謂之命形於一謂之性化於陰陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人生而不具者五目無見不能食不能行不能言不能化三月而徹盷然後能有見八月生齒然後能食朞而生臏然後能行三年暿合然後能言十有六而精通然後能化陰窮反陽陽窮反陰是故陰以陽化陽以陰變故男以八月而生齒八歲而毀齒一陰一陽然後成道二八十六然後精通然後其施行女七月生齒七歲而毀二七十四然後其化成合於三也小節也中古男三十而娶女二十而嫁合於五也中節也太古男五十而室女三十而嫁備於三五合於八八也八者維剛也天地以發明故聖人以合陰陽之數也禮義者恩之主也冠婚朝聘喪祭賓主鄉飲酒軍旅此之謂九禮也禮經三百威儀三千机其文之變也其文變也禮之象五行也其義四時也故以四舉有恩有義有節有權其恩厚者其服重故為父斬衰三年以恩制者也門內之治恩掩義門外之治義斷恩資於事父以事君而敬同貴貴尊尊義之大者也故為君亦服斬衰三年以義制者也三日而食三月而沐朞而練毀不滅性不以死傷生喪不過三年苴衰不補墳墓不坯同於丘陵除之日鼓素琴示民有終也以節制者也資於事父以事母而愛同天無二日國無二君家無二尊以一治之也父在為母齊衰朞者見無二尊也百官備百制具不言而事行者扶而起言而後事行者杖而起身自執事而後事行者面詬而已凡此以權制者也始死三日不怠三月不解朞悲號三年憂恩之教也聖人因教以制節也男者任也子者孳也男子者言任天地之道如長萬物之義也故謂之丈夫丈者長也夫者扶也言長萬物也知可為者知不可為者知可言者知不可言者知可行者知不可行者是故審論而明其別謂之知所以正夫德者女者如也子者孳也女子者言如男子之教而長其義理者也故謂之婦人婦人伏於人也是故無專制之義有三從之道在家從父適人從夫夫死從子無所敢自遂也故令不出閨門事在饋食之間而已矣是故女日及乎閨門之內不百里而犇喪事無獨為行無獨成參知而後動可驗而後言宵夜行燭宮事必量六畜蕃于宮中謂之信也所以正婦德也女有五不取逆家子不取亂家子不取世有刑人不取世有惡疾不取喪婦長子不取逆家子者為其逆德也亂家子者為其亂人倫也世有刑人者為其棄於人也世有惡疾者為其棄於天也喪婦長子者為其無所受命也婦有七去不順父母去無子去淫去妬去有惡疾去口多言去竊盜去不順父母去為其逆德也無子為其絕世也淫為其亂族也妬為其亂家也有惡疾為其不可與共粢盛也口多言為其離親盜竊為其反義也婦有三不去有所取無所歸不去與更三年喪不去前貧賤後富貴不去大罪有五逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世誣鬼神者罪及二世殺人者罪止其身故大罪有五殺人為下易本命第八十二子曰夫易之生人禽獸萬物昆蟲各有以生或奇或偶或飛或行而莫知其情惟達道德者能原本之矣天一地二人三三三而九九九八十一一主日日數十日主人故人十月而生八九七十二偶以承奇奇主辰辰主月月主馬故馬十二月而生七九六十三三主斗斗主狗故狗三月而生六九五十四四主時時主豕故豕四月而生五九四十五五主音音主猨故猨五月而生四九三十六六主律律主禽鹿故禽鹿六月而生也三九二十七七主星星主虎故虎七月而生二九十八八主風風主蟲故蟲八日而化也其餘各以其類也鳥魚皆生于陰而屬於陽故鳥魚皆卵生魚游于水鳥飛于雲故冬鷰雀入于海化而為蚧萬物之性各異類故蠶食而不飲蟬飲而不食蜉蝣不飲不食介鱗夏食冬蟄齕吞者八竅而卵生咀𠻘者九竅而胎生四足者無羽翼戴角者無上齒無角者膏而無前齒有角者脂而無後齒晝生者類父夜生者類母至陰生牝至陽生牡凡地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡谿谷為牝蜯蛤龜珠與月盛虛是故堅土之人肥虛土之人大沙土之人細息土之人美耗土之人醜是故食水者善游能寒食土者無心而不息食木者多力而拂食草者善走而愚食桑者有絲而蛾食肉者勇敢而捍食穀者智惠而巧食氣者神明而壽不食者不死而神故曰有羽之蟲三百六十而鳳凰為之長有毛之蟲三百六十而麒麟為之長有甲之蟲三百六十而神龜為之長有鱗之蟲三百六十而蛟龍為之長倮之蟲三百六十而聖人為之長此乾坤之美類禽獸萬物之數也故帝王好壞巢破卵則鳳凰不翔焉好竭水搏魚則蛟龍不出焉好刳胎殺夭則麒麟不來焉好填谿塞谷則神龜不出焉故王者動必以道靜必以理動不以道靜不以理則自夭而不壽訞孽數起神靈不見風雨不時暴風水旱並興人民夭死五穀不滋六畜不蕃息
