body:
  text: 大戴禮記卷第二禮察第四十六孔子曰君子之道譬猶防與夫禮之塞亂之所從生也猶防之塞水之所從來也故以舊防為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患故婚姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣聘射之禮廢則諸侯之行惡而盈溢之敗起矣喪祭之禮廢則臣子之恩薄而倍死忘生之禮衆矣凡人之知能見已然不能見將然禮者禁於將然之前而法者禁於已然之後是故法之用易見而禮之所為生難知也若夫慶賞以勸善刑罰以懲惡先王執此之正堅如金石行此之信順如四時處此之功無私如天地爾豈顧不用哉然如曰禮云禮云者貴絶惡於未萌而起敬於微眇使民日徙善遠罪而不自知也孔子曰聽訟吾猶人也必也使無訟乎此之謂也為人主計者莫如安審取舍取舍之極定於內而安危之萌應於外也安者非一日而安也危者非一日而危也皆以積漸然不可不察也善不積不足以成名惡不積不足以滅身而人之所行各在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨倍禮義積而民和親故世主欲民之善同而所以使民之善者異或導之以德教或歐之以法令導之以德教者德教行而民康樂歐之以法令者法令極而民哀戚哀樂之感禍福之應也我以為秦王之欲尊宗廟而安子孫與湯武同然則如湯武能廣大其德久長其後行五百歲而不失秦王亦欲至是而不能持天下十餘年即大敗之此無他故也湯武之定取舍審而秦王之定取舍不審也易曰君子慎始差若毫釐繆以千里取舍之謂也然則為人主師傅者不可以日夜明此問為天下如何曰夫天下大器也今人之置器置諸安處則安置諸危處則危而天下之情與器無以異在天子之所置之爾湯武置天下於仁義禮樂而德澤洽禽獸草木廣育德被蠻貊四夷纍子孫十餘世歷年久五六百歲此天下之所共聞也秦王置天下於法令刑罰德澤無一有而怨毒盈世民憎惡之如仇讎禍幾及身子孫誅絶此天下之所共見也夫用仁義禮樂為天下者行五六百歲猶存用法令為天下者十餘年即亡是非其明斆大驗乎人之言曰聽言之道必以其事觀之則言者莫敢妄言今子或言禮義之不如法令教化之不如刑罰人主胡不承殷周秦事以觀之乎夏小正第四十七正月啓蟄言始發蟄也鴈北鄉先言鴈而後言鄉者何也見鴈而後數其鄉也鄉者何也鄉其居也鴈以北方為居何以謂之生且長焉爾九月遰鴻鴈先言遰而後言鴻鴈何也見遰而後數之則鴻鴈也何不謂南鄉也曰非其居也故不謂南鄉記鴻鴈之遰如不記其鄉何也曰鴻不必當小正之遰者也雉震詬詬也者鳴也震也者鼓其翼也正月必雷雷不必聞惟雉為必聞之何以謂之雷則雉震詬相識以雷魚陟負冰陟升也負冰云者言解蟄也農緯厥耒緯束也束其耒云爾者用是見君之亦有耒也初歲祭耒始用暢也其用初歲云爾暢也者終歲之用祭也言是月之始用之也初者始也或曰祭韭也囿有見韭囿也者園之藩者也時有俊風俊者大也大風南風也何大於南風也曰合冰必於南風解冰必於南風生必於南風收必於南風故大之也寒曰滌凍塗滌也者變也變而暖也凍塗也者凍下而澤上多也田鼠出田鼠者嗛鼠也記時也農率均田率者循也均田者始除田也言農夫急除田也獺獻祭魚其必與之獻何也曰非其類也祭也者得多也善其祭而後食之十月豺祭獸謂之祭獺祭魚謂之獻何也豺祭其類獺祭非其類故謂之獻大之也鷹則為鳩鷹也者其殺之時也鳩也者非其殺之時也善變而之仁也故其言之也曰則盡其辭也鳩為鷹變而之不仁也故不盡其辭也農及雪澤言雪澤之無高下也初服于公田古有公田焉言古者先服公田而後服其田也采藝為廟采也鞠則見鞠者何也星名也鞠則見者歲再見云爾初昏參中蓋記時也斗柄縣在下言斗柄者所以著參之中也柳稊稊也者發孚也梅杏杝桃則華杝桃山桃也緹縞縞也者莎隨也緹也者其實也先言緹而後言縞者何也緹先見者也何以謂之小正以著名也雞桴粥粥也者相粥之時也或曰桴嫗伏也粥養也二月往耰黍襌襌單也初俊羔助厥母粥俊也者大也粥也者養也言大羔能食草木而不食其母也羊蓋非其子而後養之善養而記之也或曰夏有煮祭祭也者用羔是時也不足喜樂喜羔之為生也而記之與羊牛腹時也綏多女士綏安也冠子取婦之時也丁亥萬用入學丁亥者吉日也萬也者干戚舞也入學也者大學也謂今時大舍采也祭鮪祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時榮堇菜也菜繁由胡繁由胡者繁母也繁旁勃也皆豆實也故記之昆小蟲抵蚳昆者衆也由魂魂也魂魂也者動也小蟲動也其先言動而後言蟲者何也萬物至是動而後著抵猶推也蚳蟻卵也為祭醢也取之則必推之推之不必取取必推而不言取來降燕乃睇燕乙也降者下也言來者何也莫能見其始出也故曰來降言乃睇何也睇者眄也眄者視可為室者也百鳥皆曰巢突穴取與之室何也摻泥而就家入人內也剝鱓以為鼓也有鳴倉庚倉庚者商庚也商庚者長股也榮藝時有見稊始收有見稊而後始收是小正序也小正之序時也皆若是也稊者所為豆實三月參則伏伏者非亡之辭也星無時而不見我有不見之時故曰伏云攝桑桑攝而記之急桑也委楊楊則苑而後記之䍷羊羊有相還之時其貌䍷䍷然記變爾或曰䍷羝也螜則鳴螜天螻也頒冰頒冰者分冰以授大夫也采識識草也妾子始蠶先妾而後子何也曰事有漸也言事自卑者始執養宮事執操也養長也祈麥實麥實者五穀之先見者故急祈而記之也越有小旱越于也記是時恆有小旱田鼠則為鴽鴽鵪也變而之善故盡其辭也鴽為鼠變而之不善故不盡其辭也拂桐芭拂也者拂也桐芭之時也或曰言桐芭始生貌拂拂然也鳴鳩言始相命也先鳴而後鳩何也鳴而後知其鳩也四月昴則見初昏南門正南門者星也歲再見一正蓋大正所取法也鳴札札者寧縣也鳴而後知之故先鳴而後札囿有見杏囿者山之藩者也鳴蜮蜮也者或曰屈造之屬也王萯莠取荼荼也者以為君薦蔣也莠幽越有大旱記時爾執陟攻駒執也者始執駒也執駒也者離之去母也執而升之君也攻駒也者教之服車數舍之也五月參則見參也者伐星也故盡其辭也浮遊有殷殷衆也浮遊殷之時也浮遊者渠略也朝生而暮死稱有何也有見也鴂則鳴鴂者百鷯也鳴者相命也其不辜之時也是善之故盡其辭也時有養日養長也一則在本一則在末故其記曰時有養日云也乃瓜乃者急瓜之辭也瓜也者始食瓜也良蜩鳴良蜩也者五采具匽之興五日翕望乃伏其不言生而稱興何也不知其生之時故曰興以其興也故言之興五日翕也望也者月之望也而伏云者不知其死也故謂之伏五日也者十五日也翕也者合也伏也者入而不見也啓灌藍蓼啓者別也陶而疏之也灌者聚生者也記時也鳩為鷹唐蜩鳴唐蜩者匽也初昏大火中種黍菽大火者心也心中種黍菽時也煮梅為豆實也蓄蘭為沐浴也菽糜以在經中又言之是何也時食矩關而記之頒馬分夫婦之駒也將間諸則或取離駒納之則法也六月初昏斗柄正在上五月大火中六月斗柄正在上用此見斗柄之不在當心也蓋當依依尾也煮桃桃也者杝桃也杝桃也者山桃也煮以為豆實也鷹始摯始摯而言之何也諱煞之辭也故言摯云七月莠雚葦未莠則不為雚葦莠然後為雚葦故先言莠狸子肇肆肇始也肆遂也言其始遂也其或曰肆殺也湟潦生蘋湟下處也有湟然後有潦有潦而後有蘋草也爽死爽也者猶疏也荓莠荓也者馬帚也漢案戶漢天漢也案戶也者直戶也言正南北也寒蟬鳴寒蟬也者蝭𧔉也初昏織女正東鄉時有霖雨灌荼灌聚也荼雚葦之莠為蔣楮之也雚未秀為菼葦未秀為蘆參中則旦斗柄縣在下八月剝瓜畜瓜之時也玄校玄也者黑也校也者若緑色然婦人未嫁者衣之剝棗剝也者取也粟零零也者降也零而後取之故不言剝也丹鳥羞白鳥丹鳥也者謂丹良也白鳥也者謂蚊蚋也其謂之鳥何也有翼者為鳥羞也者進也不盡食也重其養者也辰則伏辰也者房星也伏也者入而不見也鹿人從鹿人從者從群也鹿之養也離群而善之離而生非所知時也故記從不記離君子之居幽也不言或曰人從人從也者大者於外小者於內率之也鴽為鼠九月內火內火也者大火大火也者心也遰鴻鴈遰往也主夫出火主夫也者主以時縱火也陟玄鳥蟄陟升也玄鳥者燕也先言陟而後言蟄何也陟而後蟄也熊罷貊貉鼬鼪則穴若蟄而榮鞠鞠草也鞠榮而樹麥時之急也王始裘者何也衣裘之時也辰繫于日雀入于海為蛤蓋有矣非常入也十月豺祭獸善其祭而後食之也南門見南門者星名也及此再見矣黑鳥浴黑鳥者何也烏也浴也者飛乍高乍下也時有養夜養者長也若日之長也玄雉入于淮為蜄蜄者蒲蘆也織女正北鄉則旦織女星名也十有一月王狩狩者言王之時田冬獵為狩陳筋革陳筋革者省兵甲也嗇人不從不從者弗行於時月也萬物不通隕麋角隕墜也日冬至陽氣始動諸向生皆蒙蒙符矣故麋角隕記時焉爾十有二月鳴弋弋也者禽也先言鳴而後言弋者何也鳴而後知其弋也玄駒賁玄駒也者蟻也賁者何也走於地中也納卵蒜卵蒜也者本如卵者也納者何也納之君也虞人入梁虞人官也主設罔罟者也隕麋角蓋陽氣且暏也故記之也
