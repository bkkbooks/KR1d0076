body:
  text: 大戴禮記卷第八子張問入官第六十五子張問入官於孔子孔子曰安身取譽為難也子張曰安身取譽如何孔子曰有善勿專教不能勿搢已過勿發失言勿踦不善辭勿遂行事勿留君子入官自行此六路者則身安譽至而政從矣且夫忿數者獄之所由生也距諫者慮之所以塞也慢易者禮之所以失也墮怠者時之所以後也奢侈者財之所以不足也專者事之所以不成也歷者獄之所由生也君子入官除此七路者則身安譽至而政從矣故君子南面臨官大城而公治之精知而略行之合是忠信考是大倫存是美惡而進是利而除是害而無求其報焉而民情可得也故臨之無抗民之志勝之無犯民之言量之無狡民之辭養之無擾於時愛之勿寬於刑言此則身安譽至而民自得也故君子南面臨官所見邇故明不可弊也所求邇故不勞而得也所以治者約故不用衆而譽至也法象在內故法不遠而源泉不竭故天下積也而木不寡短長人得其量故治而不亂故六者貫乎心藏乎志形乎色發乎聲若此則身安而譽至而民自得也故君子南面臨官不治則亂至亂至則爭爭之至又反於亂是故寬裕以容其民慈愛以優柔之而民自得也已故躬行者政之始也調悅者情之道也善政行易則民不怨言調説和則民不辨法仁在身則民顯以佚之也財利之生徵矣貪以不得善政必簡矣苟以亂之善言必聽矣詳以失之規諫日至煩以不聽矣言之善者在所日聞行之善者在所能為故上者民之儀也有司執政民之表也邇臣便辟者群臣僕之倫也故儀不正則民失誓表弊則百姓亂邇臣便辟不正廉而群臣服汙矣故不可不慎乎三倫矣故君子修身反道察説而邇道之服存焉是故夫工女必自擇絲麻良工必自擇齎材賢君必自擇左右是故佚諸取人勞於治事勞於取人佚於治事故君子欲譽則謹其所便欲名則謹於左右故上者辟如緣木者務高而畏下者滋甚六馬之離必於四面之衢民之離道必於上之佚政也故上者尊嚴而危百姓者卑賤而神民而愛之則存惡之則亡也故君子南面臨官貴而不驕富而能恭有本能圖末修業居久而談情邇而暢乎遠察一而關于多一物治而萬物不亂者以身為本者也故君子蒞民不可以不知民之性達諸民之情既知其以生有習然後民特從命也故世舉則民親之政均則民無怨故君子蒞民不臨以高不道以遠不責民之所不能今臨之以明王之成功不因其情則民嚴而不迎也道以數年之業不因其力則民疾疾則辟矣故古者冕而前旒所以蔽明也統絖塞耳所以弇聰也故水至清則無魚人至察則無徒故枉而直之使自得之優而柔之使自求之揆而度之使自索之民有小罪必以其善以赦其過如死使之生其善也是以上下親而不離故惠者政之始也政不正則民不可教也不習則民不可使也故君子欲言之見信也者莫若先虛其內也欲政之速行也者莫若以身先之也欲民之速服也者莫若以道御之也故不先以身雖行必鄰也不以道御之雖服必強矣故非忠信則無可以取親於百姓矣外內不相應則無可以取信者矣四者治民之統也盛德第六十六聖王之盛德人民不疾六畜不疫五穀不災諸侯無兵而正小民無刑而治蠻夷懷服古者天子常以季冬考德以觀治亂得失凡德盛者治也德不盛者亂也德盛者得之也德不盛者失之也是故君子考德而天下之治亂得失可坐廟堂之上而知也德盛則修法德不盛則飾政法政而德不衰故曰王也凡人民疾六畜疫五穀災者生於天道不順天道不順生於明堂不飾故有天災則飾明堂也凡民之為姦邪竊盜靡法妄行者生於不足不足生於無度量也無度量則小者偷墮大者侈靡而不知足故有度量則民足民足則無為姦邪竊盜靡法妄行者故有姦邪竊盜靡法妄行之獄則飾度量也凡不孝生於不仁愛也不仁愛生於喪祭之禮不明喪祭之禮所以教仁愛也致仁愛故能致喪祭春秋祭祀之不絶致思慕之心也夫祭祀致饋養之道也死且思慕饋養況於生而存乎故曰喪祭之禮明則民孝矣故有不孝之獄則飾喪祭之禮凡弒上生於義不明義者所以等貴賤明尊卑貴賤有別尊卑有序民尊上敬長矣民尊上敬長而弒者寡有之也朝聘之禮所以明義也故有弒獄則飾朝聘之禮也凡鬭辨生於相侵陵也相侵陵生於長幼無序而遺敬讓鄉飲酒之禮者所以明長幼之序而教以敬讓也故有鬭辨之獄則飾鄉飲酒之禮也凡淫亂生於男女無別男女無別則夫婦無義婚禮享聘者所以別男女明夫婦之義也故有淫亂之獄則飾昏禮享聘也故曰刑罰之所從生有源不務塞其源而務刑殺之是謂為民設陷以賊之也刑罰之源生於嗜欲好惡不節故明堂天法也禮度德法也所以御民之嗜欲好惡以慎天法以成德法也刑罰者所以威不行德法者也故季冬聽獄論刑者所以正法也法正論吏公行之是故古者天子孟春論吏德行能理功能德法者為有德能行德法者為有行能理德法者為有能能成德法者為有功故論吏而法行事治而功成季冬正法孟春論吏治國之要也德法者御民之銜勒也吏者轡也刑者策也天子御者內史太史左右手也古者以德法為銜勒以官為轡以刑為策以人為手故御天下數百年而不懈墯善御馬者正銜勒齊轡策均馬力和馬心故口無聲手不搖策不用而馬為行也善御民者正其德法飭其官而均民力和民心故聽言不出於口刑不用而民治是以民德美之夫民善其德必稱其人故今之人稱五帝三王者依然若猶存者其法誠德其德誠厚夫民思其德必稱其人朝夕祝之升聞於皇天上帝歆焉故永其世而豐其年不能御民者棄其德法專用刑辟譬猶御馬棄其轡勒而專以策御馬馬必傷車必敗無德法而專以刑法御民民心走國必亡亡德法民心無所法循迷惑失道上必以為亂無道苟以為亂無道則刑罰必不克成其無道上下俱無道故今之稱惡者必比之於夏桀殷紂何也曰法誠不德其德誠薄夫民惡之必朝夕祝之升聞于皇天上帝不歆焉故水旱並興災害生焉故曰德法者御民之本也古之御政以治天下者冢宰之官以成道司徒之官以成德宗伯之官以成仁司馬之官以成聖司寇之官以成義司空之官以成禮故六官以為轡司會均入以為軜故御四馬執六轡御天地與人與事者亦有六政是故善御者正身同轡均馬力齊馬心惟其所引而之以取長道遠行可以之急疾可以御天地與人事此四者聖人之所乘也是故天子御者內史太史左右手也六官亦六轡也天子三公合以執六官均五政齊五法以御四者故亦惟其所引而之以之道則國治以之德則國安以之仁則國和以之聖則國平以之義則國成以之禮則國定此御政之體也過失也人情莫不有過過而改之是不過也是故官屬不理分職不明法政不一百事失紀曰亂也亂則飭冢宰地宜不殖財物不蕃萬民飢寒教訓失道風俗淫僻百姓流亡人民散敗曰危也危則飭司徒父子不親長幼無序君臣上下相乖曰不和也不和則飭宗伯賢能失官爵功勞失賞祿爵祿失則士卒疾怨兵弱不用曰不平也不平則飭司馬刑罰不中暴亂姦邪不勝曰不成也不成則飭司寇百度不審立事失理財物失量曰貧也貧則飭司空故曰御者同是車馬或以取千里或不及數百里者所進退緩急異也治者同是法或以治或以亂者亦所進退緩急異也明堂第六十七明堂者古有之也凡九室一室而有四戶八牖三十六戶七十二牖以茅蓋屋上圓下方明堂者所以明諸侯尊卑外水曰辟雍南蠻東夷北狄西戎明堂月令赤綴戶也白綴牖也二九四七五三六一八堂高三丈東西九筵南北七筵上圓下方九室十二堂室四戶戶二牖其宮方三百步在近郊近郊三十里或以為明堂者文王之廟也朱草日生一葉至十五日生十五葉十六日一葉落終而復始也周時德澤洽和蒿茂大以為宮柱名為蒿宮也此天子之路寢也不齊不居其屋待朝在南宮揖朝出其南門
