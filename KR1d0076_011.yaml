body:
  text: 大戴禮記卷第十一小辨第七十五公曰寡人欲學小辨以觀於政其可乎子曰否不可社稷之主愛日日不可得學不可以小辨是故昔者先王學齊大道以觀於政天子學樂辨風制禮以行政諸侯學禮辨官政以行事以尊事天子大夫學德別義矜行以事君士學順辨言致命以遂志庶人聽長辨禁農以行力如此猶恐不濟奈何其小辨乎公曰不辨則何以為政子曰辨而不小夫小辨破言小言破義小義破道道小不通通道必簡是故循弦以觀於樂足以辨風矣爾雅以觀於古足以辨言矣傳言以象反舌皆至可謂簡矣夫道不簡則不行不行則不樂夫亦固十祺之變由不可既也而況天下之言乎曰微子之言吾一樂辨言子曰辨言之樂不若治政之樂辨言之樂不下席治政之樂皇於四海夫政善則民説民説則歸之如流水親之如父母諸侯初入而後臣之安用辨言公曰然則吾何學而可子曰禮樂而力忠信其君其習可乎公曰多與我言忠信而不可以入患子曰毋乃既明忠信之備而口倦其君則不可而有明忠信之備而又能行之則可立待也君朝而行忠信百官承事忠滿於中而發於外刑於民而放於四海天下其孰能患之公曰請學忠信之備子曰唯社稷之主實知忠信若丘也綴學之徒安知忠信公曰非吾子問之而焉也子三辭將對公曰強避子曰強侍丘聞大道不隱丘言之君發之於朝行之於國一國之人莫不知何一之強辟丘聞之忠有九知知忠必知中知中必知恕知恕必知外知外必知德知德必知政知政必知官知官必知事知事必知患知患必知備若動而無備患而弗知死亡而弗知安與知忠信內思畢心曰知中中以應實曰知恕內恕外度曰知外外內參意曰知德德以柔政曰知政正義辨方曰知官官治物則曰知事事戒不虞曰知備毋患曰樂樂義曰終用兵第七十六公曰用兵者其由不祥乎子曰胡為其不祥也聖人之用兵也以禁殘止暴於天下也及後世貪者之用兵也以刈百姓危國家也公曰古之戎兵何世安起子曰傷害之生久矣與民皆生公曰蚩尤作兵與子曰否蚩尤庶人之貪者也𠬛利無義不顧厥親以喪厥身蚩尤惛欲而無猒者也何兵之能作蜂蠆挾螫而生見害而校以衛厥身者也人生有喜怒故兵之作與民皆生聖人利用而彌之亂人興之喪厥身詩云魚在在藻厥志在餌鮮民之生矣不如死之久矣校德不塞嗣武孫武子聖人愛百姓而憂海內及後世之人思其德必稱其仁故今之道堯舜禹湯文武者猶威致王今若存夫民思其德必稱其人朝夕祝之升聞皇天上神歆焉故永其世而豐其年也夏桀商紂羸暴於天下暴極不辜殺戮無罪不祥于天粒食之民布散厥親踈遠國老幼色是與而暴慢是親讒貸處穀法言法行處辟夭替天道逆亂四時禮樂不行而幼風是御曆失制攝提失方孟鄒無紀不告朔於諸侯玉瑞不行諸侯力政不朝於天子六蠻四夷交伐於中國於是降之災水旱臻焉霜雪大薄甘露不降百草蔫黃五穀不升民多夭疾六畜𩜘胔此大上之不論不議也夭傷厥身失墜天下夫天之報殃於無德者必與其民公懼焉曰在民上者可以無懼乎哉少間第七十七公曰今日少間我請言情於子子愀焉變色遷席而辭曰君不可以言情於臣臣請言情於君君則不可公曰師之而不言情焉其私不同子曰否臣事君而不言情於君則不臣君而不言情於臣則不君有臣而不臣猶可有君而不君民無所錯手足公曰吾度其上下咸通之權其輕重居之準民之色目既見之鼓民之聲耳既聞之動民之德心既和之通民之欲兼而一之愛民親賢而教不能民庶説乎子曰説則説矣可以為家不可以為國公曰可以為家胡為不可以為國國之民家之民也子曰國之民誠家之民也然其名異不可同也同名同食曰同等唯不同等民以知極故天子昭百神於天地之間以示威於天下也諸侯修禮於封內以事天子大夫修官守職以事其君士修四衛執技論力以聽乎大夫庶人仰視天文俯視地理力時使以聽乎父母此唯不同等民以可治也公曰善哉上與下不同乎子曰將以時同時不同上謂之間下謂之多疾君時同於民布政也民時同於君服聽也上下相報而終於施大猶已成發其小者遠猶已成發其近者將行重器先其輕者先清而後濁者天地也天政曰正地政曰生人政曰辨苟本正則華英必得其節以秀孚矣此官民之道也公曰善哉請少復進焉子曰昔堯取人以狀舜取人以色禹取人以言湯取人以聲文王取人以度此四代五王之取人以治天下如此公曰嘻善之不同也子曰何為其不同也公曰同乎子曰同公曰人狀可知乎子曰不可知也公曰五王取人各有以舉之胡為人之不可知也子曰五王取人比而視相而望五王取人各以己焉是以同狀公曰以子相人何如子曰否丘則不能五王取人丘也傳聞之以委於君丘則否能亦又不能公曰我聞子之言始蒙矣子曰由君居之成於純胡為其蒙也雖古之治天下者豈生於異州哉昔虞舜以天德嗣堯布功散德制禮朔方幽都來服南撫交趾出入日月莫不率俾西王母來獻其白琯粒食之民昭然明視民明教通于四海海外肅慎北發渠搜氐羌來服舜有禹代興禹卒受命乃遷邑姚姓于陳作物配天修德使力民明教通于四海海之外肅慎北發渠搜氐羌來服禹崩十有七世乃有末孫桀即位桀不率先王之明德乃荒耽于酒淫泆于樂德昏政亂作宮室高臺汙池土察以民為虐粒食之民惛焉幾亡乃有商履代興商履循禮法以觀天子天子不説則嫌於死成湯卒受天命不忍天下粒食之民刈戮不得以疾死故乃放移夏桀散亡其佐乃遷姒姓于杞發厥明德順民天心嗇地作物配天制典慈民咸合諸侯作八政命於總章服禹功以修舜緒為副于天粒食之民昭然明視民明教通于四海海之外肅慎北發渠搜氐羌來服成湯卒崩殷德小破二十有二世乃有武丁即位開先祖之府取其明法以為君臣上下之節殷民更眩近者説遠者至粒食之民昭然明視武丁卒崩殷德大破九世乃有末孫紂即位紂不率先王之明德乃上祖夏桀行荒耽于酒淫泆於樂德昏政亂作宮室高臺汙池土察以為民虐粒食之民忽然幾亡乃有周昌霸諸侯以佐之紂不説諸侯之聽於周昌則嫌於死乃退伐崇許魏以客事天子文王卒受天命作物配天制典慈民用行三明親親尚賢民明教通于四海海之外肅慎北發渠搜氐羌來服君其志焉或傒將至也公曰大哉子之教我政也列五王之德煩煩如繁諸乎子曰君無譽臣臣之言未盡請盡臣之言君如財之曰於此有功匠焉有利器焉有措扶焉以時令其藏必周密發如用之可以知古可以察今可以事親可以事君可用于生又用之死吉凶並興禍福相生卒反生福大德配天公愀然其色曰難立哉子曰臣願君之立知如以觀聞也時天之氣用地之財以生殺於民民之死不可以教公曰我行之其可乎子曰唯此在君君曰足臣恐其不足君曰不足舉其前必舉其後舉其左必舉其右君既教矣安能無善公吁焉其色曰大哉子之教我制也政之豐也如木之成也子曰君知未成言未盡也凡草木根鞁傷則枝葉必遍枯偏枯是為不實穀亦如之上失政大及小人畜穀公曰所謂失政者若夏商之謂乎子曰否若夏商者天奪之魄不生德焉公曰然則何以謂失政子曰所謂失政者疆蔞未虧人民未變鬼神未亡水土未絪糟者猶糟實者猶實玉者猶玉血者猶血酒者猶酒優以繼愖政出自家門此之謂失政也非天是反人是反臣故曰君無言情於臣君無假人器君無假人名公曰善哉
