front:
  text: 大戴禮記卷第七
  hash: sha256:0de9dbd8dab8ef9f9de9710f070991defcc79dc528db4963855cdbb5afd23924
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_006-10a}
body:
  text: 五帝德第六十二帝繫第六十三勸學第六十四五帝德第六十二宰我問於孔子曰昔者予聞諸榮伊令黃帝三百年請問黃帝者人邪抑非人邪何以至於三百年乎孔子曰予禹湯文武成王周公可勝觀邪夫黃帝尚矣女何以爲先生難言之宰我曰上丗之傳隱微之􅀃卒業之辨闇昏忽之意非君子之道也則予之問也固矣孔子曰黃帝少典之子也曰軒轅生而神靈弱而能言㓜而彗齊長而敦敏成而聦明治五氣設五量撫萬民度四方敎熊羆貔豹虎以與赤帝戰于版泉之野三戰然後得行其志黃帝黼黻衣大帶黼裳乗龍扆雲以順天地之紀幽明之故死生之􅀃存亡之難時播百榖􅋄木故敎化淳鳥獸昆䖝曆離日月星辰極畋土石金玉勞心力耳目節用水火材物生而民得其利百年死而民畏其神百年亡而民用其敎百年故曰三百年宰我請問帝顓頊孔子曰五帝用記三王用度女欲一日辨聞古昔之􅀃躁哉予也宰我曰昔者予也聞諸夫子曰小子無有􅀫問孔子曰顓頊黃帝之孫昌意之子也曰高陽洪淵以有謀䟽通而知事養材以任地履時以象天依􅀑神以制義治氣以敎民潔誠以祭祀乗龍而至四海北至于幽陵南至于交趾西濟于流沙東至于蟠木動靜之物大小之神日月所照莫不祗勵宰我曰請問帝嚳孔子曰􅀇􅅝之孫蟜極之子也曰高辛生而神靈自言其名博施利物不於其身聦以知逺明以察微順天之義知民之㥯仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之曆日月而迎送之明􅀑神而敬事之其色郁郁其德嶷嶷其動也時其服也士春夏乗龍秋冬乗馬黃黼黻衣執中而獲天下日月所照風􅀨所至莫不從順宰我曰請問帝堯孔子曰高辛之子也曰放勲其仁如天其知如神就之如日望之如雲冨而不驕貴而不豫黃黼黻衣丹車白馬伯夷主禮龍憂敎舞舉舜彭祖而任之四時先民治之流共工于幽州以變北狄放驩兠于崇山以變南蠻殺三苗于三危以變西戎殛鯀于羽山以變東夷其言不貳其德不回四海之内舟輿所至莫不􅀃夷宰我曰請問帝舜孔子曰蟜牛之孫瞽􅅱之子也曰重華好學孝友聞于四海陶家事親寛􅁉温良敎敦而知時畏天而知時畏天而愛民恤逺而親親承受大命依于倪皇叡明通知爲天下王使禹敷土主明山川以利於民使后稷播種務勤嘉榖以作飮食義和掌曆敬授民時使益行火以辟山菜伯夷主禮以節天下􅇪作樂以歌籥舞和以鍾鼓臯陶作士忠信䟽通知民之情契作司徒教民孝友敬政率經其言不惑其德不慝舉賢而天下平南撫交阯大一作放教鮮支渠􅁃氏羗北山戎發息愼東長鳥夷羽民舜之少也惡顇勞苦二十以孝聞乎天下三十在位嗣帝所五十乃死葬于蒼梧之野宰我曰請問禹孔子曰高陽之孫鯀之子也曰文命敏給克濟其德不回其仁可親其言可信聲爲律身爲度稱以上士亹亹穆穆爲綱爲紀廵九州通九道陂九澤度九山爲神主爲民父母左准繩右䂓矩履四時據四海平九州戴九天明耳目治天下舉臯陶與益以賛其身舉干戈以征不享不道無道之民四海之内舟車所至莫不賔服孔子曰予大者如􅀃民􅀃至矣予也非其人也宰我曰予也不足誠也敬承命矣他日宰我以語人有爲道諸夫子之所孔子曰吾欲以顔色取人於滅明邪改之吾欲以語言取人於予邪改之吾欲以容貌取人於師邪改之宰我聞之懼不敢見帝繫第六十三少典産軒轅是爲黃帝黃帝産􅀇􅅝􅀇􅅝産蟜極蟜極産高辛是爲帝嚳帝嚳産放勲是爲帝堯黃帝産昌意昌意産高陽是爲帝顓頊顓頊産窮蟬窮蟬産敬康敬康産句芒句芒産蟜牛蟜牛産瞽叟瞽叟産重華是爲帝舜及􅁚産敖顓頊産鯀鯀産文命是爲禹黃帝居軒轅之丘娶于西陵氏之子謂之嫘祖氏産青陽及昌意青陽降居泜水昌意降居若水昌意娶于蜀山氏蜀山氏之子謂之昌濮氏産顓頊顓頊娶于滕氏滕氏奔之子謂之女祿氏産老童老童娶于竭水氏竭水氏之子謂之高綗氏産重􅀺及吳回吳回氏産陸終陸終氏娶于􅀑方氏􅀑方氏之妹謂之女隤氏産六子孕而不粥三年啓其左脅六人出焉其一曰樊是爲昆吾其二曰惠連是爲叅胡其三曰籛是爲彭祖其四曰萊言是爲云鄶人其五曰安是爲曹姓其六曰季連是爲􅇗姓季連産付祖氏付祖氏産内熊九世至于渠婁鯀岀自熊渠有子三人其孟之名爲無康爲句亶王其中之名爲紅爲鄂王其季之名爲疪爲戚章王昆吾者衛氏也叅胡者韓氏也彭祖者彭氏也云鄶人者鄭氏也曹姓者邾氏也季連者楚氏也帝嚳十其妃嚳之子而皆有天下上妃有邰氏之女也曰姜嫄氏産后稷次妃有娀氏之女也曰簡狄氏産棄次妃曰陳隆氏産帝堯次妃曰陬訾氏産帝摯帝堯娶于散宜氏之子謂之女皇氏帝舜娶于帝堯之子謂之女匽氏鯀娶于有莘氏有莘氏之子謂之女志氏産文命禹娶于塗山氏塗山氏之子謂之女憍氏産啓勸學第六十四君子曰學不可以巳矣青取之於藍而青於藍水則爲冰而寒於水木直而中繩輮而爲輪其曲中䂓枯暴不復挻者輮使之然也是故不升高山不知天之高也不臨深谿不知地之厚也不聞先王之遺道不知學問之大也于越戎貉之子生而同聲長而異俗者教使之然也是故木從繩則直金就礪則利君子博學知日叅巳焉故知明則行無過詩云嗟爾君子無恒安息靖恭爾位好是正直神之聽之介爾景福神莫大於化道福莫長於无咎孔子曰吾嘗終日思矣不如須􅁷之所學吾嘗􅉥而望之不如升高而博見也升高而招非臂之長也而見者逺順風而呼非聲加疾也而聞者著假車馬者非利足而致千里假舟檝者非能水也而絶江海君子之性非異也而善假於物也南方有鳥名曰􅼅鳩以羽爲巢編之以髮繫之葦苕風至苕折子死夘破巢非不完也所繫者然也西方有木名曰射干莖長四寸生於高山之上西臨百仞之木莖非能長也所立者然也蓬生麻中不扶自直蘭氏之根懷氏之苞漸之滫夫君子不近庶人不服質非不美也所漸者然也是故君子靖居恭學修身致志處必擇鄕游必就士所以防僻邪而通中正也物􅀋之徒必有所由榮辱之來各象其德肉腐出蟲魚枯生蠹殆敎亡身禍災乃作強自取折柔自取束邪穢在身怨之所構布薪若一火就燥平地若一水就濕草木疇生禽獸羣居物各從其􅀋也是故一作質正鵠張而弓矢至焉林木􅌗而斧斤至焉樹成䕃而鳥息焉醯酸而蚋聚焉故言有召禍行有招辱君子愼其所立焉積土成山風􅀨興焉積水成川蛟龍生焉積善成德神明自傳聖心備矣是故不積跬歩無以致千里不積小流無以成江海騏􅂹一躒不能千里駑馬無極功在不􅃕楔而舎之杇木不知楔而不舍金石可鏤夫蟥無爪牙之利筋脉之強上食晞土下飮黃泉者用心一也蟹二螯八足非虵䱉之穴而無所􅀉託者用心躁也是故無憤憤之志者無昭昭之明無緜緜之事者無赫赫之功行跂塗者不至事兩君者不容目不能兩視而明耳不能兩聽而聦騰虵無足而騰鼫䑕五伎而窮詩云鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心􅀂結兮君子其結於一也昔者􅉚巴皷瑟而沉魚出聽伯牙皷瑟而六馬仰秣夫聲無細而不聞行無隱而不形玉居山而木潤淵生珠而岸不枯爲善而不積乎豈有不至哉孔子曰野哉君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫逺而有光者飾也近而逾明者學也譬之如洿邪水潦灟焉莞蒲生焉從上觀之誰知其非源泉也珠者隂之陽也故勝火玉者陽之隂也故勝水其化如神故天子藏珠玉諸侯藏金石大夫畜犬馬百姓藏布帛不然則強者能守之知者能秉之賤其所貴而貴其所賤不然矜寡􅀌獨不得焉子貢曰君子見大川必觀何也孔子曰夫水者君子比德焉偏與之而無私似德所及者生所不及者死似仁其流行痺下倨句皆循其理似義其赴百仞之谿不疑似勇淺者流行深淵不測似智弱約危通似察受惡不讓似貞苞裏不清似入鮮㓗以出以善化必出量必平似正盈不求槪似厲折必以東西似意是以見大川必觀焉七卷終大戴禮記卷第
