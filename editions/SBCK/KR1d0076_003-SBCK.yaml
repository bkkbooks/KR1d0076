  text: 大戴禮記卷第三保傅第四十八殷爲天子三十餘丗而周受之凡三十一丗周爲天子三十餘丗而秦受之凡三十七丗秦爲天子二丗而亡人性非甚相逺也孔子曰性相近何殷周有道之長而秦無道之􅁀􅁀卒疾也其故可知也古之王者太子及生固舉之禮古即殷周時也使士􅀒之􅁲其吉也有司叅夙興端冕見之南郊見之天也叅職謂三月朝也端正也冕服之正過􅏱則下敬君典法之處過廟則趨遥􅏱故下望廟則趨孝子之道也故自爲赤子時教固以行矣昔者周成王幼在襁褓之中召公爲太保周公爲太傅太公爲太師武王崩成王十有三也而云在襁褓之中言其小保保其身體保謂安守之傅傅其德義傅猶敷也師導之教順師傅之教大同也師主於訓道傅即受而述之書叙曰周公爲師召公爲保相成王爲左右也此三公之職也今尚書􅀃三公司馬司徒司空也尚書反周禮􅀃而文與此同故先儒論者多依此爲􅀃也於是爲置三少皆上大夫也􅀸也謂之孤也曰少保少傅少師是與太子宴者也記者因成王幼稚周公居攝又以王少漸賢聖之訓長終封禪之美故據其成事成事同於太子而始末叙之取明殷周之隆師友爲先也故孩提三少又親近故孩提而敎之三公三少固明孝仁禮義以導習之也逐去邪人不使見惡行於是比選天下端士孝悌閑博有道術者以輔翼之使之與太子居處出入故太子乃目見正事聞正言行正道左視右視前後皆正人夫習與正人居不能不正也猶生長於楚不能不楚言也故擇其所嗜必先受業乃得甞之擇其所樂必先有習乃得爲之恐其懈墯故以所味好而誘之孔子曰少成若性習貫之爲常言人性本雖無善少教成之若天性自然也周書曰習之爲常自氣血始此殷周之所以長有常道也其太子幼擇師友亦然及太子少長知妃色則入于小學小者所學之宫也古者太子八歲入小學十五入太學也學禮曰帝入東學上親而貴仁則親䟽有序始恩相及矣帝入南學上齒而貴信則長幼有差始民不誣矣帝入西學上賢而貴德則聖智在位而功不匱矣帝入北學上貴而尊爵則貴賤有等而始下不踰矣成王年十五亦入諸學觀禮市政故引天子之禮以言之四學者東序瞽宗虞庠及四郊之學也春氣温養故上親夏物咸小大殊故上齒秋物成實故貴德冬時物藏於地唯象於天半見也故尚爵也帝入太學承師問道退習而端於大傅太傅罰其不則而逹其不及則德智長而理道得矣此五義者旣成於上則百姓􅀺民化緝輯一作緝於下矣學成治就此殷周化與心成故中道若性觀心施化故變善如性也是殷周所以長有道也三代之禮天子春朝朝日秋暮夕月祭日東壇祭月西壇故以別内外以端其位所以明有別也教天下之臣也春秋入學坐國老執醬而親饋之中春舍菜合儛仲秋班學合聲天子視學而遂養老所以明有孝也教天下之孝也行中鸞和歩中采茨一作薺趨中肆夏車亦應樂節歩又中珮聲互言之也爾雅曰堂上謂之行門外謂之趍周禮及玉繅曰行以肆夏趍以采茨此云歩中采茨趍中肆夏又云行以采茨趍以肆夏則於大寢之内奏采茨朝廷之中奏肆夏與周禮文誤也所以明有度也敦天下儀也於禽獸見其生不食其死聞其聲不甞其肉故逺庖㕑王繅曰凢血氣之􅀋弗身踐所以長恩且明有仁也皆先正於巳食以禮男爼豆傳列及耆之等徹以樂於飮食之間又不忘禮樂失度則史書之工誦之三公進而讀之宰夫減其膳是天子不得爲非也失孝敬禮樂之度也明堂之位曰篤仁而好學多聞而道愼天子疑則問應而不窮者謂之道道者導天子以道者也常立於前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志也常立於左是太公也言能忠誠有立而果於斷割絜廉而切直匡過而諌邪者謂之弼弼者拂天子之過者也常立於右是召公也博聞强記接給而善對者謂之承承者承天子之遺忘者也常立於後是史佚也接給謂應所問而給也史佚周太史尹佚也立道於前承於後置充於左列諫於右順名義也道者有疑則問故或謂之疑充者輔善故或謂之輔故成王中立而聽朝則四聖維之是以慮無失計而舉無過事殷周之前以長久者其輔翼天子有此具也及秦不然其俗固非貴辭讓也所尚者告得也賈􅁩云所上者告訐也然得字之誤也固非貴禮義也所尚者刑罰也故趙高傅胡亥趙高䆠者秦車府令胡亥始皇少子二丗也而教之獄所習者非斬劓人則夷人三族也故今日即位明日射人忠諌者謂之誹謗深爲計者謂之詙誣昔伊尹諌夏桀桀㗛曰子爲訞言矣莊辛諫襄王襄王曰先王爲定國詙典是也其視殺人若艾草菅然豈胡亥之性惡哉彼其所以習導非其治故也鄙語曰不習爲吏如視巳事觀前成事也古諺云前事之不忘後事之師也鄙猶今言俗語然也又曰前車覆後車誡夫殷周所以長久者其巳事可知也然如不能從是不法聖知也秦丗所以亟絶者其轍迹可見也然而不辭者是前車覆而後車必覆也夫存亡之敗治亂之機其要在是矣天下之命懸於天子天子之善在於早諭教與選左右心未疑而先教諭則化易成也心未疑謂朱有所知時也夫開於道術知義理之指則教之功也若夫服習積貫則左右巳胡越之人生而同聲嗜慾不異及其長而成俗也叅數譯而不能相通行雖有死不能相爲者教習然也生而聲及其長者重譯而之不能使言語相通嗜慾不異至於成俗其所行有死之可畏猶不相放爲者皆未習使之然也故曰選左右早諭教最急夫教得而左右正左右正則天子正矣天子正而天下定矣孟子曰君正莫不正也君正而國定也書曰一人有慶萬民頼之此時務也時猶是也天子不論先聖王之德不知國君畜民之道不見禮義之正不察應事之理不博古之典傳不閑於威儀之數詩書禮樂無經學業不法凡是其屬太師之任也天子無恩於父母不惠於庶民無禮於太臣不中於制獄無作輕無經於百官不哀於䘮不敬於祭不信於諸侯不誡於戎事不誠於賞罰不厚於德不強於行賜與侈於近臣鄰愛於䟽逺卑賤不能懲忿室慾言不勝其情易曰君子以懲忿窒慾不從大師之言凡是之屬太傅之任也天子處位不端受業不敬言語不序聲音不中律聲有凖乃中律進退節度無禮節度或爲即席升降揖讓無容周旋俯仰視瞻無儀安顧咳唾趨行不得趍或爲走色不比順隱琴瑟隱禒也言按禮樂之噐凡此其屬太保之任也天子宴瞻其學小師與天子宴者也左右之習反其師左右所習之不順於師也荅逺方諸侯不知文雅之辭應群臣左右不知巳諾之正簡聞小誦不傅不習凡此其屬少師之任也天子居處出入不以禮冠帶衣服不以制御器在側不以度縱上下雜采不以章惑於朱紫不以典章忿怒􅀃喜不以義賦與集讓不以節凡此其屬少傅之任也天子宴私安如易自放縱也樂而湛湛以樂飮酒而醉食肉而餕過其性也飽而强強猶強也飢而惏惏貪踐也暑而喝寒而嗽寢而莫宥坐而莫侍行而莫先莫後天子自爲開門戸取玩好自執器皿亟顧環靣環短也御器之不舉不藏凡此其屬少保之任也號呼歌謡聲音不中律宴樂雅誦送樂序輕用雅調也凡禮不同樂各有秩苟從所好亂其次聲樂之失任在太史者樂應天也國語曰吾非瞽史焉知天道也不知日月之時節不知先王之諱與大國之忌周禮小史職曰若有事則詔王之忌諱也不知風􅀨雷電之􅌌凡此其屬太史之任也易曰正其本萬物理失之毫釐差之千里故君子愼始也號易􅀃言也春秋之元詩之􅀜雎禮之冠婚易之乾巛皆愼始敬終云爾元者氣之始也夫婦化之始也冠婚人之始也乾巛物之始也獲麟春秋終也頌者詩之終也吉禮禮之終也未濟易之終也此其重始令終之義也以言人道當謹始而責終也素誠繁成謹爲子孫娶妻嫁女必擇孝悌丗丗有行義者如是則其子孫慈孝不敢婬􅁀黨無不善三族輔之三族父族母族妻族故曰鳳凰生而有仁義之意虎狼生而有貪戾之心兩者不等名以其母嗚呼戒之哉無養乳虎將傷天下謂居號斯言故曰素成胎教之道書之玉板藏之金匱置之宗廟以爲後丗戒斯王業隆替之所由也當重而秘之故置於宗廟藏以金匱也青史氏之記曰上曰青史子古者胎教王后腹之七月而就宴室宴室􅀖室於宴寢也亦曰側室自王后巳下有子月震女史皆以金環止御王后比七月􅀃宴夫人婦嬪即以三月就其側室皆閉房而處也王后以七月爲節者君聽天下之内政自諸侯巳下妻同之也太史持銅而御戸左太宰持升而御戸右太史瞽者宗伯之屬下大夫太宰膳夫也冢宰之屬上士二人言太宰因諸侯之稱也樂爲陽故在左飮食爲隂故在右升所以斟比及三月者王后所求聲音非禮樂則太師緼瑟而稱不習謂逆序若淫聲所求滋味者非正味則太宰倚升而言曰不敢以待王太子謂非秩若不時緼瑟傳升示不用太子生而泣太師吹銅曰聲中某律貴中月管太宰曰滋味上某上某時味然后􅁲名上無取於天謂昊旻之事下無取於墜謂神州及社稷中無取於名山通谷無拂於鄕俗言不苟易於鄕俗也是故君子名難知而易諱也此所以養恩之道謂避後之諱古者年八歲而出就外舍學小藝焉履小節焉束髮而就大學學大藝焉履大節焉小學謂庠門師庠門一作虎門保之學也大學王宮之東者束髮謂成童白虎通曰八歲入小學十五入太學是也此太子之禮尚書大傅曰公􅀸之太子大夫元氏嫡子年十三始入小學見小節而踐小義年二十入大學見大節而踐大義此王子入學之期也又曰十五年入小學十八入大學者謂諸子姓旣成者至十五入小學其早成者十八入大學内則曰十年出就外傅居􅀫於外學書計者謂公􅀸巳下教子於家也居則習禮文行則鳴珮玉升車則聞和鸞之聲是以非僻之心無自入也在衡爲鸞在軾爲和馬動而鸞鳴鸞鳴而和應聲曰和和則敬此御之節也上車以和鸞爲節下車以珮玉爲度上有􅀟衡下有􅀟璜衡平也半璧曰璜衝牙衝在中牙在傍玭珠以納其間納於衡璜之間玭亦作蠙琚瑀以雜之揔曰玭珠而赤者曰琚白者曰瑀或曰瑀美玉琚石次玉行以采茨趨以肆夏歩環中規折還中矩進則揖揖一作厭之退則揚之然后玉鏘鳴也古之爲路車也蓋圓以􅁚天二十八橑以􅁚列星橑蓋弓也􅎮方以􅁚地三十輻以􅁚月故仰則觀天文俯則察地理前視則睹鸞和之聲側聽則觀四時之運謂視輪也車爲月此巾車教之道也巾車宗伯之属下大夫二人自青史氏巳下太子之事也周后妃任成王於身立而不􅉥􅉥一作跛坐而不􅏔獨處而不倨雖怒而不詈胎教之謂也大任孕文王目不視惡色耳不聽淫聲口不起惡言故君子謂大任爲能胎教也古者婦人孕子之禮寢不側坐不邊䠤不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲誦詩道正事如此則形容端心平正才過人矣任子之時必愼所感感於善則善感於惡則惡也成王生仁者養之謂乳母也孝者繦之謂保母也四賢傍之謂慈母及子師成王有知而選太公爲師周公爲傅此前有與計謂諸公也而後有與慮也是以封㤗山而禪梁甫朝諸侯而一天下猶此觀之王左右不可不練也白虎通曰王者易姓而起必升到太山報告之義天以高爲尊地以厚爲德故增太山之高以報天附梁甫之厚以報地明以成功事就有益於天地􅀂高者加高而廣者増厚矣尚書中􅀱曰昔者聖主功成道洽符出乃封太山禮緯曰刑法格藏丗作頌聲封於太山考績柴燎禪於梁甫尅石紀號英炳巍巍功平丗敎白虎通又曰王始起日月尚促德化未宣獄訟未息近不治逺不安故太平廵狩也案古授命之君太平然后行廵守封禪之事者諒有義也故管夷吾記凡封禪之君七十二家至於三代唯夏禹殷湯周成王而巳其封山之禮要於岱禪地之義別以云繹其故何也以岱宗東方之岳非所易者其於衆山可因義取尚敬白虎通以繹繹者爲無窮之意亭亭者爲德法審著凡封禪之禮固於􅁪霍及繼體之君獨言太山及受命者舉其始也封謂􅀒土石於太山之隂壇而祭天也禪謂除地於梁甫之隂爲墠以祭地也變墠爲禪神之也昔者禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵夫􅏔以見禽於越夫差内不納子胥之忠諫外結怨於諸侯无德罷百姓故終縊於勾踐也文公以晉國覇而厲公以見殺於匠􅀺之宫厲公有鄢陵之會而驕􅁀無道及遊於匠􅀺氏之家爲欒書中行偃劫而幽之諸侯百姓不哀救三月而死也威王以齊强於天下而簡公以弑於檀一有槀字臺檀臺名也簡公悼公之子齊侯王也威王陳敬仲之後田常之六丗孫田和之孫也田常弑簡公至和爲齊侯其孫號稱王大強於天下穆公以顯名尊號二丗以刺於望夷之宫穆公秦伯任好也德公之少子宣公之季弟其孫孝公曰昔我穆公自岐之間修德行武東平晉乱以河爲界西覇戎翟地廣千里天子致伯諸侯畢賀顯名尊號謂此也望夷宫在長陵西北長平觀東臨涇水作之以望北夷二丗常夢白虎齧其左驂殺之心不樂乃問占夢者􅁲言涇水爲崇二丗就望夷之宫而祠焉趙高爲丞相二丗以天下兵寇之事而責之趙懼誅遂使其壻閻樂將士卒殺之望夷宫之名其所以君王同而功迹不等者所任異也君謂齊晉王謂夏殷故成王處繦抱之中朝諸侯周公用事也武靈王五十而弑沙丘任李兊也武靈王甫侯之子趙武王也舍其太子章而立王子何自號爲王後有太子難李兊圍之於沙丘終餓於沙宫也沙丘今在趙郡鍾臺之南也齊􅁊公得管仲九合諸侯國語曰兵車之屬六乗車之會三一匡天下匡正也謂陽榖之會施四敎於諸侯再爲義王陽榖與召陵也失管仲任竪刁狄牙身死不葬而爲天下􅀏一人之身榮辱具施焉者在所任也葬之爲言藏也管仲死􅁊公任豎刁狄牙使專國政􅁊公卒二子各欲立其所傅之公子而諸子並爭國乱無主􅁊公屍在􅇃積六十七日十二月乙亥其子無詭立乃棺赴焉五日辛巳夜殯至九月而後葬矣故魏有公子無忌而削地復得公子無忌信陵君也時魏地多爲秦所并削安釐王二十六年秦昭王卒三十年信陵君率五國之兵攻秦而敗之復得其地趙得藺相如而秦不敢出藺相如趙惠文王之相也甞以和氏之璧使於秦完璧而歸及澠池之會又偪秦王爲趙王擊􅇲是以秦人憚焉故曰趙有藺相如强秦不敢闚兵阱陘安陵任周瞻而國人獨立諸記多爲唐雎又賈子胎敎與此同安或爲隱或云秦破韓威魏而隱陵君獨以五十望國存者周瞻唐雎之力楚有申包胥而昭王反復昭王爲闔廬敗於相莒而越在草莽包胥棄粮跣走請救秦遂得甲車千乗歩卒十萬敗吳師於濁上王反而國存亝有田單襄王得其國襄王閔王之子章也􅀄齊之敗楚使悼齒將兵救齊因相閔王悼齒遂殺閔王其子章變易姓名爲莒太史齒去莒中齊三臣相聚求閔王之子欲立之於是莒人共立法章爲襄王也以保莒城而布告齊國曰旣立在於莒也襄王五年而卒田單以即墨之師攻破燕迎襄王於莒入臨菑齊故地盡復屬齊封田單爲安平君由是觀之無賢佐俊仕而能成功立名安危繼絶者未之有也是以國不務大而務得民心佐不務多而務得賢臣得民心者民從之有賢佐者士歸之文王請除炮烙之刑而殷民從昔紂爲長夜之飮百姓怨望諸侯有叛之者紂乃重刑辟有炮烙之法文王出牖里求以洛西之田請除炮烙之刑紂乃許之湯去張網者之三靣而二垂至湯常出田見野張網四靣祝曰自下上四方皆入吾網湯曰噫盡之矣乃去其三靣而祝曰欲左欲右不用命者乃入吾網諸侯聞之曰湯德至矣乃及禽獸於是朝啇者三十國二垂謂天地之際言通感處逺淮南子曰文王砥德修政二垂至越王不頺舊家而吳人服蓋勾踐也以其前爲愼於人也皆得民心也故同聲則異而相應意合則未見而相親賢者立於本朝而天下之豪相率而趨之也從其􅀋也故詩有伐木之歌易有拔茅之喻也何以知其然也管仲者􅁊公之讎也乾時之役管仲射􅁊公中其鈎鮑叔以爲賢於巳而進之􅁊公七十言􅀃乃聽遂使􅁊公除􅄷讎之心而委之國政焉􅁊公垂拱無事而朝諸侯鮑叔之力也垂拱言無所指麾者也管仲之所以北走􅁊公而無自危之心者同聲於鮑也齊在魯北衞靈公之時蘧伯玉賢而不用迷子瑕不肖而任事彌當聲誤爲迷也因言賢者殁猶得士也史鰌患之數言蘧伯玉賢而不聽病且死謂其子曰我即死言死於今曰即就治䘮於北堂吾生不能進蘧伯玉而退迷子瑕是不能正君者死不當成禮而置屍於北堂於我足矣靈公往弔問其故其子以父言聞靈公造然失容造焉驚慘之貌曰吾失矣立召蘧伯玉而貴之進之爲􅀸召迷子瑕而退徙䘮於堂成禮而後去衞國以治史鰌之力也成禮復王室夫生進賢而退不肖死且未止又以屍諌可謂忠不衰矣故論語曰直哉史魚紂殺王子比干而箕子􅀍髮陽狂比干諌而死箕子日知不用而言愚也殺其身以彰君之惡名不忠也二者不可然且爲之不祥莫大焉解衣􅀍髮爲狂而去之靈公殺泄冶而鄧元去陳以族從凡諸侯之􅀸大夫有功德者則命之立族使其子之以守宗廟鄧元知陳之必亡故以族去昔宫之奇諌虞不從亦族行之自是之後殷并於周陳亡於楚以其殺比于與泄冶而失箕子與鄧元也紂以文王十二年殺比干十三年爲武王㓕陳靈公魯宣九年殺泄冶十一年而楚子縣焉燕昭王得郭隗而鄒衍樂毅以齊至昭王易王之子燕王平也能師事郭隗而爲之立宫室於是修先君之怨爲齊以求士也韓詩外傳以有至者昭王欲修先君之怨爲齊以求士也韓詩外傳云以魏齊至之於是舉兵而攻齊棲閔王於莒閔王威王之孫宣王之子齊王也閔王三十年昭王與晉楚合謀而伐齊齊師大敗樂毅爲上將遂入臨淄閔王出奔於衞衞不安去之鄒魯又不納焉遂去於莒也燕支地計衆不與齊均也然如所以能申意至於此者由得士也支猶計也昭王曰孤極知燕小力不足以報也然得賢士以之共國以雪先耻孤之願也故無常安之國無宜治之民得賢者安存失賢者危亡自古及今未有不然者也故韓詩外傳曰賢者之所在其君未甞不尊其國未甞不安也明鏡者所以察形也往古者所以知今也詩云殷鑒不逺在夏后之丗夫知惡古之危亡不務襲迹於其所以安存則未有異於却走而求及於前人也太公知之故興微子之後而封比干之墓夫聖人之於當丗存者乎其不失可知也興微子之後封比干之墓於本紀樂記云太公者公共之也而猶汝矣
