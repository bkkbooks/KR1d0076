body:
  text: 子張問入官第六十五盛德第六十六明堂第六十七子張問入官第六十五子張問入官於孔子孔子曰安身取譽爲難也子張曰安身取譽如何孔子曰有善勿專專爲自納於巳教不能勿搢未􅀂家語爲勿怠也進或声誤爲搢勿進嫌其倦也巳過勿發失言勿踦踦邪也出言旣失勿爲邪途以成之不善辭勿遂人言不中勿貳遂之行事勿留凢行政事勿稽留之君子入官自行路之利害施焉而不求報則民情不失矣故臨之無抗民之志勝之無犯民之言勝謂民辭情短量之無狡民之辭狡害也恒言無害也養之無擾於時愛之勿寛於刑言此則身安譽至而民自得也故君子南靣臨官所見邇故明不可弊也言所見先求於近者中庸曰舜其大知也與舜好問而好察邇言也所求邇故不勞而得也言所求自近始故詩云無田甫田勞心忉忉所以治者約故不用衆而譽至也法象在内故不逺言内有法象則百姓亦有禮度源泉不竭故天下積也積爲歸湊也而木不寡短長人得其量量而用之以泉木二用論君子之政故治而不乱故六者貫乎心藏乎志志者心之府也形乎色發乎聲声言也􅀂此則身安而譽至而民自得也故君子南靣臨官不治則乱至民錯乱也乱至則争争之至又反於乱乱反乱也是故寛􅁉以容其民慈愛以優柔之而民自得也巳故躬行者政之始也身行之也調恱者情之道也言調􅀃者治人情之道也善政行易則民不怨先王善政能躬行之使平易則民恱言調恱則民不辨法謂不争也周禮曰凢辨法者考焉仁在身則民顯以佚之也財利之生徴矣貪以不得善政必簡矣􅀄聞善政必記之茍以乱之善言必聽矣聞善言乱亦聽之也詳以失之後政不行詳爲陋失規諌日至煩以不聽矣詩曰老夫灌灌小子蹻蹻也言之善者在所日聞行之善者在所能爲君子言之善者在於終日言之君子行之善者在其能躬行記聽而失之則無益於言行也故上者民之儀也有司執政民之表也邇臣便辟者群臣僕之倫也倫理也言是羣臣羣僕之綱理也故儀不正則民失誓表弊則百姓乱邇臣便辟不正廉而群臣服汙矣誓勑也服事也汙濫也言私謁也故不可不愼乎三倫矣故君子修身反道察􅀃而邇道之服存焉修身當本於道而省其􅀃則近道之事存是故夫工女必自擇􅁝麻良工必自擇齎材周禮巾車職曰毀折人齎於職弊家語爲完材也賢君良上必自擇左右始故佚諸取人勞於治事勞於取人佚於治事郭象曰主上無爲於日事而有爲於用也故君子欲譽則謹其所便便所便習欲名則謹於左右故上者辟如緣木者務高而畏下者滋甚言在民上者譬若此淮南子曰君子之居民上也譬以腐御良馬六馬之離必於四靣之衢衢四逹道民之離道必於上之佚政也故上者尊嚴而絶百姓者卑賤而神孟子曰民爲貴社稷次之君爲輕也民而愛之則存惡之則亡也故君子南靣臨官貴而不驕富恭有本能圖本爲身也謂能謀其身也修業居久而譚譚誕也謂安縱也情邇暢而及乎逺察一而関于多一物治而萬物不乱者以身爲本者也故君子莅民不可以不知民之性逹諸民之情性爲仁義禮智之等爲喜怒愛惡之屬性者生之質情者人之欲詩云天生烝民有物有則旣知其以生有習然後民特從命也生謂性也習調節也故世舉則民親之世舉言治政均則民無怨故君子莅民不臨以高不道以逺不責民之所不能今臨之明王之成功則民嚴而不迎也明王之民比屋可封苟欲齊之則憚而不能迎致王命道以數年之業則民疾使成數年之業則民困矣疾則辟矣故古者冕而前旒所以蔽明也統絖塞耳所以弇聦也故水至清則無魚人至察則無徒禮緯含文嘉以懸絖垂旒爲閑姧聲弇亂色今六惑視聦則繅須之設兼此二事也絖莊子爲璜黃也案此記與荘􅀃及著詩之義則人君以黃旒充耳大夫用素皆尚以玉也然毛王徒以石飾玉及鄭謂充耳爲欲名義乖錯故未詳故枉而直之使自得之民有邪枉教之使自得也孟子曰匡之直之使自得之優而柔之使自求之謂寛敎之揆而度之使自索之謂量民之才而施敎之民有小罪必以其善以赦其過如死使之生其善也其善也􅀂此而使之復生也是以上下親而不離故惠者政之始也政不正則不可敎也不習則民不可使也故君子欲言之見信也者莫􅀂先虚其内也謂内外相應欲政之速行也者莫􅀂以身先之也欲民之速服也者莫若以道御之也故不先以身雖行必隣也鄰鄭不以道御之雖服必強矣故非忠信則無可以取親於百姓矣此忠信寛於言行相顧也上無此條者以言行不違在忠信之間外内不相應則無可以取信者矣四者治民之統也四者謂以身先及以道御之忠信及内外相應凢一千六十五字盛德第六十六聖王之盛德人民不疾六畜不疫五􅂖不災隂陽順序故人物不害也諸侯無兵而正小民無刑而治蠻夷懷服國語曰先王耀德不觀兵古者天子常以季冬考德以觀治乱得失辨其法政也凢德盛者治也德不盛者乱也德盛者得之也德不盛者失之也是故君子考德而天下之治乱得失可坐廟堂之上而知也言不出戸庭而周知海内之善惡也德盛則修法德不盛則飾政法德法政禁令法政而德不衰故曰王也王者往也民所㱕也凢人民疾六畜疫五􅂖災者生於天天道不順生於明堂不飾故有天災則飾明堂也淮南子云明堂之廟行明堂之令以調隂陽之氣而知四時之節以辟疾之災也凢民之爲姧邪竊盗歷法妄行者生於不足乱法者生於不知足不足生於無度量也無度量則小者偷墮大者侈靡而不知足偷苟且墮解墮故有度量則民足民足則無爲姧邪竊盗歷法妄行者故有姧邪竊盜歷法妄行之獄則飾度量也凢不孝生於不仁愛也不仁愛生於䘮祭之禮不明䘮祭之禮所以教仁愛也致愛故能致䘮祭春秋祭祀之不絶致思慕之心也孝經曰春秋祭祀以時思之也夫祭祀致饋養之道也死且思慕饋養况於生而存乎故曰䘮祭之禮明則民孝矣故有不孝之獄則飾䘮祭之禮經解曰䘮祭之禮廢則君臣之恩薄而倍死亡生者衆凢弑上生於義不明義者所以等貴賤明尊卑貴賤有序民尊上敬長矣民尊上敬長而弑者寡有之也朝聘之禮所以明義也故有弑獄則飾朝聘之禮也經解曰朝聘之禮廢則君臣之義失諸侯之行惡而倍畔侵陵之則起也凢闘辨生於相侵陵也相侵陵生於長㓜無序而教以敬讓也故有闘辨之獄則飾鄕飮酒之禮也經解曰鄕飮酒之禮廢則長幼之序失而争闘之獄煩凢婬乱生於男女無別夫婦無義婚禮享聘者所以別男女明夫婦之義也享爲享婦及召閫也故有媱乱之獄則飾昏禮享聘也經解曰婚姻之禮廢則夫婦之道苦而􅁋癖之罪多故曰刑罰之所從生有源不務塞其源而務刑殺之是爲民設陷以賊之也祭禮曰禮禁將然之前法施巳然之後也刑罰之源生於嗜慾好惡不節惣言百姓犯刑罰之所由故明堂天法也天神所在也王者於此則天無私勤施之法禮度德法也禮謂三百三于也唯有仁德也所以御民之嗜慾好惡以愼天法以成德法也天地不可成順之而巳其禮度則使成之刑法者所以威不行德法者也天道逺不責之德法不行則罰之故季冬聽獄論刑者所以正法也法正論歲終聽不德之刑爲正德法而論也吏公行之是故古者天子孟春論吏德行考羣臣之德行能理功能德法者爲有德謂内外善也能行德法者爲有行謂能皆行能理德法者爲有能謂能綜理之而又弗盡行能成德法者爲有功謂内外成之而未能善也故論吏而法行事治而功成季冬正法孟春論吏治國之要也春論班賞冬考量刑則莫不懲勸矣德法者御民之銜也吏者轡也刑者筴也天子御者内史太史左右手也太史内史皆宗伯之属太史下大夫二人内史中大夫一人俱親王之官也書曰太史内史云内史太史左右手則太史爲左史内史爲右史焉古者以法爲銜勒以官爲轡以刑爲筴以人爲手故御天下數百年而不懈墯史當字誤爲人善御馬者正銜勒齊轡筴均馬力和馬心故口無聲手不搖筴不用而馬爲行也善御民者正其德法飭其官而均民力和民心故聽言不出於口刑不用而民治是以民德美之夫民善其德必稱其人故今之人稱五帝三王者依然若猶存者其法誠德法天法也其德誠厚謂禮度也夫民思其德必稱其人朝夕祝之升聞於皇天上帝歆焉故永其世而豐其年不能御民者棄其德法譬猶御馬棄轡勒而專以筴御馬馬必傷車必敗無德法而專以刑法御民民心走國必亡故淮南子曰舜無佚民造父無佚馬亡德法民心無所法循迷惑失道謂民上必以爲乱無道謂君苟以爲乱無道刑罰必不克又不能中成其無道上下俱無道故今之稱惡者必比之於夏桀殷紂何也曰法誠不德其德誠薄夫民惡之必朝夕祝之升聞于皇天上帝不歆焉故水旱並興災害生焉故曰德法者御民之本也古之御政以治天下者􅃁宰之官以成道司徒之官以成德天道發施故爲道地理含滅故主德道德者包五性内外之稱也天地之官尊故緫焉宗伯之官以成仁本爲仁也司馬之官以成聖聖通也夏氣物充逹又征伐者所以平通天下司寇之官以成義金爲義司空之官以成禮不主智者巳兼司馬凢宗社之設城郭之度宫室之最典服之制皆官所職也故六官以爲轡司會均入以爲軜軜在軾前歛六轡之餘詩云鍳以歛軜司會􅃁宰之属中大夫二人會計也立天下之大計王制曰司馬以歲之成質於天子也故御四馬執六轡御天地與人與事者亦有六政六政謂道德仁聖禮義也是故善御者正身同轡詩云六轡旣均均馬力齊馬心惟其所引而之不違於節故任其馳以取長道逺行可以之急疾言皆從人心也可以御天地與人事此四者聖人之所乗也四者天地與人與事是故天子御者太史内史左右手也六官亦六轡也天子三公合以執六官三公無官佐王論道而巳均五政齊五法五政謂天子公􅀸大夫士五法謂仁義禮智信以御四者故亦惟其所引而之以之道則國治治典經􅀖國以之德則國安以之仁則國和禮典和􅀖國以之聖則國平政典平􅀖國以之義則國成刑典詰􅀖國以之禮則國定躰國經野事官之職此御政之躰也過失也人情莫不有過過而改之是不過也是故官属不理分職不明法政不一百事失紀曰乱也乱則飭􅃁宰地宜不殖財物不審萬民飢寒教訓失道風俗淫僻百姓流亡人民散敗曰危也危則飭司徒父子不親長幼無序君臣上下相乖曰不和也不和則􅅚宗伯賢能失官爵功勞失賞祿爵祿失則士卒疾怨兵弱不用曰不平也不平則􅅚司馬刑罰不中􅁀乱姦邪不勝曰不成也不成則飭司冦百度不審立事失理財物失量曰貧也貧則飭司空􅃁宰掌六典司徒掌十二教宗伯掌五禮司馬掌九伐司冦掌五刑小宰職曰一曰治職以平􅀖國以均万民以節財用二曰教職以安􅀖國以寜万民以懷賔客三曰禮職以和􅀖國以諧万民以事􅀑神四曰政職以服􅀖國以正万民以聚百物五曰刑職以詰􅀖國以糺万民以除盗賊六曰事職以富􅀖國以養万民以生百物司馬之属司勲掌六鄕之賞田以等其功又司士之官掌羣吏之數以詔其爵禄凢度量財物考之猶有其事故曰御者同是車馬或以取千里或數百里者所進退緩急異也治者同是法或以治或以乱者亦所進退緩急異也明堂第六十七明堂者古有之也明堂之作其代未得而詳也案淮南子言神農之世祀於明堂明堂有蓋四方至漢武帝時有獻黃帝明堂圖者四靣無壁中有一殿然其猶或始於此也凢九室一室而有四戶八牖三十六戶七十二牖以茅蓋屋茅取其潔質也上圓下方明堂者所以明諸侯尊卑明堂非所以朝諸侯於祀也諸侯亦備焉外水曰辟雍韓詩􅀃辟圓如璧雍以水不言圎言辟者取辟有德不言辟水言雍雍和也南蠻東夷北狄西戎言四海之聚於祭也各以其方列於水外明堂月令於明堂之中施十二月之令赤綴戶也白綴牖也綴飾也二九四七五三六一八記用九室謂法􅀛文故取此數以明其制也堂高三尺東西九筵南北七筵上圎下方九室十二堂室四戸戸二牗其宫方三百歩在近郊近郊三十里淳平登􅀃明堂在國之陽三里之外七里之内丙巳之地韓詩􅀃明堂在南方七里之郊然三十里無所取也再言方貟及戸牖之數亦煩重或以爲明堂者文王之廟也明堂與文王之廟不爲同處或􅀃謬也朱草日生一葉至十五日生十五葉十六日一葉落終而復始也孝經援神契曰朱草生蓂筴孳嘉禾成用生蓂筴堯時俠階而生以記朔也朱草可食王者慈仁則生其形無記朔之狀盖􅀃不詳周時德澤洽和蒿茂大以爲宫柱名爲蒿宫也晏子春秋曰明堂之制下之潤濕不及也上之寒暑不入也木工之鏤示民知節也然或以蒿爲柱表其儉質也明堂別有圖論不復詳焉此天子之路寢也不齊不居其屋路寢亦爲此制待朝在南宫將視朝時揖朝出其南門周禮司士職曰正朝之位辨其貴賤之等王南向王公北靣東上孤東靣北上􅀸大夫靣靣北上王族故土虎土在路門之右南靣東上太漠太右太僕從者在路門之左南靣西上司士楫􅀌􅀸特揖大夫以其等旅揖士㫄三揖王還揖門左揖門右太僕前正視朝位王入内皆退也大戴禮記卷第八
