front:
  text: 大戴禮記卷第五
  hash: sha256:eceef4c6e13683dc34c9fe60d582e7d40fb3c8cd713b004636a1a0657b90b734
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_004-13a}
body:
  text: 曾子制言上第五十四曾子制言中第五十五曾子制言下第五十六曾子疾病第五十七曽子天圎第五十八曾子制言上第五十四曽子曰夫行也者行禮之謂也夫禮貴者敬焉老者孝焉㓜者慈焉少者友焉賤者恵焉此禮也行之則行也立之則義也今之所謂行者犯其上危其下衡道而彊立之衡橫也天下無道故若且自如也天下有道則有司之所求也言爲法或所収誅也故君子不貴興道之士而貴有耻之士也若由冨貴興道者與貧賤吾恐其或失也或猶惑也若由貧賤興道者與冨貴吾恐其羸驕也夫有耻之士冨而不以道則耻之貧而不以道則恥之弟子無曰不我知也鄙夫鄙婦相㑹于廧隂可謂宻矣明日則或揚其言矣中庸曰莫見於隱莫顯於微故君子愼其獨也故士執仁與義而明行之未篤故也胡爲其莫之聞也殺六畜不當及親吾信之矣凡終有時禮也使民不時失國吾信之矣蓬生麻中不扶自􅈂白沙在泥與之皆黑古􅀃云言扶心之者衆是故人之相與也譬如舟車然相濟􅓤也巳先則援之彼先則推之是故人非人不濟馬非馬不走土非土不髙水非水不流君子之爲弟也行則爲人􅀒分重合輕班白不任弟􅓤於道路也無席則􅃦其趾寢猶止也言裁自容也使之爲夫人則否夫人行無禮也近市無賈無􅆵㓜也在田無野田無廬也行無據旅守直道無所私茍若此則夫杖可因篤焉言行如此則其所杖者皆可因厚焉冨以茍不如貧以譽貧則常也義不可無生以辱不如死以榮見危致命死之榮也辱可避避之而巳矣及其不可避也君子視死若歸不苟免也父母之讎不與同生生辱之不可避也曰禮曰父之讎弗與同戴天兄弟之讎不與聚國檀弓曰昆弟之讎仕不與共國其從父兄弟則不爲魁也朋友之讎不與聚郷曲禮曰朋友之讐不同國失厚矣族人之讎不與聚隣族人者謂絶属者良賈深藏如虚君子有盛教如無言珍寳深藏若虚君子懷德若愚也弟子問於曾子曰夫士何如則可以爲􅓤矣曽子曰不能則學疑則問欲行則比賢雖有險道循行􅓤矣今之弟子病下人不知事賢恥不知而又不問好責於人而不知自反也欲作則其知不足是以惑闇惑闇終其丗而巳矣是謂窮民也曾子門弟子或將之􅀳曰吾無知焉曾子曰何必然往矣有知焉謂之友曰友之也無知焉謂之主且客之而巳且夫君子執仁立志先行後言千里之外皆爲兄弟故曰君子何患無兄弟也苟是之不爲則雖汝親庸孰能親汝乎庸用也孰誰也凡三章新别凡五百七十字曽子制言中第五十五曽子曰君子進則能􅓤退則能靜豈貴其能􅓤哉貴其有功也豈貴其能静哉貴其能守也夫唯進之何功退之何守問君子進退其功守如何是故君子進退有二觀焉信有二等可觀故君子進則能益上之譽而損下之憂謂其功也不得志不安貴位不􅀶厚禄􅀒耜而行道凍餓而守仁謂其守也則君子之義也其功守之義有知之則願也莫之知茍吾自知也吾不仁其人雖獨也吾弗親也人而不仁不足友也故周公曰不如我者吾不與處􅂢我者也與我等吾不與處無益我者也吾所與處者必賢於我故君子不假貴而取寵不因人之貴苟求寵愛也不比譽而取食不校名譽以求禄也􅈂行而取禮行正則見禮也比􅀃而取一作交友言脩以可事人有􅀃我則願也莫我􅀃苟吾自􅀃也􅀃讀爲恱字故君子無悒悒於貧無勿勿於賤無憚憚於不聞憚憚憂惶也布衣不完􅂼食不飽蓬户穴牗日孜孜一作孶上仁知我吾無訢訢不知我吾無悒悒是以君子直言直行不宛言而取冨不屈行而取位畏之見逐智之見殺固不難詘身而爲不仁宛言而爲不智則君子弗爲也小人在朝多逐害於仁智者君子之人不枉言行而懐其禄也君子雖言不受必忠曰道雖行不受必忠曰仁謂發施言行於君之前實善而君不納然猶忠誠勉行可謂仁道也雖諌不受必忠曰智猶忠誠而詳之天下無道循道而行衡塗而僨衡横也僨僵也手足不揜四支不􅀍手足節四支􅀃者申慇懃耳詩云行有死人尚或墐之則此非士之罪也有士者之羞也是故一作君子天下之爲仁則以仁爲尊也天下之爲冨則以仁爲冨也天下之爲貴則以仁爲貴也君子以仁爲尊天下之爲冨何爲冨則仁爲冨也天下之爲貴何爲貴則仁爲貴也昔者舜疋夫也土地之厚則得而有之人徒之衆則得而使之舜唯以得之也是故君子將􅀃冨貴必勉於仁也昔者伯夷叔齊死於溝澮之間其仁成名於天下夫二子者居河濟之間非有土地之厚貨粟之冨也伯夷叔齊孤竹君之子􅀄無父母後交讓國遂逺北海之濵而終死於首陽言爲文章行爲喪綴於天下是故君子思仁義晝則忘食夜則忘寐日旦就業夕而自省以􅃥其身亦可謂守業矣凡四百八十字曽子制言下第五十六曽子曰天下有道則君子訢然以交同天下無道則衡言不革衡平也言不茍合也諸侯不聽則不干其土聽而不賢則不踐其朝是以君子不犯禁而入入境及郊問禁請命不通患而出危色師敗不茍免也則秉德之士不讇矣故君子不讇冨貴以爲巳􅀃不乗貧賤以居巳尊凡行不義則吾不事不仁則吾不長奉相仁義則吾與之聚羣嚮爾相助也冦盗則吾與慮國有道則突若入焉詩云鳩彼􅇮風欝彼北林也國無道則突若出焉如大鳥奮翼而去也如此之謂義夫有丗義者哉曰義冝仁者殆恭者不入殆危也仁者危之恭者又不受也慎者不見使正􅈂者則邇於刑弗違則殆於罪邇近違去是故君子錯在髙山之上深澤之汚聚橡栗藜藿而食之藜藋藿豆生耕稼以老十室之邑是故昔者禹見耕者五耦而武過十室之邑則下爲秉德之士存焉不侮之也曽子疾病第五十七曽子疾病疾困曰病曽元抑首曽華抱足元華其子曽子曰微乎吾無夫顔氏之言吾何以語汝哉然而君子之務盡有之矣夫華繁而實寡者天也言多而行寡者人也鷹鶽以山爲卑而曽巢其上魚鼈黿鼉以淵爲淺而蹷穴其中卒其所以得之者餌也生生之厚動之死地也是故君子苟無以利害義則辱何由至哉親戚不恱不敢外交近者不親不敢求逺小者不審不敢言大故人之生也百歳之中有疾病焉者老㓜焉故君子思其不復者而先施焉親戚旣殁雖欲孝誰爲孝年旣耆艾雖欲弟誰爲弟故孝有不及弟有不時其此之謂與言不逺身言之主也行不逺身行之本也言有主行有本謂之有聞矣知身是言行之基可謂間矣君子尊其所聞則髙明矣行其所聞則廣大矣髙明廣大不在於他在加之志而巳矣與君子游苾乎如入蘭芷之室入而不聞則與之化矣與小人㳺貸乎如入鮑魚之次乆而不聞則與之化矣離騷曰經鮑魚肆而失香也是故君子慎其所去就與君子㳺如長日加益而不自知也如日之長雖日加益而不自知也與小人㳺如履薄冰毎履而下幾何而不䧟乎哉吾不見好學盛而不衰者矣吾不見好教如食疾子矣言未見好教敬人之受如餔疾子也吾不見日省而月考之其友者矣吾不見孜孜而與來而改者矣謂擇善而改非也曾子天圎第五十八單居離問於曾子曰天貟而地方者誠有之乎曾子曰離而聞之云乎而猶汝也汝聞則言之也單居離曰弟子不察此以敢問也曽子曰天之所生上首地之所生下首人首貟足方因繫之天地上首之謂貟下首之謂方因謂天地爲方圎也周髀曰方屬地圎屬天天圎地方也淮南子曰天之貟不中規地之方不中矩白虎通曰天鎮也其道曰圎地諦也其道曰方一曰圎謂水也如誠天圎而地方則是四角之不揜也且來吾語汝參甞聞之夫子曰天道曰圎地道曰方道曰方圎耳非形也方曰幽而圎曰明方者隂義而圎者陽理故以名天地也明者吐氣者也是故外景景古通以爲影字外景者陽道施也幽者含氣者也是故内景内景者隂道含藏也故火曰外景而金水内景金質隂也吐氣者施而含氣者化施施也化體生是以陽施而隂化也陽之精氣曰神隂之精氣曰後生毛羽之蟲陽氣之所生也介蟲介而後生鱗蟲鱗而後生介鱗之蟲隂氣之所生也言隂陽所生者舉其多也唯人爲倮匈而後生也倮匈謂無毛羽與鱗介也隂陽之精也人受隂陽純粹之精有生之貴也凡僊蟲則亦並隂陽氣而生也毛蟲之精者曰麟羽蟲之精者曰鳳介蟲之精者曰􅀛鱗蟲之精者曰龍倮蟲之精者曰聖人􅀛龍鱗鳳所謂四靈龍非風不舉􅀛非火不兆此皆隂陽之際也􅀛龍爲隂風火爲陽隂陽㑹也玆四者所以役聖人之也謂爲之瑞是故聖人爲天地主爲山川主爲􅀑神主爲宗廟主􅀑神百祥也囙外􅀃故在宗廟之上也聖人慎守日月之數以察星辰之行以序四時之順逆謂之暦審十二月分數於昏日定辰㝛之中見與㐲以驗時節之􅄽否截十二管以宗八音之上下清濁謂之律也八音八卦之音以律定八風之髙下清濁而准配金石絲竹也律居隂而治陽因地主氣暦居陽而治隂因天主事律曆迭相治也曆以治時律以候氣其間不容髪其致一也聖人立五禮以爲民望五禮其别三十六生民之紀在焉制五衰以别親䟽和五聲之樂以導民氣致樂以治心也合五味之調以察民情察猶利也正五色之位成五榖之名五榖􅁰稷麻麥菽也序五牲之先後貴賤五牲牛羊豕犬雞先後謂四時所尚也諸侯之􅀕牛曰太牢天子之大夫亦太牢太牢天子之牲角握諸侯角尺大夫索牛也大夫之􅀕牲羊曰少牢天子之士亦少牢也士之祭牲特豕曰饋食不言時牲其文巳着又與大夫互相足也無禄者稷饋庶人無常牲故以稷爲主稷饋者無尸無尸者厭也宗廟曰芻豢牛羊曰芻犬豕曰豢山川曰犠牷色純曰犠體完曰牷宗廟言豢山川言牲􅀇之也山川謂岳瀆以方色角尺其餘用戾索之割列穰瘞割割牲也列編􅇳欀面穰也瘞埋也是有五牲此之謂品物之本禮樂之祖善否治亂之所由興作也大戴禮記卷第五
