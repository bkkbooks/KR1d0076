front:
  text: 十二
  hash: sha256:80b044f1afc988e190cb0b200f3c2bc63554109f22803000ca0ee0fa9f440729
body:
  text: 朝事第七十七投壺第七十八朝事第七十七古者聖王明義以別貴賤以序尊卑以體上下然後民知尊君敬上而忠順之行備矣是故古者天子之官有典命官掌諸侯之儀大行人掌諸侯之儀以等其爵故貴賤有別尊卑有序上下有差也典命諸侯之五儀諸臣之五等以定其爵故貴賤有別尊卑有序上下有差也命上公九􅀸爲伯其國家宫室車旌衣服禮儀皆以九爲節諸侯諸伯七命其國家宫室車旌衣服禮儀皆以七爲節子男五命其國家宫室車旌衣服禮儀皆以五爲節王之三公八命其􅀸六命其大夫四命及其封也皆加一等其國家宫室車旌衣服禮儀亦如之凡諸侯之適子省於天子攝君則下其君之禮一等未省則以皮帛繼子男公之孤四命以皮帛視小國之君其􅀸二命其大夫再命士一命其宫室車旌衣服禮儀各視其命之數侯伯之􅀸大夫士亦如之子男之􅀸再命其大夫一命其士不命其宮室車旌衣服禮儀各如其命之數禮大行人以九儀別諸侯之命等諸臣之爵以同域國之禮而行其賔主上公之禮執桓圭九寸繅籍九寸冕服九章建常九旒樊纓九就貳車九乗介九人禮九牢其朝位賔主之間九十歩饗禮九獻食禮九舉諸侯之禮執信圭七寸繅籍七寸冕服七章建常七旒樊纓七就貳車七乗介七人禮七牢其朝位賔主之間七十歩饗禮七獻食禮七舉諸伯執躬圭其他皆如諸侯之禮諸子執穀璧五寸繅籍五寸冕服五章建常五旒樊纓五就貳車五乗介五人禮五牢其朝位賔主之間五十歩饗禮五獻食禮五舉諸男執蒲壁其他皆如諸子之禮凡大國之孤執帛皮以繼小國之君諸侯之􅀸禮各下其君二等以下及大夫士皆如之天子之所以明章著此義者以朝聘之禮是故千里之内歲一見千里之外千五百里之内二歲一見千五百里之外二千里之内三歲一見二千里之外二千五百里之内四歲一見二千五百里之外三千里之内五歲一見三千里之外三千五百里之内六歲一見各執其圭端服其服乗其輅建其旌旂施其樊纓從其貳車委積之以其牢禮之數所以明別義也然後天子冕而執鎭圭尺有二寸藻籍尺有二寸搢大圭乗大輅建大常十有二旒樊纓十有再就貳車十有貳乗率諸侯而朝日東郊所以敎尊尊也退而朝諸侯爲壇三成宫旁一門天子南鄕見諸侯土揖庶姓時揖異姓天揖同姓所以別親䟽外内也公侯伯子男各以其旂就其位諸公之國中階之前北靣東上諸侯之國東階之東西靣北上諸伯之國西階之西東靣北上諸男之國門西北靣東上及其將幣也公於上等所以別貴賤序尊卑也奠圭降拜升成拜明臣禮也奉國地所出重物而獻之明臣職也肉祖入門而右以聽事也明臣禮職臣事所以敎臣也率而祀天於南郊配以先祖所以敎民報德不忘本也率而享祀於太廟所以敎孝也與之大射以考其習禮樂而觀其德行與之圖事以觀其能儐而禮之三饗三食三宴以與之習立禮樂是故一朝而近者三年逺者六年有德焉禮樂謂之益習德行謂之益修天子之命爲之益行然後使諸侯丗相朝交歲相問殷相聘以習禮考義正刑一德以崇天子故曰朝聘之禮者所以正君臣之義也諸侯相朝之禮各執其圭瑞服其服乗其輅建其旌旂施其樊纓從其貳車委積之以其牢禮之數所以別義也介紹而相見君子於其所尊不敢質敬之至也君使大夫迎于境􅀸勞于道君親郊勞致館及將幣拜迎於大門外而廟受北靣拜貺所以致敬也三讓而後升所以致尊讓也敬讓也者君子之所以相接也諸侯相接以敬讓則不相侵陵也此天子之所以養諸侯兵不用而諸侯自爲正之具也君親致雍旣還圭饗食致贈郊送所以相與習禮樂也諸侯相與習禮樂則德行修而不流也故天子制之而諸侯務焉聘禮上公七介侯伯五介子男三介所以明貴賤也介紹而傳命君子於其所尊不敢質敬之至也二讓而後傳命三讓而後入門三揖而後至階二讓而後升所以致尊讓也君使士迎于境大夫郊勞君親拜迎大門之内而朝受北靣拜貺拜君之辱所以致敬讓也致敬讓者君子之所以相接也故諸侯相接以敬讓則不相侵陵也􅀸爲上擯大夫爲丞擯君親醴賔私覿致饔餼旣還圭璋賄贈饗食燕所以明賔主君臣之義也故天子之制諸侯交歲相問殷相聘相厲以禮使者聘而誤主君不親饗食所以耻厲之也諸侯相厲以禮則外不相侵内不相陵此天子所以養諸侯兵不用而諸侯自爲正之具也以圭璋聘重禮也巳聘而還圭璋輕財重禮之義也諸侯相厲以輕財重禮則作讓矣主國待客出入五積旣客於舍五牢之具陳於内米三十車禾三十車蒭薪倍禾皆陳於外乗禽日五􅀟羣介皆餼牢壹食再饗宴與時賜無數所以厚重禮也古之用財不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則内君臣不相陵而外不相侵故天子制之而諸侯務焉古者大行人掌大賔之禮及大客之義以親諸侯春朝諸侯而圖天下之事秋覲比􅀖國之功夏宗以陳天下之謀冬遇協諸侯之慮時會以發四方之禁殷同以施天下之政時聘以結諸侯之好殷眺以成􅀖國之貳間問以諭諸侯之志歸脤以教諸侯之福賀慶以賛諸侯之喜致會以􅀘諸侯之災天子之所撫諸侯者歲徧在三歲徧眺五歲偏省七歲屬象胥喻言語計辭令九歲屬瞽史諭書名聽音聲十有一歲建瑞節同度量成牢禮同數噐修法則十有二歲天子廵狩殷國是故諸侯上不敢侵陵下不敢暴小民然後諸侯之國札䘮則令賻􅀘之凶荒則令賙委之師役則令槁禬之有福事則令慶賀之有禍災則令哀弔之凡此五物者治其事故及其利害爲一書其禮俗政事教治刑禁之逆順爲一書其悖逆暴亂作慝欲犯令者爲一書其禮俗政事貧爲一書其康樂和親安平爲一書凡此五物者毎國別異之天子以周知天下之政是故諸侯附於德服於義則天下太平古者天子爲諸侯不行禮義不修法度不附於德不服於義故使射人以射禮選其德行職方氏大行人以其治國選其能功諸侯之得失治亂定然後明九命之賞以勸之明九伐之法以震威之尚猶有不附於德不服於義者則使掌交􅀃故諸侯莫不附於德服於義者此天子之所以養諸侯兵不用而諸侯自爲政之法也投壺第七十八投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢峭壺請樂賔賔曰子有旨酒嘉肴又重以樂敢辭主人曰枉矢峭壺不足辭也敢以請賔曰某賜旨酒嘉肴又重以樂敢固辭主人曰枉矢峭壺不足辭也敢固以請賔對曰某固辭不得命敢不敬從賔再拜受主人般還曰避主人阼階上再拜送賔般還曰避以拜受矢進則兩楹間追反位揖賔就筵司射進度壺反位設中執八筭請于賔曰奏投壺之令曰順投爲入比投不釋筭勝飮不勝正爵旣行請爲勝者立馬三馬旣立慶多馬請主人亦如之命弦者曰請奏貍首間若一太師曰諾左右告矢具請拾投投人者則司射坐而釋一筭曰賔黨於右主黨於左率投司射執餘筭曰右左率投請數二筭爲純一純以取一筭爲奇有勝則司射以奇筭告曰某黨賢於某黨賢􅀂干純奇則曰奇鈞則曰左右鈞舉手曰諸勝者之弟子爲不勝者酌酌者曰諾以酌皆請舉酒當飮皆跪奉觚曰賜灌勝者跪曰敬養司正曰正爵旣行請爲勝者立馬各直其筭上一馬從二馬以慶慶禮曰三馬旣立請慶多馬賔主人皆曰諾正爵旣行請徹馬周則復始旣筭筭多少視其坐矢八分堂上七扶堂中五扶庭下九扶筭長尺二寸堂下司正司射庭長及冠士立者皆屬賔黨樂人及童子使者皆屬主黨降揖其阼階及樂事皆與射同節壺中置小豆爲其矢躍而去也壺去席二矢半以柘􅀂棘無去其皮大七分曾孫侯氏今曰泰射于一張侯叅之曰今曰泰射四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽質叅旣設執旌旣載干侯旣亢中獲旣置壺脰修七寸口徑二寸半壺高寸受㪷尺二五升壺腹修五寸弓旣平張四侯且良決拾有常旣順乃讓乃揖乃讓乃隮其堂乃節其行旣志乃張射夫命射射者之聲御車之旌旣􅀗卒莫凡雅二十六篇共八篇可歌歌鹿鳴貍首鵲巢采蘩采蘋伐檀白駒騶虞八篇廢不可歌七篇啇齊可歌也三篇間歌史辟史義史見史童史謗史賔拾聲叡挾魯命弟子辭曰無荒無慠無倨立無踰言􅀂是者有常爵嗟爾不寧侯爲爾不朝于王所故亢而射女強食食爾曾孫侯氏百福大戴禮記卷第十二
