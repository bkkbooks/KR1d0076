front:
  text: 大戴禮記卷第十一
  hash: sha256:6a37b2272ad8919c436e49dac2f94fe2897e0a8985a61c6ff80d3777e7bbefbf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_011-1a}
body:
  text: 小辨第七十四用兵第七十五少間第七十六小辨第七十四公曰寡人欲學小辨以觀於政其可乎小辨爲小辨給也子曰否不可社稷之主愛日曾子曰君子愛日以學書云日夜不遑也曰不可得學不可輕有所學不可以辨是故昔者先王學齊大道以觀於政天子學樂辨風別四方之風也制禮以行政政禁令也諸侯學禮辨官政以行事以尊事天子宮政不錯則百事不學也大夫學德別義别猶辨也矝行以事君矝猶也士學順學順成之道辨言以遂志致命遂志士之節也庶人聽長辨禁農以行力辨禁識刑憲也如此猶恐不濟奈何其小辨乎公曰不辨則何以爲政子曰辨而不小夫小辨破言小言破義小義破道道小不通通道必簡簡約也言約而有統易曰乹以易知坤以簡能是故循弦以觀於樂足以辨風矣爾雅以觀於古足以辨言矣迩近也謂依於雅頌孔子曰詩可以言可以怨迩之事父逺之事君多識爲獸草木之名也傳言以象反舌皆至可謂簡矣夫道不簡則不行不行則不樂易曰簡則易從易從則有功有功則可大可大則賢人之業夫亦固十祺之變由不可旣也而况天下之言乎公於十祺之中變數尚不可盡天下之言其可窮乎故至道以不言爲辨曰微子之言吾壹樂辨言子曰辨言之樂不􅀂治政之樂辨言之樂不下席治政之樂皇於四海夫政善則民􅀃民􅀃則歸之如流水親之如父母諸侯􅀄入而後臣之安用辨言公曰然則吾何學而可子曰禮樂而力忠信其君其習可乎公曰多與我言忠信而不可以入患備與我言忠信而使不入於患子曰毋乃旣明忠信之備而口倦其君則不可而有謂言而不行明忠信之備而又能行之則可立待也君朝而行忠信百官承事忠滿於中而發於外刑於民而放於四海天下其孰能患之言所推無不公曰請學忠信之備子曰唯社稷之主實知忠信􅀂丘也綴學之徒安知忠信公曰非吾子問之而焉也焉問之乎子三辭將對公曰彊避謂避彊也一曰公以夫子三辭欲避左右之彊者也子曰彊侍丘聞大道不隱言不可隱蔽也丘言之君發之於朝行之於國一國之人莫不知何一之彊辟丘聞之忠有九知知忠必知中能内思自盡也知忠必知恕能自盡知故能知人知恕必知外内恕故外能處於度物也外知必知德知德必知政知政必知官知官必知事知事必知患知患必知備􅀂動而無備患而弗知死亡而弗知安與知忠信内思畢必曰知中中以應實曰知恕内恕外度曰知外外内叅意曰知德以柔政曰知政正義辨方曰知官官治物則曰知事事戒不虞曰知備毋患曰樂樂義曰終於知事而趍言知備者因義言之足明於上也用兵第七十五公曰用兵者其由不祥乎祥善子曰胡爲其不祥也聖人之用兵也以禁殘止􅁀於天下也言非利金攘王將以存亡繼絶平天下之亂也及後丗貪者之用兵也以刈百姓危國家也刈剪公曰古之戎兵何丗安起子曰傷害之生久矣與民皆生人合五常之氣生有喜則和親怒則離害其相害者皆曰兵也公曰􅃖尤作兵與子曰否􅃖尤庶人之貪者也云􅃖尤古之諸侯或妄耳一曰衆人之貪者也及利無義不顧厥親以䘮厥身􅃖尤惽慾而無猒者也何器之能作蜂蠆挾螫亡如蜂蠆之挾毒也而生見害謂黃帝殺之於􅃰鹿之野而校以衞厥身者也正敎習干戈自衞身非作者也人生有喜怒故兵之作與民皆生聖人利用而彌之亂人興之䘮厥身詩云魚在在藻厥志在餌由心在於利用兵以取危蓋逸詩也鮮民之生矣不如死之久矣小雅蓼莪之三章也亦困於兵革之詩也校德不塞嗣武孫武子言用上二章但用兵革䘮除其德不以塞亂而徒傳續武事於子孫者也聖人愛百姓而憂海内及後世之人思其德必稱其仁故今之道堯舜禹湯文武者猶威致王今􅀂存夫民思其德必稱其人朝夕祝之升聞皇天上神歆焉故永其丗而豐其年也夏桀啇紂羸暴於天下暴極不辜殺戮無罪詩云無罪無􅇳亂如此憮不祥于天粒食之民布散厥親雖諸夏能相養踈遠國老幼色是與言踈逺老成而與幼色者若楚㳟王逺由叔時而用子反也而暴慢是親讒貸處􅂖千乗曰以射投長曰貸􅂖祿也法言法行處辟辟罪辟也殀替天道逆亂四時禮樂不行而幼風是御任童幼之人使專政曆失制君臣昏亂時􅀱錯緒攝提失方攝提左右六星與十應相直􅁪指中氣尚書中􅀱曰攝提移居鄒大無紀􅀖當字誤爲鄒或深聲爲鄒也不告朔於諸侯周禮太師職曰正歲年以序顔之于官府及都鄙頒告干􅀖國也玉瑞不行王者所以等神秪別人事其用重焉諸侯力政不朝於天子言以威力侵争周書力政則無讓無讓則無禮禮雖得所好民皆樂之乎六蠻四夷交伐於中國周禮職方氏四夷八蠻七閩九貉五戎六狄此周所伏四海其種落之數也明堂位曰九夷八蠻六戎五狄此朝明堂時來者數國也爾雅曰九夷八狄七戎六蠻其夏之所伏與殷之夷國東方十南六西方九北方十有三然鄭玄以西夷爲君則不可公曰師之而不言情焉其私不同言巳師禮事天子故不使言情也其私人不同於此也子曰否臣事君而不言情於君則不臣君而不言情於臣則不君有臣而不臣猶可有君而不君民無所錯手足公曰吾度其上下咸通之使上下皆逹也權其輕重居之謂事後及刑罰准民之色目旣見之皷民之聲耳旣聞之動民之德心旣和之通民之欲兼而壹之言皆稱百姓之欲也愛民親賢而教不能民庶􅀃乎子曰􅀃則􅀃矣可以爲家不可以爲國公曰可以爲家胡爲不可以爲國國之民家之民也子曰國之民誠家之民也然其名異不可同也同名同食曰同等名位不同禮亦異數唯不同等民以知極周禮大司徒職曰以儀辨等則民不越也故天子昭有神於天地之間以示威於天下也祭法曰有天下者事百神諸侯脩禮於封内以事天子大夫修官守職以事其君士修四衞執技論力以聽乎大夫四衞四方之職曲禮曰地廣大荒而不治此亦士之辱也庶人仰視天文俯視地理力時使以聽乎父母孝經曰用天之道分地之利謹身節用以養父母此庶人之孝者也此唯不同等民以可治也公曰善哉上與下不同乎子曰將以時同時不同言有可同不可同也上謂之閑下謂之多疾不正之政君謂閑民謂之多疾同所惡也君時同於民布政也施善政也民時同於君服聽也上下相報而終於施施恩施也大猶巳成發其小者逺猶巳成發其近者逺大之謀縁近小治將行重噐先其輕者將待重噐必先効輕者亦以於政也先清而後濁者天地也清濁謂隂陽也天政曰正地政曰生人政曰辨辨別苟本正則華英必得其節以秀孚矣言專陽則正華英也得隂陽之孚秀也此官民之道也宫人當取終始公曰善哉請少復進焉子曰昔堯取人民狀觀其容狀施發舜取人以色禹取人以言湯取人以聲文王取人以度觀其志度此四代五王之取人以治天下如此四代據文距殷或曰文王取人以度四代謂兼之也公曰嘻善之不同也嘻歎惜之聲公謂五王取人德有不同也子曰何爲其不同也公曰同乎子曰同公曰人狀可知乎問四代以人狀得善之事子曰不可知也公曰五王取人各有以舉之胡爲人之不可知也子曰五王取人比而視相而望五王取人各以巳焉是以同狀聖王通而虚巳故於求人雖言色不同而善惡無異公曰以子相人何如子曰否丘則不能五王取人言又能如五王丘也傳聞之以委於君丘則否能傳聞而巳不能如也亦又不能又不能備問也公曰我聞子之言始蒙矣自言􅀩亂子曰由君配天脩德使力民明教通于四海海之外肅愼北發渠搜氐羗來服禹崩十有七世乃有末孫桀即位桀不率先王之明德乃荒躭于酒淫泆于樂德昏政亂作宫高臺淮南子云桀爲琁宫瑶臺象筋玉柸也汙池土察汁深也察深也言洞地爲池也以民爲虐呈其濫酷粒食之民惛焉幾亡乃有啇履代興履湯名論語曰履敢用玄壯王侯丗家曰湯名天乙白虎通曰湯王之後更走名爲子孫法本名履也啇履循禮法以觀天子天子不􅀃則嫌於死成湯怒至於亂成湯卒受天命不忍天下粒食之民刈戮不得以疾死故乃放移夏桀散亡其佐伐之於南巢放之於夏官而去有末孫紂即位紂不率先王之明德乃上祖夏桀行荒躭于酒淫泆於樂德昏政亂作宫室高臺謂傾宫鹿臺之等也汙池土察以爲民虐粒食之民忽然幾亡乃有周昌霸諸侯以佐之紂不􅀃諸侯之聽於周昌別嫌於死乃退伐崇許魏以客事天子許魏不在五代蓋時小代也客事天謂忍而臣之也文王卒受天命作物配天制無用行三明親親尚賢民明敎通于四海海之外肅愼北發渠搜氐羗來服君其志焉或傒將至也君哀公也言今周衰之甚有流之者將至也公曰大哉子之教我政也列五王之德煩煩如繁諸乎煩者也如繁者言如萬物之繁蕪也子曰君無譽臣臣之言未盡請盡臣之言君如財之曰於此有功匠焉王非獨善言有師保有利噐焉言有先王之禮度也有措扶焉謂服胘之良也以時令其藏必周宻發如用之易曰藏噐於身待時而發可以知古可以察今可以事親可以事君可用于生又用之死吉凶並興禍福相生言職其並興及相之義老子曰福兮福所倚福兮禍所伏也卒反生福大德配天終爲福德以配於天公愀然其色變容色也曰難立哉子曰臣願君之立知如以間觀也觀君博聞以立知焉時天之氣用地之財以生殺於民民之死不可以教謂􅇳極可以苟免也公曰我行之其可乎子曰唯此在君言行此在君也君曰足臣恐其不足未足而君謂足則臣恐未足告以不足也君曰不足實足可行而君曰不足則臣云足可謂可否也舉其前必舉其後舉其左必舉其右君旣敎矣安能無善君道之則民應以善公吁焉其色曰大哉子之敎我制也政之豐也如木之成也子曰君知未成言未盡也凢草木根鞁傷則枝葉必徧枯敗當字誤爲鞁偏枯是爲不實􅂖亦如之民以爲君爲本上失政大及小人畜􅂖􅂖敗失則傷及人物公曰所謂失政者􅀂夏啇之謂乎子曰否若夏啇者天奪之魄不生德焉言天地絶夏啇之餘民乃興周之績春秋左氏傳天奪其􅅎有生之􅅎公曰然則何以謂失政子曰所謂失政者疆蔞未虧言疆哉與草木皆未易於常也人民未變􅀑神未亡民神猶依附之水土未絪絪猶亂韓詩外傳曰隂陽相勝氛祲絪氲也糟者猶糟實者猶實精以諭惡實以諭善亦言善惡之物仍錯亂也玉者猶玉玉以諭善人言尚賢其賢血者猶血酒者猶酒血憂色也酒以諭樂猶憂其可憂而樂其所樂優以繼愖政出自家門此之謂失政也愖猶忍也言天下安然人物不亂方優佚樂繼之出其忍政也非天是反人是反臣故曰君無言情於臣君無假人噐君無假人名春秋左傳日唯噐與名不可以假人者也公曰善哉卷終大戴禮記卷第
