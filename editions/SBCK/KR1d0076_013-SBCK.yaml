front:
  text: 大戴禮記卷第十三
  hash: sha256:8f9c9bfd53fba4d3c6bd2573a89469b7d7334d630cf3f6cf135b6ca9a194c31e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_012-9b}
body:
  text: 公符第七十九本命第八十易本命第八十一公符第七十九公符自爲主迎賔揖升自阼立于席入堂深異於上旣醴降自阼君尊故其降也不使就賔阼也其餘自爲主者其降也自西階以異不敢終於正其餘皆公同也爲迎賔升作之等公玄端以皮弁皆鞸玄端緇布冠及玄冠之服也王藻曰始冠緇布之冠自諸侯逹官而弊之可二服皆鞸也古者田狩而食其肉衣其皮先以兩皮如鞸以蔽其前後及後丗聖人易之以布帛猶存其蔽前示不忘古尊祭服異其名曰鞸其制上廣一尺下廣二尺長三尺其徑五寸肩博二寸朝服素鞸玄端諸侯之服皮弁天子朝服必從常色皆表也公冠四加􅀇冕四當爲三􅀇當爲衮字之誤饗之以三獻之禮饗賔也上於賔以一獻之禮也無介於饗而賛冠者退爲衆賔者君禮於臣本無介矣無樂亦饗時也冠者成人代父始宜盡孝子之感不可以歡樂取之孔子曰娶婦三日不舉樂思嗣親然則冠禮一舉樂可也春秋左氏傳曰以金石之樂節之謂之冠時爲節也皆􅀇端君臣同服其醻幣朱錦采四馬其慶也其慶賔也如是天子儗焉儗公禮也太子與庶子其冠皆自爲主王侯自主之重言太子誤也家語曰王太子庶子之冠儗爲非也其禮與士同饗賔也皆同士冠禮記曰天子之元子猶士也天下無生而貴者也成王冠周公使祝雍祝王雍太祝定左與王爲祝辭於冠告焉曰逹而勿多也舜多則史少則不逺祝雍曰使王近於民逺於年少則視民不逹而嗇於時惠於財及時而施親賢使能陛下離顯先帝之光耀離明也以承皇天嘉禄欽順仲夏之吉曰古者冠以仲春遵並大道邠或邠或當爲芬或聲字之誤也秉集萬福之休靈始加昭明之元服推逺稚免之幼志免猶弱也崇積文武之寵德文章帝武皇帝肅勤高祖清廟高祖高皇帝也六合之内靡不息陛下永永與天無極凡一百孝昭冠辭漢孝昭帝冠辭皇皇上天照臨下土集地之靈降甘風􅀨禮運曰地東隂竅於山川庶物群生各得其所靡今靡古言覆施均維予一人某敬拜皇天之祐古祝辭則云嗣王某或曰一人某王者親告之辭也薄薄之土承天之神溥旁薄也易曰乃順承天也興甘風􅀨庶卉百榖莫不􅌗者旣安且寧維予一人某敬拜下土之靈維某年某月上日年謂太歲所在月正月也其天地祝辭皆爾省文故曰下明之也明光于上下勤施于四方旁作穆穆惟予一人某敬拜迎于郊以正月朔日迎日於東郊古者帝王以正月朝聘率有司迎日于東郊也所以爲萬品先而尊事天也本命第八十分於道謂之命道爲冥化自然之道也人莫違焉或分得其長分得其短其變修促謂之命也孔子曰死生有命形於一謂之性刑法象也凡人禀於木則象之以仁受於金則以義孔子曰天命之爲性性者資於未生之前發於旣生之後原其所故於此言之化於隂陽􅁚形而發謂之生象微昧易曰男女搆精萬物化生也化窮數盡謂之死化窮者身也數盡者年也故命者性之終也命􅀄分於道則是生之始也分道則修短巳定故爲生之終是以始末舉也則必有終矣人生而不具者五目無見不能食不能行不能言不能化三月而徹盷盷精也轉視貌徹或爲微也然後能有見八月生齒然後食㫷而生臏然後能行三年暿合然後能言三月萬物一成期年天道一備三年而天道大成故因之以變化也十有六情通然後能化隂窮反陽陽窮反隂夏至陽往隂動冬至隂消陽息辰故隂以陽化陽以隂變故男以八月而生齒八歲而毀齒一隂一陽然後成道易曰一隂一陽之謂道也二八十六然後情通然後其施行施道行道女七月生齒七歲而毀二七十四然後其化成化道成陽施而隂化亦天也之道也合於三也小節也男女合於三十中古男三十而娶女二十而嫁合於五也中節也合於五十太古男五十而室女三十而嫁備於三五合於八八也備三五十合於八十也不言大節省文案周禮媒氏職曰令男三十而娶女二十而嫁内則曰二十而冠三十而有室十五笄二十而嫁尚書大傳曰男三十而娶女二十而嫁書曰有鰥在下曰虞舜䘮服爲夫之姑姉妹之長殤然則古者皆以二十三十爲㛰姻之年十六十四爲嫁娶之期今有三十五十創非也故譙周六師言此􅀃近漢􅀄學者所續焉八者維剛也天地以發明故聖人以合隂陽之數也八爲方維八卦之數也天地以之明聖人以之合隂陽九六大􅄛之數也禮義者恩之主也冠婚朝聘䘮祭賔主鄕飮酒軍旅此之謂九禮也君臣冠婚朝聘五也䘮祭七也􅀸飮賔主八也軍旅九也禮經三百禮經統於心也威儀三千曲禮也行於貌也机其文之變也机危也謂二禮動行九事皆有其文毎變不同也其文變也禮之象五行也其義四時也象五行謂内外爵與五服義冝也故以四舉有恩有義有節有權恩厚者其服重故爲父斬衰三年以恩制者門内之治恩掩義門外之治義斷恩資於事父以事君而敬同貴貴尊尊義之大者也故爲君亦服斬衰三年以義制者也貴貴謂爲大夫君尊尊謂爲太子諸侯也三日而食食食粥也三月而沐將虞時㫷而練毀不㓕性不以死傷生䘮不過三年苴衰不􅀘異於吉無飾也墳墓不坯同於丘陵除之日皷素琴漸有終因省哀示民有終也以節制者也資於事父以事母而愛同天無二曰國無二君家無二尊以治之也父在爲母齊衰朞見無二尊也百官備百制具不言而事行者扶而起謂天子諸侯言而後事行者扶而起謂士大夫身自執事而後事行者靣詬而巳謂庶人凡此以權利者也始死三日不怠三月不解朞悲號三年憂恩之教也東夷二連其所不懈不怠者哭不絶聲不懈者不脫絰帶也聖人因教以制節也爲卒哭祥禫之變男者任也子者孳也男子者言任天地之道如長萬物之義也故謂之丈夫丈者長也夫者扶也言長萬物也知可爲者知不可爲者知可言者知不可言者知可行者知不可行者是故審論而明其別謂之知所以正夫德者女者如也子者孳也女子者言如男子之教而長其義理者也故謂之婦人婦人仗於人也是故無專制之義有三從之道在家從父適人從夫夫死從子無所敢自遂也從其教令故令不出閨門事在饋食之間而巳矣易曰無由遂在中饋詩云無非無儀惟酒食是議也是故女及日乎閨門之内專其志且逺嫌不百里而犇䘮言及日故絰成見星事無獨爲行無獨成之道叅知而後動可驗而後言宵夜行燭宫事必量六畜蕃于宮中謂之信也如此乃爲信固也所以正婦德也女有五不取逆家子不取亂家子不取亂􅁋亂也丗有刑人不取丗有惡疾不取䘮婦長子不取逆家子者爲其逆德也亂家子者爲其亂人倫也丗有刑人者爲其弃於人也丗有惡疾者爲其弃於天也䘮婦長子者爲其無所受命也婦有七去不順父母去無子去淫去妬去有惡疾去多言去竊盜去不順父母去爲其逆德也無子爲其絶丗也淫爲其亂族也妬爲其亂家也有惡疾爲其不可與共粢盛也口多言爲其離親詩云婦爲長古惟厲之階盜竊爲其反義也婦有三不去有所取無所歸不去與更三年䘮不去前貧賤後富貴不去大罪有五逆天地者罪及五丗欺造次及要君者誣文武者罪及四丗非聖人者逆人倫者罪及三丗非孝者此皆大亂之道也誣􅀑神者罪及二丗殺人者罪止其身周書曰大命丗小命身故大罪有五殺人爲下易本命第八十一子曰夫易之生人禽獸萬物昆蟲各有以生易曰渾元之始是曰大易二象之所資萬品之所生易曰易有太極是主兩儀生四象四象生八卦易􅀃卦曰太易者未有見氣也太􅀄者氣之始太素者質之始也禮運曰夫禮必本於太一分而爲天地轉而爲隂陽變而爲四時然禮易之􅀃雖殊而㑹歸或奇或偶或飛或行而莫知其情惟逹道德者能原本之矣孔子曰聖人智通於大道應化而不窮能測萬品之情也天一地二人三三三而九九九八十一一主日天之神日爲尊日數十甲乙之属故人十月而生萬􅀋人爲貴也八九七十二偶以承奇貴偶用奇奇主辰辰方靣各三也辰主月月主馬月契天駟於上馬統乾於下故馬十二月而生七九六十三三主升豕以日月升主狗升之次以狗故擇人也狗三月而生六九五十四四主時時主豕豕知時詩云有豕白蹢烝渉波矣故豕四月而生五九四十五五主音音主猨故猨五月而生四九三十六六主律律主禽鹿麋鹿角長短大小似律故禽鹿六月而生也麏麋之属皆以六月生也宋均曰所以苟者多故舉禽獸之名雖有飛走之異其亦通也三九二十七主星二十八􅀫方各七星主虎虎炳文似星也故虎七月而生二九十八八主風風之大數盡於八也風之蟲蟲有蟄見似風動息也故蟲八月化也蟲多生非􅀋也其餘各以其􅀋也謂貍兎魚鼈之属各以其􅀋化者言亦有生而生之也鳥魚皆生于隂而属於陽生於隂者謂􅆑生也属於隂者謂飛游於虚也故鳥魚皆􅆑魚游于水鳥飛于雲釋也事也故冬鷰雀入于海化而爲蚧以同生于隂而属於陽故有其形性也萬物之性各異􅀋故􅁞食而不飮蟬飮而不食蜉蝣不飮不食淮南子曰􅁞食而不飮三十二日而化蟬飮而不食三十日而死蜉蝣不飮不食三日而終也介鱗夏食冬蟄熊羆魚蛇之属齕蚕者八竅而􅆑生鳥属也凢物之有異􅀋者韓詩内傳曰鶬鴿胎生孔子渡江見而異之者乎咀嚾者九竅而胎生人及獸属異物志又曰狸十有一種囊狸􅆑生也四足者無羽翼戴角者無上齒董仲舒曰受於大者不取於小無角者膏凝者爲膏而無前齒無前齒者齒盛於後不用前也有羽者脂譯者爲脂也巳而無後齒齒盛於前不任後也晝生者􅀋父夜生者􅀋母至隂至陽􅀋其多也至隂爲男至陽爲女者即隂窮反陽陽窮反隂之義凡地東西爲緯南北爲經山爲積德川爲積刑山積陽川積隂陽爲德隂爲刑高者爲生下者爲死丘陵爲牡谿谷爲牝蜯蛤􅀛珠與月盛虚月者太隂之精故􅀛蛤之属因之以盛虧吕氏春秋曰日月望則蜯始實月晦則蜯蛤虚孝經授神契曰日月属於天則隂􅀋消於淵也是故堅土之人肥虚土之人大肥者象也堅實大者象地虚緃也沙土之人細沙土養細乃薄息土之人美耗土之人醜息土謂沃之田耗土謂䟽薄之地地有美惡故生人有好醜也周禮若司徒職曰山林之民毛而方川澤之民黒而津丘陵之民博而長墳􅄛之民晢而瘠原隰之民豐肉而痺此大辨五土之分是故食水者善游能寒魚鼈之属食土者無心而不息蚯蚓之属不氣息也大魚無耳而聽蟋蟀無口而鳴皆自然之性食木者多力而拂熊犀之属揣戻也食草者善走而愚麋鹿之属食桑者有􅁝而蛾食肉者勇敢而捍虎狼鷹鶻之属食􅂖者智惠而巧食氣者神明而壽王喬赤松之􅀋也西極亦有食氣之民也不食者不死而神甲於道者則伸而常存也故曰有羽之蟲三百六十而鳳凰爲之長有毛之蟲三百六十而麒麟爲之長有甲之蟲三百六十而神􅀛爲之長有鱗之蟲三百六十而蛟龍爲之長倮之蟲三百六十而聖人爲之長此乾坤之美􅀋禽獸萬物之數也三百六十乾坤之中央萬二千五百二十當萬物之數也故帝王好壞巢破夘則鳳凰不翔焉好竭水搏魚則蛟龍不出焉好刳胎殺夭則麒麟不來焉好塡谿塞谷則神􅀛不岀焉故王者動必以道静必以理動不以道静不以理則自夭而不壽訞㜸數起神靈不見風􅀨不時暴風水旱並興人民夭死五􅂖不滋六畜不蕃息大戴禮記卷第十三終嘉靖癸巳吴郡袁氏嘉􅃐堂重彫
