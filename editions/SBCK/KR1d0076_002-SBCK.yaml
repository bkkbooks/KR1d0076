front:
  text: 大戴禮記卷第二
  hash: sha256:87aceeedac9bac7a2699eca679da5505c9e9e7c64c5674ba6ad73680a89844bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_002-1a}
body:
  text: 禮察第四十六夏小正第四十七禮察第四十六孔子曰君子之道譬猶防與夫禮之塞亂之所從生也猶防之塞水之所從來也故以舊防爲無用而壞之者必有水敗以舊禮爲無所用而去之者必有亂患故婚姻之禮廢則夫婦之道苦而淫辟之罪多矣鄕飮酒之禮廢則長㓜之序失而爭􅃲之獄繁矣聘射之禮廢則諸侯之行惡而盈溢之敗起矣䘮祭之禮廢則臣子之恩薄而倍死忘生之禮衆矣凡人之知能見巳然不能見將然禮者禁將然之前而法者禁於巳然之後是故法之用易見而禮之所爲生難知也若夫慶賞以勸善刑罰以懲惡先王執此之正堅如金石行此之信順如四時處此之功無私如天地爾豈顧不用哉然如曰禮云禮云貴絶惡於未萌而起敬於微眇使民日徙善逺罪而不自知也孔子曰聽訟吾猶人也必也使無訟乎此之謂也爲人主計者莫如安審取舍取舍之極定於内安危之萌應於外也安者非一日而安也危者非一日而危也皆以積然不可不察也善不積不足以成名惡不積不足以滅身而人之所行各在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨倍禮義積而民和親故丗主欲民之善同而所以使民之善者異或導之以德教或歐之以法令導之以德教者德教行而民康樂歐之以法令者法令極而民哀戚哀樂之感禍福之應也我以爲秦王之欲尊宗廟而安子孫與湯武同然則如湯武能廣大其德久長其後行五百歲而不失秦王亦欲至是而不能持天下十餘年即大敗之此無佗故也湯武之定取舍審而秦王之定取舍不審也易曰君子愼始差􅀂毫􅁵繆以千里取舍之謂也然則爲人主師傅者不可以日夜明此問爲天下如何曰天下器也今人之置器置諸安處則安置諸危處則危而天下之情與器無以異在天子所置爾湯王置天下於仁義禮樂而德澤洽禽獸草木廣育􅀍蠻貊四夷累子孫十餘丗歷年久五六百歲此天下之所共聞也秦王置天下於法令刑罰德澤無一有而怨毒盈丗民憎惡如􅄷讎旤幾及身子孫誅絶此天下之所共見也夫用仁義禮樂爲天下者行五六百歲猶存用法令爲天下者十餘年即亡是非明斆大驗乎人言曰聽言之道必以其事觀之則言者莫敢妄言今子或言禮義之不如法令教化之不如刑罰人主胡不承殷用秦事以觀之乎夏小正第四十七正月啓蟄言始發蟄也鴈北鄕先言鴈而後言鄕者何也見鴈而後數其鄕也鄕者何也鄕其居也鴈以北方爲居何以謂之爲居生且長焉爾九月遰鴻鴈先言遰而後言鴻鴈何也見遰而後數之則鴻鴈也何不謂南鄕也曰非其居也故不謂南鄕記鴻鴈之遰也如不記其鄕何也曰鴻不必當小正之遰者也雉震呴震也者鳴也呴也者皷其翼也正月必雷雷不必聞惟雉爲必聞之何以謂之雷則雉震呴相識以雷魚陟􅀒冰陟升也􅀒􅖅云者言解蟄也農緯厥耒緯束也束其耒云爾者用是見君之亦有耒也􅀄歲祭耒始用暢也暢一作晹其用初云爾暢也者終歲之用祭也言是月之始用之也􅀄者始也或曰祭韭也囿有韭囿也園之燕者也時有俊風俊者大也大風南風也何大於南風也曰合冰必於南風解冰必於南風生必於南風収必於南風故大之也寒曰滌凍塗滌也者變也變而煖也凍塗者凍下而澤上多也田䑕出田䑕者嗛䑕也記時也農率均田率者循也均田者始除田也言農夫急除田也􅆩祭魚其必與之與疑作謂獻何也曰非其􅀋也祭也者得多也善其祭而後食之十月犲祭獸謂之祭􅆩祭魚謂之獻何也犲祭其􅀋􅆩祭非其􅀋故謂之獻大之也鷹則爲鳩鷹也者其殺之時也鳩也者非其殺之時也善變而之仁也故其言之也曰則盡其辭也鳩爲鷹變而之不仁也故不盡其辭也農及雪澤言雪澤之無高下也􅀄服于公田古有公田焉者古言先服公田而後服其田也采芸爲廟采也鞠則見鞠者何也星名也鞠則見者歲再見爾􅀄昏參中蓋記時也云斗柄縣在下言斗柄者所以著參之中也栁梯梯也者發孚也梅杏杝桃則􅂠杝桃山桃也緹縞也者莎隨也緹也者其實也先言緹而後言縞者何也緹先見者也何以謂之小正以著名也鷄桴粥粥也者相粥之時也或曰桴嫗伏也粥養也二月往耰􅁰禪禪單也􅀄俊羔助厥母粥俊也者大也粥也者養也言大羔能食草木而不食其母也羊羔非其子而後養之善養而記之也或曰憂有煑祭祭也者用羔是時也不足喜樂喜羔之爲生也而記之與羊牛腹時也綏多女士綏安也冠子取婦之時也丁亥萬用入學丁亥者吉日也萬也者干戚舞也入學也者大學也謂今時大舍采也祭鮪祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時榮黃菜色菜繁田胡繁田胡者繁母也繁萬勃也皆豆實也故記之昆小䖝抵蚳昆者衆也田魂螺也者動也小蟲動也其先言動而後言蟲者何也萬物是動而後著括猶推也蚳螘􅆑也爲祭醢也取之則必推之推之必不取取必推而不言取來降燕乃睇燕乙也降者下也言來者何也莫能見其始出也故曰來降言乃睇何也睇者眄也眄者視可爲室者也百鳥皆曰巢突穴取與之室何也摻泥而就家人人内也剝鱓以爲皷也有鳴倉庚倉庚者商庚也商庚者長股也榮芸時有見梯始􅀵有見梯而後始􅀵是小正序也小正之序時也皆􅀂是也梯者所爲豆實三月參則伏伏者非忘之辭也星無時而不見我有不見之時故曰伏云攝桑桑攝而記之急桑也委委一作萎楊楊則花而後記之䍷羊羊有相還之時其􅀋䍷䍷然記變爾或曰䍷羝也􅕪則鳴􅕪天螻也頒冰頒冰者分冰以授大夫也采識識草也妾子始􅁞先妾而後子何也曰事有漸也言自卑事者始執養宫事執操也養長也祈麥實麥實者五榖之先見者故急祈而記之也越有小旱越于也記是時恒有小旱田䑕化爲駑駑鵪也變而之善故盡其辭也駑爲䑕變而之不善故不盡其辭也拂桐芭拂也者拂也桐芭之時也或曰言桐芭始生貌拂拂然也鳴鳩言始相命也先鳴而後鳩何也鳩者鳴而後知其鳩也四月􅄧則見􅀄昏南門正南門者星也歲再見壹正蓋大正所取法也鳴扎扎者寧縣也鳴而後知之故先鳴而後扎囿有見杏囿者山之燕者也鳴蜮蜮也者或曰屈造之屬也王萯莠取荼荼也者以爲君薦蔣也莠幽越有大旱記時爾執陟攻駒執也者始執駒也執駒也者離之去母也執而升之君也攻駒也者教之服車數舍之也五月參則見參也者牧星也故盡其辭也浮游有殷殷衆也浮游殷之時也浮游者渠略也朝生而暮死稱有何也有見也鴂則鳴鴂者百鷯也鳴者相命也其不辜之時也是善之故盡其辭也時有養白養長也一則在本一則在末故其記曰時養曰之也乃􅀲乃者急􅀲之辭也􅀲也者始食􅀲也良蜩鳴良蜩也者五采具匽之興五日翕望乃伏其不言生而稱興何也不知其生之時故曰興以其興也故言之興五日翕也望也者月之望也而伏云者不知其死也故謂之伏五日也者十五日也翕也者合也伏也者入而不見也啓灌藍蓼啓者別也陶而䟽之也灌者聚生者也記時也鳩爲鷹唐蜩鳴唐蜩鳴者匽也初昏大火中大火者心也心中種􅁰菽糜時也煑梅爲豆實也蓄蘭爲沐浴也菽糜以在經中又言之時何也是食矩􅀜而記之頒馬分夫婦之駒也將間諸則或取離駒納之則法也矩􅀜一作短閔夫婦一作夫􅀸六月初昏斗柄正在上五月大火中六月斗柄正在上用此見斗柄之不在當心也蓋當依依尾也煑桃桃也者杝桃也杝桃也者山桃也煑以爲豆實也鷹始摯始摯而言之何也諱煞之辭也故摯云七月莠雚葦未莠則不爲雚葦莠然後爲雚葦故先言莠捚子肇肆肇始也肆遂也言其始遂也其或曰肆殺也湟潦生苹湟下處也有湟然後有潦有潦而後有苹草也爽死爽也者猶䟽也苹莠苹也者有馬帚也漢案戸漢也案戸也者直戸也言正南北也寒蟬鳴蟬也者蝭􅧽也初昏織女正東鄕時有霖雨灌荼灌聚也荼雚葦之莠爲蔣楮之也雚未秀爲菼葦未秀爲蘆斗柄縣在下則旦八月剝􅀲畜􅀲之時也􅀇校􅀇也者黒也校也者若綠色然婦人未嫁者衣之剝棗剝也者取也粟零零也者降也零而後取之故不言剝也丹鳥羞白鳥丹鳥者謂丹良也白鳥者謂蚊蚋也其謂之鳥也重其養者也有翼者爲鳥羞也者進也不盡食也辰則伏辰也謂星也伏也者入而不見也鹿人從者從群也鹿之養也離群而善而之離而生非所知時也故記從不記離君子之居幽也不言或曰人人從也者大者於外小者於内率之也駑爲䑕參中則旦九月内火内火也者大火大火也者心也遰鴻鴈遰往也主夫出火主夫也者主以時縱火也陟􅀇鳥蟄陟升也􅀇鳥者鷰也先言陟而後言蟄何也陟而後蟄也熊罷貊貉鼬鼪則大若蟄而榮鞠鞠草也鞠榮而樹麥時之急也王始裘者何也衣裘之時也辰繫于曰雀入于海爲蛤蓋有矣非常入也十月豺祭獸善其祭而後食之也􅀄昏南門見南門者星名也及此再見矣黑烏浴者何也烏浴也者飛乍高乍下也時有養者長也若曰之長也玄雉入于淮爲蜄蜄者蒲蘆也織女正北鄕則具織女星名也十有一月王狩狩者言王之時田冬獵爲狩陳肋革陳筋革者省兵甲也嗇人不從不從者弗行於時月也萬物不通隕麋角隕墜也曰冬至陽氣至始動諸向生皆蒙蒙符矣故麋角隕記時焉爾十有二月鳴弋弋也者禽也先言鳴而後言弋者何也鳴而後知其弋也􅀇駒賁􅀇駒也者螘也賁者何也走於地中也納􅆑䔉􅆑䔉也者本如􅆑者也納者何也納之君也虞人入梁虞人官也梁者主設􅘩罟者也隕麋角蓋陽氣旦暏也故記之也大戴禮記卷第二
