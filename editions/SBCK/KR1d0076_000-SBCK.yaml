body:
  text: 右大戴禮十三卷總四十篇隋志所載亦十三卷而夏小正別爲卷唐志但云十三卷而無夏小正之別矣崇文總目則十卷而云三十五篇無諸本可正定也蓋自漢興得先儒所記禮書凡二百四篇戴德刪之爲八十五篇謂之大戴禮戴聖又刪德之書爲四十九篇謂之小戴禮今立之學官者小戴書也然大戴篇始三十九終八十一當爲四十三篇中間缺者四篇而重出者一篇兩篇七十三其上不見者猶三十八篇復不能合於八十五篇之數豈但當爲八十一耶其缺者或旣逸其不見者抑聖所取者也然哀公問投壺二篇與小戴書無甚異禮察篇與經解亦同曾子大孝篇與祭義相似則聖巳取之篇豈其文無所刪者也勸學禮三本見於荀􅀸子至取舍之􅀃及保傅則見於賈誼䟽間與經子同者尙多有之按儒林傳德事孝宣甞爲信都太傅聖則爲九江太守今德書乃題九江太守未知何所據也大抵漢儒所傳皆出於七十子之徒後之學者僅習小戴記不知大戴書多矣其探索隂陽窮析物理推本性命雜言禮樂之辨器數之詳必有自來以是知聖門之學無不備也予家舊傳此書嘗得范太史家一本校之篇卷悉同其訛缺謬誤則不敢改益懼其寖久而傳又加舛也乃刋置建安郡齋庶可攷焉淳熈乙未歲後九月潁川韓元吉書
