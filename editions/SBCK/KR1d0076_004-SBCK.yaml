  text: 大戴禮記卷第四
  hash: sha256:b01282c3231f1d0408ed9ac317081d259f17a616d2caec43e86d597a9c6fd3e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_004-1a}
body:
  text: 曽子立事第四十九曽子本孝第五十曽子立孝第五十二曽子大孝第五十二曽子事父母第五十三曽子立事第四十九曽子曰君子攻其􅁖計其失求其過省其身彊其所不能去私欲從事於義可謂學矣君子愛日以學及時以行難者弗辟易者弗從唯義所在日旦就業夕而自省思以殁其身亦可謂守業矣君子學必由其業故業必請之問必以其序問而不决承間觀色而復之復白也雖不􅀃亦不彊爭也雖不􅀃未解不強爭君子旣學之患其不慱也旣博之患其不習也旣習之患其無知也旣知之患其不能行也旣能行之貴其能讓也貴不以巳能而竸於人君子之學致此五者而巳矣五者爲患其不博不習無知不能行能以讓君子􅀶學而孱守之孱小貌不務大㣲言而篤行之行必先人言必後人君子欲訥於言而敏於行君子終身守此悒悒悒悒憂念也行無求數有名事無求數有成數猶促速身言之後人􅀭之身行之後人秉之非法不言言則爲人輔之非德不行行則爲人安之君子終身守此憚憚憚憚憂惶也君子不絶小不殄微也殄亦絶也行自微也不微人人知之則願也人不知茍吾自知也君子終身守此勿勿也勿勿猶勉勉君子禍之爲患辱之爲畏見善恐不得與焉見不善者恐其及巳也論語曰見善如不及見􅁖如探湯是故君子疑以終身疑善之不與􅁖之及巳也君子見利思辱見􅁖思詬詬恥也嗜慾思耻忿怒思患故愚惑者朝忿忘身君子終身守此戰戰也君子慮勝氣血氣勝則周身故君子有三戒思而後動論而後行行必思言之貴其可談言言之必思復之論語曰信近於義言可復也思復之必思無悔言思唯可復亦可謂慎矣人信其言從之以行以言不虚人信其行從之以復易曰終日乾乾反復其道復冝其􅀋詩云冝爾室家樂爾妻孥􅀋冝其年詩云樂只君子萬壽無期亦可謂外内合矣君子疑則不言未問則不言兩問則不行其難者君子患難除之財色逺之流言滅之禍之所由生自􅏽􅏽也是故君子夙絶之君子巳善亦樂人之善也巳能亦樂人之能也巳雖不能亦不以援人君子好人之爲善而弗趣也不促速之恐其倦也􅁖人之爲不善而弗疾也疾其過而不􅀘也􅀘謂改也飾其美而不伐也顔淵曰願無伐善伐則不益補則不改矣君子不先人以惡不疑人以不信謂不億不信不逆詐不􅀃人之過成人之美􅀃解􅀃也存往者在來者在猶存也朝有過夕改則與之夕有過朝改則與之君子義則有常善則有隣德不􅀌見其一冀其二見其小冀其大苟有德焉亦不求􅄹於人也言器之也君子不絶人之歡不盡人之禮通飲食之饋序其歡也簡服物之礼令其忠也來者不豫往者不慎也慎故於物來者不猶豫往者無所慎去之不謗以義去之就之不賂以道往也亦可謂忠矣君子恭而不難安而不舒遜而不謟寛而不縱恵而不儉􅈂而不徑徑行夷狄之道亦可謂知矣知一作無私君子入人之國不稱其諱不犯其禁諱國諱禁國禁不服華色之服服法服不稱懼愓之言故曰與其奢也寜儉與其倨也寜句倨猶慢也句以喻敬可言而不信寜無言也君子終日言不在􅀹之中小人一言終身爲罪君子亂言而弗殖夙絶之神言弗致也恠力亂神子所不語道逺日益云衆信弗主靈言弗與道逺日益積習之也不主謂僉議所同不爲主人言不信不和不台忠信之道君子不唱流言不折辭言不茍折窮人辭也不陳人以其所能言必有主行必有法依前言往行也親人必有方方猶常也多知而無親無所親行愽學而無方好多而無定者君子弗與也君子多知而擇焉愽學而算焉多言而愼焉多言者謂時事湏殺也言雖多而皆慎焉慱學而無行進給而不讓好􅈂而俓儉而好􅹯者君子不與也􅹯塞也言好直即太徑爲儉又太逼塞於下也夸而無耻彊而無憚好勇而忍人者君子不與也亟逹而無守亟數也數自逹而無所守好名而無體無容體忿怒而爲惡不以爲􅁖或曰無􅁖而怒足恭而口聖而無常位者君子弗與也巧言令色能小行而篤難於仁矣嗜酤酒好謳歌巷遊而郷居者乎吾無望焉耳無可望也尚書大傳曰古者聖帝之治天下也五十巳下非蒸社不敢遊飲唯六十以上遊飲也出入不時言語不序安易而樂􅁀懼之而不恐􅀃之而不聽雖有聖人亦無若何矣臨事而不敬惰於從事居䘮而不哀􅀕祀而不畏不畏其神朝廷而不恭則吾無由知之矣三十四十之間而無藝即無藝矣五十而不以善聞矣終可知七十而無德雖有微過亦可以勉矣言其過不大也其少不諷誦其壯不論議其老不教誨亦可謂無業之人矣少稱不弟焉恥也壯稱無德焉辱也老稱無禮焉罪也過而不能改倦也倦傾病人行而不能遂耻也謂不能終也慕善人而不與焉辱也弗知而不問焉固也固專固也􅀃而不能窮也喜怒異慮惑也不能行而言之誣也非其事而居之矯也道言而飾其辭虚也謂道聽求言文飾其辭也無益而厚受禄竊也好道煩言亂也殺人而不戚焉賊也人言不善而不違色順之也近於􅀃其言􅀃古通以爲恱字􅀃其言殆於以身近之也殆危之言危於以身近之殆於以身近之殆於身之矣危周於身人言善而色葸焉近於不􅀃其言葸焉不恱繹之貌不恱其言殆於以身近之也近當字誤爲逺殆於以身近之殆於勿爲能也色勿爲不可能也無柰形於色也色也勿爲可能也心思勿爲不可能也太上樂善太上德之㝡上者謂其心不爲也其次安之其次德之次者謂其色不爲也其下亦能自彊謂其身不爲太上謂五帝其次謂三王其下謂五覇孟子曰堯舜性之湯武身之五覇假之仁者樂道上者率其性也智者利道次者利而爲也愚者從弱者畏不愚不弱執誣以彊亦可謂棄民矣自執而輕於善太上不生惡無爲過之意也其次而能夙絶之也有意而隨絶之其下復而能改也旣爲而能改之復而不改殞身覆家大者傾覆社禝是故君子出言以鄂鄂鄂鄂辨厲也論語曰其言之不作其後爲之難行身以戰戰亦殆勉於罪矣是故君子爲小由爲大也常思正也居由仕也故曰父母爲嚴君子孫爲臣民也僃則未爲備也恒謙虚也而勿慮存焉不忘危也事父可以事君事兄可以事師長使子猶使臣也使弟猶使承嗣也承嗣謂冢子也能取朋友者亦能取所予從政者矣賜與其宫室亦猶慶賞於國也忿怒其臣妾亦猶用刑罰於萬民也是故爲善必自内始也内人怨之雖外人亦不能立也大學曰欲治其國先齊其家居家治則移官亦理也居上位而不􅁋臨事而栗者鮮不濟矣􅁋大先憂事者後樂事先樂事者後憂事昔者天子日旦思其四海之内戰戰唯恐不能乂乂治也諸侯日旦思其四封之内戰戰唯恐失損之大夫士日旦思其官戰戰唯恐不能勝庶人日旦思其事戰戰唯恐刑罰之至也是故臨事而栗者鮮不濟矣福福唯人冝其慎也是以易有履虎之言詩有臨淵之誠君子之於子也愛而勿面也不形於面使而勿貌也不以貌勞倈之導之以道而勿強也宫中雍雍外焉肅肅兄弟憘憘朋友切切論語曰朋友㓛切偲偲兄弟怡怡也逺者以貌近者以情友以立其所能而逺其所不能茍無失其所守亦可與終身矣凡一千七百六十字曾子本孝第五十曾子曰忠者其孝之本與孝子不登髙不履危敬父母之遺體故跬歩未敢忘其親痺亦弗慿不苟􅀏不茍訾隱不命人有隱僻不訐之也臨不指凡居上不爲惑衆故不在􅀹之中也孝子惡言死焉死且不行流言止焉美言興焉故惡言不出於口煩言不及於巳故孝子之事親也居易以俟命處安易也道以聽命也不興險行以徼幸孝子㳺之􅁀人違之就其常也春秋左傳曰其出門而使不以或爲父母憂也不爲事或貽憂於父母也險塗隘巷不求先焉以愛其身以不敢忘其親也身者親之枝也可不敬乎孝子之使人也不敢肆行不敢自專也父死三年不敢改父之道故曰三年無改於父之道可謂孝矣又能事父之朋友又能率朋友以助敬也使敬其父母也君子之孝也以正致諫諌卿大夫士之孝也以德從命庶人之孝也以力惡食分地任力致􅅴美任善不敢臣三德謂三者之孝三德三老也白虎通曰不臣三老崇孝故孝之於親也生則有義以輔之喻於道死則哀以莅焉莅臨􅀕祀則莅之以敬如此而成於孝子也曽子立孝第五十一曽子曰君子立孝其忠之用禮之貴有忠與禮孝通立故爲人子而不能孝其父者不敢言人父不能畜其子者爲人弟而不能承其兄者不敢言人兄不能順其弟者爲人臣而不能事其君者不敢言人君不能使其臣者也不可以巳能而責人之不能况以所不能故與父言言畜子與子言言孝父與兄言言順弟與弟言言承兄與君言言使臣與臣言言事君士相見礼曰與君言言使臣與大夫言言事君與老者言言使弟子與㓜者言言孝父兄與衆言言慈祥與莅官者言言忠信也君子之孝也忠愛以敬反是亂也盡力而有禮莊敬而安之微諌不倦聽從而不怠懽欣忠信咎故不生可謂孝矣盡力無禮則小人也豈小人而巳哉乃犬馬之養致敬而不忠則不入也是故禮以將其力敬以入其忠飲食移味隨所欲也居處温愉著心於此濟其志也子曰可人也吾任其過吾知其能自取過不可人也吾辭其罪詩云有子七人莫慰母心子之辭也衛詩凱風之末章也七子自責任過之辭夙興夜􅄰無忝爾所生言不自􅃕也小雅小菀之四章也申可以人之義也不耻其親君子之孝也是故未有君而忠臣可知者孝子之謂也未有長而順下可知者弟弟之謂也孝經曰以孝事君則忠以敬事長則順未有治而能仕可知者先脩之謂也故曰孝子善事君弟弟善事長君子一孝一悌可謂知終矣凡三章别新凡三百二十四字曽子大孝第五十二曽子曰孝有三大孝尊親其次不辱其下能養公明儀問於曽子曰夫子可謂孝乎公明儀曽子弟子曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道凡言於事親未意則先善舉之親若有志則敬而奉之參􅈂養者也安能爲孝乎身者親之遺躰也行親之遺體敢不敬乎故居處不莊非孝也事君不忠非孝也􅊩官不敬非孝也朋友不信非孝也戰陣無勇非孝也五者不遂災及乎身身一作親敢不敬乎故烹熟鮮一作羶香甞而進之非孝也養也君子之所謂孝者國人皆稱願焉曰􅄑哉有子如此所謂孝也民之夲教曰孝孝經曰夫孝德之夲也教之所由生也其行之曰養謂致衣食省安否養可能也敬爲難敬可能也安爲難以忠禮將也安可能也乆爲難乆可能也卒爲難父母旣殁愼一作順行其身不遺父母惡名可謂能終也謂䏻卒也夫仁者仁此者也義者冝此者也忠者中此者也信者信此者也禮者體此者也行者行此者也彊者彊此者也樂自順此生刑自反此作夫孝者天下之大經也夫孝置之而塞於天地衡之而衡於四海置猶立也衡猶橫也施諸後丗而無朝夕言常行也推而放諸東海而凖推而放諸西海而凖推而放諸南海而凖推而放諸北海而凖九夷八蠻七戎六狄謂之四海放猶至凖猶平也詩云自西自東自南自北無思不服此之謂也大雅文王有聲之六章也孝有三大孝不匱詩云孝子不匱未錫爾􅀋也中孝用勞勞猶功也小孝用力愽施備物可謂不匱矣尊仁安義可謂用勞矣慈受忘勞可謂用力矣父母愛之喜而不忘父母惡之懼而無怨父母有過諌而不逆當柔聲下氣也父母旣殁以哀祀之加之如此謂禮終矣哀謂服之三年祀謂春秋享之樂正子春下堂而傷其足傷􅪜數月不出猶有憂色門弟子問曰夫子傷足􅪜矣數月不出猶有憂色何也樂正子春曰善如爾之問也吾聞之曾子曾子聞諸夫子曰天之所生地之所養人爲大矣父母全而生之子全而歸之可謂孝矣孝經曰天地之性人爲貴人之行莫大於孝也不虧其體可謂全矣故君子頃歩之不敢忘也跬當聲誤爲頃今予忘夫孝之道矣予是以有憂色故君子一舉足不敢忘父母一出言不敢忘父母一舉足不敢忘父母故道而不徑不由徑也舟而不㳺不敢以先父母之遺體行殆也殆危也一出言不敢忘父母是故惡言不出於口忿言不及於巳然后不辱其身不憂其親則可謂孝矣草木以時伐焉禽獸以時殺焉夫子曰伐一木殺一獸不以其時非孝也夫子孔子凡三章新别凡六百五十五字曽子事父母第五十三單居離問於曽子曰事父母有道乎單居離曽子弟子也曽子曰有愛而敬父母之行􅀂中道則從􅀂不中道則諌諌而不用行之如由已且俯從所行而思諫道也從而不諌非孝也同父母之非不匡諌諌而不從亦非孝也徒以義諌而行不從孝子之諌􅓤善而不敢爭辨爭辨者作亂之所由興也内則曰父母有過正氣怡色柔聲以諌諌􅀂不入起敬起孝􅀃則復諫由巳爲無咎則寧謂順諫由巳爲賢人則亂謂爭辨賢與無􅀂立相足孝子無私樂父母所憂憂之父母所樂樂之孝子唯巧變故父母安之􅀂夫坐如尸立如齊弗訊不言齊謂􅀕祀時訊問也言必齊色嚴敬其色此成人之善者也未得爲人子之道也爲人父之事單居離問曰事兄有道乎曾子曰有尊事之以爲已望也謂儀象也兄事之不遺其言奉其所令兄之行􅀂中道則兄事之兄之行若不中道則養之養猶隱之養之内不養於外則是越之也養之外不養於内則是䟽之也是故君子内外養之也單居離問曰使弟有道乎曽子曰有嘉事不失時也謂冠娶也弟之行若中道則正以使之正以使之以弟道弟之行􅀂不中道則兄事之且以兄礼敬之詘事兄之道若不可然后舎之矣屈事兄之然猶不變則怒罰之曽子曰夫禮大之由也不與小之自也言大者得自由也飲食以齒以長㓜也力事不讓辱事不齒執觴觚杯豆而不醉和歌而不哀觚器也實之曰觴杯盤盎盆盞之揔名也豆醬器以木曰登夫弟者不衡坐不茍越不干逆色趨翔周旋俛仰從命不見於顔色未成於弟也大戴禮記卷第四
