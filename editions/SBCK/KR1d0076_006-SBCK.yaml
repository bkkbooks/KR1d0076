front:
  text: 大戴禮記卷第六
  hash: sha256:121a967c05e2d25f93486a52d0167bf9faa1f032aa8ebb4189806055b1abfe46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_006-1a}
body:
  text: 武王踐阼第五十九衞將軍文子第六十武王踐阼第五十九武王踐阼三日旣王之後召士大夫而問焉曰惡有藏之約行之行萬丗可以爲子孫常者乎惡猶於何也言於何有約言而行之乃行万丗而猶得其福諸大夫對曰未得聞也然後召師尚父而問焉曰黃帝顓頊之道存乎意亦忽不可得見與言忽然謂不得可見師尚父曰在丹書王欲聞之則齊矣三日王端冕師尚父亦端冕奉書而入􅀒屏而立端正也樹謂之屏王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言曰敬勝怠者􅁻怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉凡事不䏻自強去執於此則枉也弗敬則不正枉者滅廢敬者萬丗藏之約行之行可以爲子孫常者此言之謂也問先帝之道庻聞要約之㫖故對此而巳且臣聞之以仁得之以仁守之其量百丗以不仁得之以仁守之其量十丗以仁得之以仁守之以不仁得之以仁守之皆謂創基之君子百姓謂子孫無咎譽者於十百之外天命即善與民其廢立大節依於此以不仁得之以不仁守之必及其丗謂止於其身也王聞書之言暢若恐懼退而爲戒書託於物以自警戒也於席之四端爲銘焉於机爲銘焉於鑑爲銘焉於􅏕盤爲銘焉於楹爲銘焉於杖爲銘焉於帶爲銘焉於履屨爲銘焉於觴豆爲銘焉於戸爲銘焉於牖爲銘焉於劒爲銘焉於弓爲銘焉於矛爲銘焉席前左端之銘曰安樂必敬安不忘危前右端之銘曰無行可悔當恭敬朝夕故以懐安爲悔也後左端之銘曰一反一側亦不可以忘言雖反側之間不可以忘道也後右端之銘曰所監不逺視邇所代周監不逺近在有殷之丗机之銘曰皇皇惟敬口生㖃㖃耻也言爲君子榮辱之主可不慎乎㖃㖃詈也口􅆷口言口能害口也机者人君出令所依故以言語爲戒也鑑之銘曰見爾前慮爾後盥盤之銘曰與其溺於人也寧溺於淵溺於淵猶可游也溺於人不可救也日知所亡學者之功溺於民庶大人之禍故或以自新取戒或以游溺爲鑑也楹之銘曰母曰胡殘其禍將然母曰胡害其禍將大母曰胡傷其禍將長夫爲室者慎其楹君天下者難其相也杖之銘曰惡乎危於忿㚄惡於何也忿者危之道怒甲及乙又危之甚杖危故以危伐也惡乎失道於嗜慾杖依道而行之惡乎相忘於富貴言身杖相資也因失道相忘乃嗜慾安樂之戒也帶之銘曰火滅修容慎戒必恭恭則壽雖夜解息其容不可以也帶於寢先釋故因言之也屨履之銘曰慎之勞勞則冨行慎恭勞躬勞終福論慎屨亦財不費也覆在下尤勞辱因爲此戒榮與冨音義兩施互取焉觴豆之銘曰食自杖食自杖戒之憍憍則逃無求醉飽自杖而巳户之銘曰夫名難得而易失無懃弗志而曰我知之乎無懃弗及而曰我杖之乎志識也杖立不能懲其駑怠而自謂杖成功無可就故終失其名也擾阻以泥之若風將至必先揺揺摇揺無所託言有風而則先困雖有聖人不能爲謀也論人行諭亦然牖之銘曰隨天時任以也地之財質也敬祀皇天敬以先時先祭時而敬齋劒之銘曰帶之以爲服動必行德行德則興倍德則崩以順誅也弓之銘曰屈伸之義廢興之行無忘自過言得時也矛之銘曰造矛造矛少間弗忍終身之羞重言造矛見造矛之不易也言少間之不忍則爲終身羞以君子於殺之中礼恕存焉予一人所聞以戒後丗子孫貽厥孫謀以燕翼子武王之詩也凡三百六十五字衞將軍文子第六十衛將軍文子文子衞卿也名弥牟問於子贛曰子貢端木賜也衛人衞之相也吾聞夫子之施教也先以詩論語曰先進於礼樂野人也後進於礼樂君子也丗道者孝悌􅀃之以義而觀諸躰成之以文德蓋受教者七十有餘人言能受教者謂七十二子也聞之孰爲賢也子貢對辭以不知文子曰吾子學焉何謂不知也子貢對曰賢人無妄知賢則難故君子曰智莫難於知人此以難也書曰知人則哲惟帝其難之文子曰若夫知賢人莫不難吾子親游焉是敢問也子貢對曰夫子之門人蓋三就焉謂大成次成小成也賜有逮及焉有未及焉不得辯知也未及者爲先就夫子而或止或退未得及巳見也或以子貢違夫子之後有新來者也文子曰吾子之所及請問其行也子貢對曰夙興夜寐諷誦崇禮行不貳過稱言不茍是顔淵之行也顔囬魯人字子淵也孔子􅀃之以詩詩云媚玆一人應侯順德永言孝思孝思惟則大雅下武之四章也媚兹一人謂御于天子而䝉寵愛應侯順德逢國君能成其德孝思惟則此文在前章兼以􅀃之故連言也故國一逢有德之君丗受顯命不失厥名以御于天子以申之於諸侯受爵命未盡其能在貧如客言安貧也使其臣如藉藉借也如借力然也不遷怒不探怨不録舊罪是冉雍之行也冉雍魯人也字仲弓孔子曰有土君子有衆使也有刑用也然後怒匹夫之怒惟以亡其身使舉也夫子因其性不好怒故􅀃妄怒之敗也書曰惟辟作威也詩云靡不有初鮮克有終以告之大雅蕩首章也言冉雍能終其行也不畏強禦不侮矜寡其言曰性其言惟陳其性不茍虚妄都其冨哉仲由亦於政事故能備治其都也任其戎是仲由之行也仲由衛人也字子路一字季路大夫也夫子未知以文也節其勇也詩云受小共大共爲共一作拱下國恂䝉何天之寵傅奏其勇夫強乎武哉殷頌長發之五章也頌湯伐桀除灾之事恂信也言下國信䝉其冨詩爲駿寵或古有二文或以義賦寵􅀓又爲龍敷文不勝其質恭老恤􅀌不忘賔旅好學省物而不懃是冉求之行物猶事也事省則不懃也冉求字子有冉雍之子爲季氏之宰孔子因而語之曰好學則智恤􅀌則惠恭老則近禮克篤恭以天下其稱之也冝爲國老冝爲國之尊也言任爲卿相也志通而好禮擯相兩君之事篤雅其有禮節也是公西赤之行也公西赤魯人也字子華孔子曰禮儀三百可勉能也禮經三百可勉學而能知威儀三千則難也能躬行三千之威儀則難而公而赤能躬行也公西赤問曰何謂也孔子曰貌以擯禮禮以擯辭是之謂也礼待貌而行辭得礼而發言貌所以擯賛三千之儀也主人主言行比在於人聞之以成公西赤聞之以成家語云衆人聞之爲成主或聲悮也孔子之語人也曰當賔客之事則通矣謂門人曰二三子欲學賔客之禮者於赤也滿而不滿實如虚通之如不及先生難之云先生者猶難之亦所謂先子之所畏也不學其貌竟其德敦其言於人也無所不信其橋大人也橋高也髙大之人也常以皓晧是以眉夀晧晧虚曠無長生乆視之意且長生乆視之術是曾叅之行也曽叅魯之南武城人也字子輿齊聘以相楚迎以令尹晉迎以上卿不應其命也孔子曰孝德之始也天道曰至德地道日德人道曰孝德四代曰有天德有地德夫學天地之德者皆以無􅀻爲能也動而樂施者天德也安而待化者地德也故天之德有廣狹矣自餘礼義忠信已下皆爲人德因事則爲礼厚其行則爲孝也弟德之序也信德之厚也忠德之正也參也中夫四德者矣哉以此稱之也業功不伐貴位不善不侮可侮不佚可佚不侮可侮者不佚可佚者仁之至也不敖無告夫民之窮無所告者不陵敖之也是顓孫之行也顓孫師陳人也子張字也孔子言之曰其不伐則猶可能也其不弊百姓者則仁也詩云愷悌君子民之父母大雅泂酌之首章也夫子以其仁爲大也學以深能深致隱頥也厲以斷性嚴厲而能斷決七十篇􅀃子夏云爲人性不弘好精㣲時人無以尚也送迎必敬上友下交銀手如斷是􅁲商之行也􅁲啇衞人字子夏爲魏文侯師銀廉鍔也如㫁言便能子張曰子夏之門人洒掃應對進退出入則可也孔子曰詩云式夷式已無小人殆小雅節之四章殆近也而啇也其可謂不險也言其鄰於德也貴之不喜賤之不怒茍於民利矣惟在利民春秋左傳曰上思利民忠也廉於其事上也以佐其下佐助也是澹臺滅明之行也澹臺滅明東魯之東武城人也字子羽魯大夫孔子曰獨貴獨冨君子耻之夫也中之矣先成其慮及事而用之是故不忘是言偃之行也言偃魯人也字子游爲武城宰也孔子曰欲能則學欲知則問欲善則訊欲給則豫當是如偃也得之矣獨居思仁公言言義其聞之詩也一日三復白圭之玷是南宫縚之行也南宫縚魯人也字子容夫子信其仁以爲異姓爲以兄之子妻之也周禮司儀職曰天揖異姓士揖庶姓家語曰以爲異事言殊異之士似妄也自見孔子入户未甞越屦凡在於室卑者之履皆陳於户外故雖後至而不越焉往來過人不履影不越人之屨不履人之影謙慎之至也開蟄不殺方長不折執親之䘮未甞見齒是髙柴之行也髙柴齊人也字子羔爲祁宰孔子曰髙柴執親之䘮則難能也開蟄不殺則天道也方長不折則恕也恕則仁也湯恭以恕是以日躋也此事於􅁑恭也教網者呪恕也詩殷頌曰聖敬日躋此賜之所親睹也吾子有命而訊賜則不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉百姓歸焉若吾子之語審茂則一諸侯之相也亦未逢明君也茂盛也一皆也子貢旣與衞將軍文子言適魯見孔子曰衞將軍問二三子之行於賜也不一而三賜也辭不獲命以所見者對矣見其行也未知中否請甞以告請甞以對者告也孔子曰言之子貢以其質告孔子旣聞之􅀏曰賜汝偉爲知人賜質由實也偉爲知人言大爲知人也再言賜者善之子貢對曰賜也焉能知人此賜之所親覩也孔子曰是女所親也吾語女耳之所未聞目之所未見思之所未至智之所未及者乎言未至者未及也爲其德廣厚也子貢曰賜得則願聞之也孔子曰不克不忌不念舊惡蓋伯夷叔齊之行也克好勝人忌有惡於人也論語曰伯夷叔齊不念舊惡怨是用布也􅀳平公問於祁徯曰羊舌大夫􅀳國之良大夫也其行如何平公博公之子􅀳侯也祁徯祁午也羊舌盻羊舌職之父祁徯對辭曰不知也公曰吾聞女少長乎其所女其閹知之言居處之同者桓爲相也祁徯對曰其㓜也恭而遜恥而不使其過􅀫也其爲侯大夫也悉善而謙其端也主於善謙而正其爲公車尉也信而好直其功也公車尉公行也詩云殊異於公行也至於其爲和容也温良而好禮博聞而時出其志也和容主賔客也公曰嚮者問女女何曰弗知也祁徯對曰毎位改變未知所止是以不知蓋羊舌大夫之行也畏天而敬人服義而行信孝乎父而恭於兄好從善而斆往蓋趙文子之行也晋大夫趙武也其事君也不敢愛其死不苟免於難也然亦不亡其身不死於不義也謀其身不遺其友君陳則進不陳則行而退陳爲陳其徳教蓋隨武子之行也晉大夫也出掌刑官後受隨范㑹名也季字也武謚也其爲人之淵泉也多聞而難誕也不内辭足以沒丗國家有道其言足以生國家無道其黙足以容蓋桐提伯華之行也晋大夫羊舌赤也邑於桐提外寛而内直自設於隱栝之中能以礼自鞏直也孔子曰隱括之傍多曲木也直巳而不直人以善存亡汲汲蓋蘧伯玉之行也衞大夫蘧瑗也孝子慈㓜允德禀義約貨去怨蓋栁下惠之行也魯士師展禽也食菜於栁下恵謚也其言曰君雖不量於臣臣不可以不量於其君是故君擇臣而使之臣擇君而事之有道順君無道横命晏平仲之行也齊大夫晏嬰也德恭而行信終日言不在尤之内在􅀹之外貧而樂也蓋老菜子之行也楚人隱者也易行以俟天命居下位而不援其上觀於四方也不忘其親茍思其親不盡其樂以不能學爲巳終身之憂蓋介山子推之行也晋大夫介之推也離騷曰火滋曰封介山封而爲之禁輟号火德之大戴禮記卷第六
