front:
  text: 大戴禮記卷第十
  hash: sha256:98b1f6fb9d856374827fd0a16af48f8c3ff7cc316bfe9acd9cc65ec0977d4a17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_SBCK_009-13b}
body:
  text: 文王官人第七十二諸侯遷廟第七十三諸侯釁廟第七十四文王官人第七十二一本作觀人王曰太師慎維深思内觀民務察度情僞謂視中觀隱也變官民能歷其才藝女維敬哉試以衆位歷觀其才也女何慎乎非倫倫理次也冝所慎倫有七屬屬有九用用有六微一曰觀誠二曰考志三曰視中四曰觀色五曰觀隱六曰揆德其說在下王曰於乎女因方以觀之冨貴者觀其禮施也觀其禮及其施曲禮曰積而能散貧窮者觀其有德守也觀其德與其守孔子曰君子固窮嬖寵者觀其不驕奢也隱約者觀其不懾懼也曲禮曰冨貴而知好禮則不驕不淫貧賤而知好禮則志不懾其少觀其恭敬好學而能弟也其壯觀其㓗廉務行而勝其私也其老觀其意憲慎強其所不足而不踰也孔子射矍相之圃盖觀堵如者墻使公罔之䘮序􅀧楊觶而語公罔之裘楊觶而語曰㓜壯孝弟耆耋好禮不從流俗攸身以俟死者不在此位也蓋去者半處者半序􅀧又楊觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋勤有存者父子之間觀其孝慈也兄弟之間觀其和友也君臣之間觀其忠惠也父慈子孝兄友弟和君惠臣忠也鄕黨之間觀其信憚也信而敬憚省其居處觀其義方省其䘮哀觀其貞良省其出入觀其交友省其交友觀其任廉任以信相親也考之以觀其信挈之以觀其知示之難以觀其勇煩之以觀其治淹之以利以觀其不貪藍之以樂以觀其不寧藍猶鑑也喜之以物以觀其不輕怒之以觀其重醉之以觀其不失也縱之以觀其常逺使之以觀其不貳迩之以觀其不倦探取其志以觀其情考其隂陽以觀其誠隂陽位隱顯也覆其微言以觀其信曲省其行以觀其備成此之謂觀誠也二曰方與之言以觀其志志殷如湥殷盛也没蓋深也其氣寛以柔其色儉而不諂其禮先人其言後人見其所不足曰日益者也言曰就也如臨人以色高人以氣賢人以言防其不足不敬見之伐其所能曰日損者也其貌直而不傷其言正而不私不飾其美不隱其惡不防其過如日月之食曰有質者也其貌固嘔其言工巧嘔以躭色下人謂形柔而人苟飾其見物務其小微有浮淺之事則工飾之而務尚其小成以故自􅀃言以事自解􅀃曰無質者也喜怒以物而色不作煩亂之而志不營營猶亂也深道以利而心不移道也者導也臨懾以威而氣不卑曰平心而固守者也喜怒以物而變易知煩亂之而志不􅁉示之以利而易移臨攝以威而易懾曰鄙心而􅀔氣者也執之以物而遫驚决之以卒而度料言引之以卒然之事而能應時度焉不學而性辨曰有慮者也難投以物物事難􅀃以言知一如不可以解也言因一端困而不知其止無辨而自慎曰愚怒者也謂闇佷也營之以物而不虞虞度也至則攻辨之不豫計度犯人以卒而懼置義而不可遷臨之以貸色而不可營曰㓗廉而果敢者也果敢謂不虞不懼也㓗廉謂不營於貨色在義而不可遷則兼之也易移以言存志不能守錮巳諾無斷言正慎諾於人又不能自裁斷曰弱志者也順與之弗爲喜非奪之弗爲怒沉静而寡言多稽而儉貌隋考也曰質静者也辨言而不固行有道而先困自慎而不讓當如強之曰始妬誣者也謂始妬賢誣善徴清而能發爲攻發幽􅄨也度察而能盡曰治志者也華如誣巧言令色足恭一也皆以無爲有者也孔子曰巧言令色鮮矣仁此之爲考志也考度其志三曰誠在其中此見於外此上之諸志以其見占其隱案其陽察其應以其細占其大據其小省其七以其聲處其氣聽處其聲氣也􅀄氣主物與物在於胞胎物生有聲聲有剛有柔有濁有清有好有惡咸發於聲也心氣華誕者其聲流散心氣順信者其聲順節心氣鄙戾者其聲嘶醜心氣寛柔者其聲温好嘶當爲聲誤爲嘶春秋左傳曰蜂目豺聲忍人也夫音之美惡尚通於金石而况於身乎信氣中易義氣時舒義者剛其氣亦充故舒縱也智氣簡備簡通勇氣壯直聽其聲處其氣考其所爲觀其所由察其所安以其前占其後以前行占後行以其見占其隱以其小占其大此之謂視中也四曰民有五性喜怒欲懼憂也喜怒懼憂欲以其俱生於人而有常故亦謂之性也此五者之人心兼盡喜氣内畜雖欲隱之陽喜必見怒氣内畜雖欲隱之陽怒必見欲氣内畜雖欲隱之陽欲必見懼氣内畜雖欲隱之陽懼必見憂悲之氣内畜雖欲隱之陽憂必見五氣誠于中發形于外民情不隱也喜色由然以生由當爲油油然新生好皃怒色拂然以侮欲色嘔然以偷偷苟且也言惟求恱人懼色薄然以下憂悲之色纍然而静玉藻曰䘮容纍纍也誠智必有難盡之色誠仁必有可尊之色誠勇必有難懾之色誠忠必有可親之色誠㓗必有難汚之色誠静必有可信之色質色皓然固以安僞色縵然亂以煩雖欲故之中色不者則推援於人而侍以爲忠府而形皃又如曉然也首成功少其所不足謂有先功者因首之有不足者因薄之詐以爲知慮誠不及佯爲不言内誠不足色示有餘故知以動人自順而不讓及其所不知正也觀人之動因執爲意而不推讓於人也錯辭而不遂莫知其情本非其意故辭情不終詩云虵虵碩言出自口矣如是者隱於知理者也素動人以言爲先偏習之及於衆前爲方欲陳􅀃也渉物而不終務廣聞而不究其言也問則不對詳爲不窮色示有餘有道而自順用之物窮則爲深妄言深逺如此者隱於文藝者也廉言以爲氣苟作廉言以見佚氣自然驕厲以爲勇内恐外悴無所不至敬再其􅀃言苟自驕厲持以爲勇終恐恐懾而更至恭他也以詐臨人如此者隱於廉勇者也自事其親好以告人乞言勞醉醉言悴也而靣於敬愛飾其見物故得其名名揚於外不誠於内伐名以事其親戚以故取利以如此故要取其利分白其名以私其身如此者隱於忠孝者也隂行以取名隂陽竊謂求諸人也比周以相譽迭相親比交相談譽明知賢可以徴與左右不同而交交必重巳言知其賢而不與交交必取其重巳者也心􅀃之而身不近之身近之而實不至而懽忠不盡懽忠盡見於衆而貌克雖盡其忠及衆人之前猶相克事如此者隱於交友者也此之謂觀隱也六曰言行不􅀋終始相悖隂陽克易外内不合雖有隱節見行曰非誠質者也隱節隱於仁質之等其言甚忠其行甚平其志無私施不在多静而寡􅀋不好狎而安人曰有行心者也事變而能治物善而能􅀃浚窮而能逹浚深也錯身立方而能遂曰廣知者也少言如行恭儉以讓有知而不伐有施而不置不形於心色也曰愼謙良者也微忽之言久而可復謂徴細及忽然之語幽間之行獨而不克克好勝人也行其亡如其存爲奉先君及祖考之敎令曰順信者也貴冨雖尊恭儉而能施衆强嚴威有禮而不甚易曰位志者也位志者言其不一如爵位及人志也位有高卑人各有志也飮食以親貨賄以交接利以合故得望譽征利而依隱於物曰貪鄙者也妄當爲聲誤爲望行征也隱據也質不斷辭不至言心旣不能裁斷而辭又不及少其所不足謀而不巳曰僞詐者也言行亟變從容謬易安然反覆好惡無常行身不􅀋曰無誠志者也小知而不大決小能而不大成顧小物而不知大論亟變而多私曰􅂠誕者也規諌而不􅀋道行而不平曰巧名者也云能規諌而反不􅀋言以道行復不平也故事阻者不夷畸􅀑者不仁恃禱祀而不自修也靣譽者不忠飾貌者不情隱節者不平隱節者亦謂六隱之等多私者不義揚言者寡信此之謂揆德謂揆度於德也王曰太師女推其往言以揆其來行聽其來言以省往行孔子曰始吾於人聽其言而信其行今吾於人聽其言而觀其行也觀其陽以考其隂察其内以揆其外是故隱節者可知僞飾無情者可辨質誠居善者可得忠惠守義者可見也王曰於乎敬哉女何愼乎非心何愼乎非人言當内愼其心外愼於人人有六徵六徵旣成以觀九用九用旣立一曰取平人而有慮者二曰取慈惠而有理者三曰取直􅉖一作質而忠正者四曰取順直而察聽者五曰取臨事而絜正者六曰取愼察而絜廉者七曰取好一作巧謀而知務者入曰取接給而廣中者接給謂應所問而勤廣中謂博於聞識也九曰取猛毅而度斷者此之謂九用也平仁而有慮者使是治國家而長百姓國諸侯家采邑􅄌惠而有理者使是長鄕邑而治父子鄕鄕遂邑公邑直愍而忠正者使是莅百官而察善否於周禮則治官愼直而察聽者使是長民之獄訟出納辭令於周禮則刑官臨事而絜正者使是守内藏而治出入案周禮則天官愼察而絜廉者使是分財臨貨主賞賜於周禮則司祿司勲巧謀而知務者使治壤地而長百工於周禮則遂人匠車之等接給而廉中者使是治諸侯而待賔客於周禮則行人掌客猛毅而度斷者使是治軍事爲邊境於周禮則政官也因方而用之此之謂官能也九用有徵乃任七屬一曰國則任貴周禮曰長以貴得民二曰鄕則任貞幹事曰貞周禮曰吏以泊得民也三曰官則任長周禮曰大事聽其長小事則專逹四曰學則任師周禮曰師以賢得民五曰族則任宗周禮曰宗以族行民六曰家則任主易曰家有嚴君焉父母之爲也七曰先則任賢正月王親命七屬之人曰於乎愼維深内觀民務本愼在人女平心去私愼用六證六證六徵論辨九用以交一人一人文王自謂也予亦不私女廢朕命亂我法罪致不赦三戒然後及論三戒之後亂法者則有司課其罪王親受而考之然後論成凡十一章自王曰太師巳上五章舊别之諸侯遷廟第七十二成廟將遷之新廟君前徙三曰齋祝宗人及從者皆齋謂親過高祖則毀廟以昭穆遷之春秋榖梁傳曰作主壞廟有時日於練焉壞廟之道易簷可也改􅂗可也范寗云納新神故示有知焉鄭玄士虞禮記注曰練而後遷也禮志云遷廟者更舋其廟而移故主焉案此篇成廟之文與榖梁相傳也徙之曰君玄服從者皆玄服周禮司服職曰公之服自衮冕而下如王之服自鷩冕而即如公之服子男之服自毳冕而下如侯伯之服孫之服自絺冕而下如子男之服大夫之服自玄冕而下如􅀌之服玉藻曰君命屈狄再命禕衣内司服職曰辨内外命婦之服鞠衣展衣縁衣素紗其於祭也君與夫人皆申其服祭統曰公衮冕立於阼夫人副禕立於東房是也臣及命婦助祭於君皆盡其服自祭於家咸降一等隂爵不致申也雜記曰大夫冕而祭於公卒而祭於巳士弁而祭於公冠而祭於巳特牲饋食禮曰主婦纚笄窅衣立於房中是也然鄭氏頓貶公侯使一同玄冕以祭於巳非其差也且諸侯專國禮樂車服王命有之何獨抑其服乎王藻曰玄端以祭禆冕以朝孫炎云端當爲冕玄冕祭服之下也其祭先君亦禆冕矣孫說爲合下未即告故略同爵弁也君命屈狄與再命禕衣者謂其夫爲君則命其妻以屈狄加再等之命則上公夫人乃禕衣孫鄭等改禕衣非也又六一命展衣者此則申子男臣妻之服耳言小國臣妻一命者亦展衣不命者則亦緣衣玄又分公􅀸大夫及其妻爲三等而升降其服經云􅀌絺冕􅀸大夫玄冠何爲易之又命小國之􅀸及内子更同列國之􅀸􅀌絺冕與鞠衣錯易其次尤非冝耶從至于廟廟殯言群臣如朝位列於廟門外如路門之位君入立於阼階下西向有司如朝位立於門内如門外之位宗人擯舉手曰有司其請升君升祝奉幣從在左北靣神主辭故在左神將遷故出在戸牖間南靣矣再拜興祝聲三曰孝嗣侯某敢以嘉幣告于皇考某侯言嗣以遷代不言國未忍有之也成廟將徙敢告卒不奠幣者禮畢矣於此將有事於新廟君及祝再拜興祝曰請導君降立於階下奉衣服者皆奉以從祝不言奉主而稱奉衣服者以毀易祖考誠人神之不忍從祝者祝所以導神也言皆者衣服非一稱周禮守祧職曰掌先王先公之廟祧其遣衣服藏焉奉衣服者降堂君及在位者皆辟也奉衣服者至碑君從有司皆以次從出廟門奉衣服者升車乃歩君升車從者皆就車也皆就車謂乗貳車者凡出入門及大溝渠祝下擯押車祝爲左故於步處則下至于新廟筵于戸牖間始自外來故先於堂樽於西序下四時之祭在室筵隩中在堂筵序下是設樽樽􅁪於東方今惟布南靣之度故置樽於西以因其便矣脯醢陳于房中房曰房也諸侯左右房也設洗當東榮南北堂深記因􅀸士當言棄有司皆先入如朝位祝導奉衣服者乃入君從奉衣服者入門左門左門西在位者皆辟也奉衣服者升堂皆反位君從升奠衣服干席上祝奠幣干几東君北向祝在左賛者盥升適房薦脯醢君盥酌奠于薦西反位君及祝再拜興祝聲三曰孝嗣侯某敢用嘉幣告子皇考某侯今月吉日可以徙干新廟敢告再拜君就東廂西靣祝就西廂東靣東西侯也祝就西廂因其便也在位者皆反走辟如食間走疾趍也擯者舉手曰請反位君反位祝從在左􅀸大夫及衆有司諸在位者皆反位祝聲三曰孝嗣侯某㓗爲而明薦之享詩云絜蠲爲饎是用孝享君及祝再拜君反位東郊之位祝徹反位西郊之位擯者曰遷廟事畢請就燕君出廟門􅀸大夫有司執事者皆出廟門告事畢事謂内主藏衣服歛幣徹几筵之等乃曰擇日而祭焉所以安神諸侯釁廟第七十三成廟釁之以羊廟新成而釁者草而神之祭羅名者成則釁之以假也君玄服立干寢門内南向祝宗人宰夫雍人皆玄服以神事故亦同爵弁以戴君朝服者謂不與也宗人曰請令以釁某廟君曰諾遂入雍人拭羊拭恱乃行入廟門碑南北靣同上居上者宰夫也宰夫攝主也雍人舉羊升屋自中中屋南靣刲羊血流于前乃降門以雞有司當門北靣有司宰夫祝宗人也雍人割雞屋下當門郟室割雞於室中有司亦北靣也郟室門郊之室一曰東西廂也釁東西室有司猶北靣統於廟也雜記曰雍人舉羊升屋自中中屋南向刲羊血流於前乃降門郟室皆用雞先門而後郟室其衈皆於屋下割雞甞門郟室中室有司皆鄕室而立門則有司當門北靣案小戴割雞亦於屋上記者不同耳此不言衈略也旣事宗人告事畢皆退反命于君君寢門中南向宗人曰釁某廟事畢君曰諾宗人請就宴君揖之乃退大戴禮記卷第十
