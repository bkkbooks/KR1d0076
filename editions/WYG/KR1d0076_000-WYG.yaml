front:
  text: 欽定四庫全書經部四
  hash: sha256:753fed3570de885feea2655f2afda2dcac3de78d0edd6607684749ed59d8b745
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0076_WYG_000-1a, image: WYG0128/WYG0128-0399a.png}
body:
  text: 大戴禮記目錄禮類三附録卷一王言哀公問五儀哀公問於孔子禮三本卷二禮察夏小正卷三保傅卷四曽子立事曽子本孝曽子立孝曽子大孝曽子事父母卷五曽子制言上曽子制言中曽子制言下曽子疾病曽子天圓卷六武王踐阼衛將軍文子卷七五帝德帝繫勸學卷八子張問入官盛德卷九千乘四代虞戴德誥志卷十文王官人諸侯遷廟諸侯釁廟卷十一小辨用兵少閒卷十二朝事投壺卷十三公冠本命易本命臣等謹案大戴禮記十三卷漢戴德撰隋書經籍志云大戴禮記十三卷漢信都王太傅戴德撰梁有諡法三卷後漢安南太守劉熙注亡崇文總目云大戴禮記十卷三十五篇又一本三十三篇中興書目云今所存止四十篇晁公武讀書志云篇目自三十九篇始無四十三四十四四十五六十一四篇有兩七十四而韓元吉熊朋來黄佐吳澄竝云兩七十三陳振孫云兩七十二蓋後人于盛德第六十六别出明堂一篇為六十七其餘篇第或至文王官人第七十一改為七十二或至諸侯遷廟第七十二改為七十三或至諸侯釁廟第七十三改為七十四故諸家所見不同因有新析一篇則與舊有之一篇篇數重出也漢許慎五經異義論明堂稱戴記禮説盛德記即明堂篇語魏書李謐傳隋書牛宏傳俱稱盛德篇或稱泰山盛德記知析盛德篇為明堂篇者出于隋唐之後又鄭康成六藝論曰戴德傳記八十五篇司馬貞曰大戴禮合八十五篇其四十七篇亡存三十八篇蓋夏小正一篇多别行隋唐間錄大戴禮者或闕其篇是以司馬貞云然原書不别出夏小正篇實闕四十六篇存者宜為三十九篇中興書目乃言存四十篇則竄入明堂篇題自宋人始矣隋志又曰戴聖刪大戴之書為四十六篇馬融足月令明堂位樂記合為四十九篇今攷孔穎達義疏于樂記云按别録禮記四十九篇樂記第十九然則樂記篇第劉向列之别録即與今不殊後漢書橋元傳云七世祖仁著禮記章句四十九篇號曰橋君學仁即班固所説小戴授梁人橋仁季卿者也劉向當成帝時校理秘書橋仁親受業小戴之門亦成帝時為大鴻臚劉橋所見篇數已為四十有九而融遠在後漢之季小戴書不待融足三篇甚明康成嘗受學于融者其六藝論亦但曰戴聖傳禮四十九篇作隋書者徒附會大戴闕篇以為即小戴所録而尚多三篇不符遂漫歸之融耳然因是而知隋唐間大戴闕篇與今本無異故今本卷數適同隋志卷數也書中夏小正篇最古其諸侯遷廟諸侯釁廟投壺公冠皆禮古經遺文又藝文志曾子十八篇久逸是書猶存其十篇自立事至天圓篇題上悉冠以曾子者是也書有注者八卷五卷無注疑闕逸非完書朱子引明堂篇鄭氏注云法龜文殆以注歸之康成考注内徵引有康成譙周孫炎宋均王肅范甯郭象諸人下逮魏晉之儒王應麟困學紀聞指為盧辯注據周書辯字景宣官尚書右僕射以大戴禮未有解詁乃注之其兄景裕謂曰昔侍中注小戴今爾注大戴庻纘前修矣王氏之言信而有徵是書正文併注訛舛幾不能成誦而永樂大典内散見僅十六篇今以各本及古籍中摭引大載禮記之文參互校訂附案語于下方史繩祖有言大戴記列之十四經其説今不可攷然先王舊制時有徵焉固亦禮經之羽翼也乾隆四十七年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
