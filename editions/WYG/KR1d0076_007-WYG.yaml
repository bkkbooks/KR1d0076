body:
  text: 大戴禮記卷七漢戴德撰五帝徳第六十二帝繫第六十三勸學第六十四五帝徳宰我問于孔子曰昔者予聞諸榮伊案伊太平御覽引此作君言黄帝三百年案言各本訛作令今據史記索隱所引訂正請問黄帝者人邪抑非人邪案樂記疏引此文無者字邪皆作也何以至于三百年乎孔子曰予禹湯文武成王周公可勝觀邪夫黄帝尚矣女何以為先生難言之宰我曰上世之傳隱微之說卒業之辨闇忽之意案闇下各本衍昏字今從方本非君子之道也則予之問也固矣孔子曰黄帝少典之子也曰軒轅生而神靈弱而能言幼而慧齊案史記索隱云大戴禮作叡齊一本作慧齊長而敦敏成而聰明治五氣設五量撫萬民度四方教熊羆貔貅貙虎案各本脫貅字貙訛作豹今據太平御覽所引及史記訂正以與赤帝戰于阪泉之野案赤史記作炎各本阪訛作版今據後漢志注所引訂正三戰然後得行其志黄黼黻衣案黄下各本衍帝字今據後文訂正大帶黼裳乗龍扆雲以順天地之紀幽明之故死生之說存亡之難時播百榖草木淳化鳥獸昆蟲案淳化各本作故教化淳今從方本及史記厯離日月星辰極畋土石金玉勤勞心力耳目案各本脱勤字今據路史注所引訂定節用水火材物生而民得其利百年案樂記疏引此作利其徳百年死而民畏其神百年亡而民用其教百年故曰三百年宰我曰案各本脱曰字今從方本請問帝顓頊孔子曰五帝用説案各本作記今從劉本三王用度女欲一日辨聞古昔之説案辨徧古通用躁哉予也宰我曰昔者予也聞諸夫子曰小子無有宿問孔子曰顓頊黄帝之孫昌意之子也曰高陽洪淵以有謀疏通而知事養財以任地案財各本作材今從史記索隱所引履時以象天依鬼神以制義治氣以教民潔誠以祭祀乗龍而至四海北至于幽陵南至于交趾西濟于流沙南至于蟠木動靜之物大小之神日月所照莫不砥礪宰我曰請問帝嚳孔子曰𤣥囂之孫蟜極之子也曰高辛生而神靈自言其名博施利物不于其身聰以知遠明以察微順天之義知民之隱案隱字他本或作㥯或訛作急今從高安本仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之厯日月而迎送之明鬼神而敬事之其色穆穆其徳俟俟案各本作其色郁郁其徳嶷嶷蓋後人因史記之文所改索隱云今按大戴禮郁作穆嶷作俟可證唐時本其動也時其服也士春夏乗龍秋冬乗馬黄黼黻衣執中而獲天下日月所照風雨所至莫不從順宰我曰請問帝堯孔子曰高辛之子也曰放勲其仁如天其知如神就之如日望之如雲富而不驕貴而不豫黄黼黻衣丹車白馬伯夷主禮龍䕫教舞舉舜彭祖而任之四時先民治之流共工于幽州以變北狄放驩兜于崇山以變南蠻殺三苗于三危以變西戎殛鯀于羽山以變東夷其言不貳其徳不回四海之内舟輿所至莫不説夷宰我曰請問帝舜孔子曰蟜牛之孫瞽瞍之子也曰重華好學孝友聞于四海陶漁事親寛裕温良敦敏而知時畏天而愛民恤逺而親近承受大命依于倪皇叡明通知為天下王使禹敷土主名山川以利于民使后稷播種務勤嘉榖以作飲食羲和掌厯敬授民時使益行火以辟山萊伯夷主禮以節天下䕫作樂以歌籥舞和以鍾鼓臯陶作士忠信疏通知民之情契作司徒教民孝友敬政率經其言不惑其徳不慝舉賢而天下平南撫交趾大教案大下舊注一作放乃校書者語亦當在教字之下鮮支渠搜氐羌案鮮支上脫一西字北山戎發息慎案史記索隱云山戎下少一北字北發是北方國名東長夷鳥夷羽民案長下各本脱夷字今據史記索隱所引訂定鄭注禹貢云鳥夷東方之民搏食鳥獸者舜之少也惡顇勞苦二十以孝聞乎天下三十在位嗣帝所五十乃死葬于蒼梧之野宰我曰請問禹孔子曰高陽之孫鯀之子也曰文命敏給克濟其徳不囘其仁可親其言可信聲為律身為度稱以上士案上士二字當從史記作出稱以出猶言比量而出也亹亹穆穆為綱為紀廵九州通九道陂九澤度九山為神主為民父母左準繩右規矩履四時據四海平九州戴九天明耳目治天下舉臯陶與益以贊其身舉干戈以征不享不庭無道之民四海之内舟車所至莫不賓服孔子曰予大者如説民説至矣案此八字當有舛誤予也非其人也宰我曰予也不足誠也敬承命矣他日宰我以語人有為道諸夫子之所孔子曰吾欲以顔色取人于滅明邪改之吾欲以語言取人于予邪改之吾欲以容貌取人于師邪改之宰我聞之懼不敢見帝繫少典産軒轅是為黄帝黄帝産𤣥囂𤣥囂産蟜極蟜極産高辛是為帝嚳帝嚳産放勲是為帝堯黄帝産昌意昌意産高陽是為顓頊顓頊産窮蟬窮蟬産敬康敬康産句芒案史記作句望句芒産蟜牛案史記作橋牛蟜牛産瞽瞍瞽瞍産重華是為帝舜及産象敖案各本訛作及象産傲今據禮記祭法疏所引訂正敖衍文顓頊産鯀鯀産文命是為禹黄帝居軒轅之丘娶于西陵氏西陵氏之子案各本不重西陵氏三字今從方本謂之嫘祖氏産青陽及昌意青陽降居泜水案史記作江水昌意降居若水昌意娶于蜀山氏蜀山氏之子謂之昌濮氏案史記作昌僕産顓頊顓頊娶于滕奔氏案各本脱奔字路史注引作膝奔氏世本作滕濆今據以訂正滕奔氏之子案各本訛作滕氏奔之子今訂正謂之女禄氏産老童案史記作卷章老童娶于竭水氏竭水氏之子謂之高緺氏産重黎及吳囘吳囘氏産陸終陸終氏娶于鬼方氏鬼方氏之妹謂之女隤氏案風俗通義作女嬇産六子孕而不粥三年啟其左脅六人出焉其一曰樊是為昆吾其二曰惠連是為參胡其三曰籛案世本作籛鏗是為彭祖其四曰萊言案世本作求言是為云鄶人案云即䢵鄭語曰妘姓鄢檜路偪陽也其五曰安是為曹姓其六曰季連是為芈姓季連産附祖氏案史記作附沮附祖氏産穴熊案穴各本訛作内今據史記及路史注引附祖産穴熊訂正季通之裔孫鬻熊案此七字各本訛作婁鯀出自熊五字在九世至于渠下今從方本九世至于渠案史記楚世家附沮生穴熊其後中微弗能紀其世周文王之時季連之苗裔曰鬻熊鬻熊子早卒其子熊麗熊麗生熊狂熊狂生熊繹熊繹生熊艾熊艾生熊䵣熊䵣生熊勝熊勝以弟熊楊為後熊楊生熊渠此所謂九世至于渠也渠有子三人其孟之名為無康案史記作毋康為句亶王其中之名為紅案中仲古通用為鄂王其季之名為疵為越章王案越各本訛作戚史記云少子執疵為越章王據國語云芈姓䕫越潛夫論云或封于䕫或封于越即此今訂正昆吾者衞氏也案氏世本作是合下共六氏字竝同古是氏字通參胡者韓氏也彭祖者彭氏也云鄶人者鄭氏也曹姓者邾氏也季連者楚氏也帝嚳卜其四妃之子而皆有天下上妃有邰氏之女也曰姜嫄氏産后稷次妃有娀氏之女也曰簡狄氏産契次妃陳鋒氏之女也曰慶都氏案各本作次妃曰陳隆氏六字文有脱誤今據詩生民疏所引訂定産帝堯次妃娵訾氏之女也曰常儀氏案各本作次妃曰娵訾氏六字亦脱誤今據詩生民疏所引訂定産帝摯帝堯娶于散宜氏散宜氏之子案各本不重散宜氏三字今從方本謂之女皇氏帝舜娶于帝堯帝堯之子案各本不重帝堯二字今從方本謂之女匽氏鯀娶于有莘氏有莘氏之子謂之女志氏案吳越春秋作女嬉産文命禹娶于塗山氏塗山氏之子謂之女憍氏産啟勸學君子曰學不可以已矣青取之于藍而青于藍水則為冰而寒于水木直而中繩輮而為輪其曲中規槁暴不復挺者案槁各本訛作枯今從方本及荀子輮使之然也是故不升高山不知天之高也不臨深谿不知地之厚也不聞先王之遺道不知學問之大也於越戎貉之子生而同聲長而異俗者教使之然也是故木從繩則直金就礪則利君子博學而日參省已焉案各本而訛作知脫省字今從方本故知明則行無過詩云嗟爾君子無恒安息靖恭爾位好是正直神之聽之介爾景福神莫大于化道福莫長于无咎孔子曰吾嘗終日思矣不如湏㬰之所學吾嘗跂而望之不如升高而博見也升高而招非臂之長也而見者遠順風而呼非聲加疾也而聞者著假車馬者非利足也而致千里假舟檝者非能水也而絶江海君子之性非異也而善假于物也南方有鳥名曰􅼅鳩案荀子作䝉鳩以羽為巢編之以髪繫之葦苕風至苕折子死卵破巢非不完也所繫者然也西方有木名曰射干莖長四寸生于高山之上而臨百仞之淵木莖非能長也所立者然也蓬生麻中不扶自直蘭氏之根懷氏之苞案荀子作蘭槐之根是為芷漸之滫中君子不近庻人不服質非不美也所漸者然也是故君子靖居恭學修身致志處必擇鄉游必就士所以防辟邪而道中正也案道他本作通今從劉本物類之起必有所始案各本起訛作從始訛作由今從方本及荀子此起始為韻下來徳為韻榮辱之來各象其徳肉腐出蟲魚枯生蠧怠教忘身案各本訛作殆教亡身今從方本禍災乃作彊自取折柔自取束邪穢在身怨之所構布薪若一火就燥平地若一水就濕草木疇生禽獸羣居物各從其類也是故正鵠張案是故下舊注一作質乃校書者語亦當在正字下而弓矢至焉林木茂而斧斤至焉樹成䕃而鳥息焉醯酸而蚋聚焉故言有召禍行有招辱君子慎其所立焉積土成山風雨興焉積水成川蛟龍生焉積善成徳神明自得案得各本訛作傳今據文選典引注所引訂正聖心備矣是故不積跬步無以致千里不積小流無以成江海騏驥一躒不能千里駑馬無極功在不舍楔而舍之朽木不折楔而不舍金石可鏤夫螾案各本訛作蟥今從劉本方本無爪牙之利筋脉之彊上食晞土下飲黄泉者用心一也蟹二螯八足非虵䱇之穴案䱇即鱓他本訛作蛆今從方本而無所寄託者用心躁也是故無憤憤之志者無昭昭之明無緜緜之事者無赫赫之功行歧塗者不至案歧他本訛作跂今從方本事兩君者不容目不能兩視而明耳不能兩聽而聰騰虵無足而騰鼫鼠五伎而窮詩云鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心若結兮君子其結于一也昔者瓠巴鼓瑟而沈魚出聽伯牙鼓琴案各本訛作瑟今從方本而六馬仰秣夫聲無細而不聞行無隱而不形玉居山而木潤淵生珠而岸不枯為善而不積乎豈有不聞哉孔子曰鯉案各本訛作野下又衍哉字今據説苑訂正君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫遠而有光者飾也近而逾明者學也譬之如洿邪水潦灟焉莞蒲生焉從上觀之誰知其非源泉也珠者陰之陽也故勝火玉者陽之陰也故勝水其化如神故天子藏珠玉諸侯藏金石大夫畜犬馬百姓藏布帛不然則强者能守之知者能秉之賤其所貴而貴其所賤不然矜寡孤獨不得焉子貢曰君子見大川必觀何也孔子曰夫水者君子比徳焉徧與之而無私似徳所及者生所不及者死似仁其流行庳下倨句皆循其理似義其赴百仞之谿不疑似勇淺者流行深淵不測似智弱約微通似察案微各本訛作危今從方本及荀子受惡不讓似包䝉案各本訛作包裹上又衍貞字今據説苑訂正不清以入鮮潔以出似善化以注量必平似正案以注各本訛作必出荀子作主説苑作至今從方本盈不求概似度案各本脱度字今據説苑訂正萬折必以東似意案萬各本訛作厲因上度字脱誤成一字耳東下各本衍西字今竝從荀子及説苑是以君子見大川必觀焉案各本脱君子二字今從高安本大戴禮記卷七
