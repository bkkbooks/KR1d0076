body:
  text: 大戴禮記卷二漢戴德撰禮察第四十六夏小正第四十七禮察孔子曰君子之道譬猶防與夫禮之塞亂之所從生也猶防之塞水之所從來也故以舊防為無用而壊之者必有水敗以舊禮為無所用而去之者案他本脱所字今從程本朱本髙安本必有亂患故婚姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣聘射之禮廢則諸侯之行惡而盈溢之敗起矣喪祭之禮廢則臣子之恩薄而倍死忘生之徒衆矣案徒他本訛作禮今從方本凡人之知能見已然不能見將然禮者禁于將然之前案各本多脱于字今從沈本而法者禁于巳然之後是故法之用易見而禮之所為至難知也案至各本訛作生今從方本若夫慶賞以勸善刑罰以懲惡先王執此之正堅如金石行此之信順如四時處此之功無私如天地爾豈顧不用哉然而曰禮云禮云案而各本多作如今從方本貴絶惡于未萌而起教于微眇案教各本多作敬今從方本及漢書使民日徙善遠罪而不自知也孔子曰聽訟吾猶人也必也使無訟乎此之謂也為人主計者莫如先審取舍案先各本多訛作安今從方本及漢書取舎之極定于内安危之萌應于外也安者非一日而安也危者非一日而危也皆以積然不可不察也善不積不足以成名惡不積不足以滅身而人之所行各在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨倍禮義積而民和親故世主欲民之善同而所以使民之善者異或導之以德教或歐之以法令導之以德教者德教行而民康樂歐之以法令者法令極而民哀戚哀樂之感禍福之應也我以為秦王之欲尊宗廟而安子孫與湯武同然而湯武能廣大其德案然而各本訛作然則如三字今從方本久長其後行五百嵗而不失秦王亦欲至是而不能持天下十餘年即大敗之此無他故也湯武之定取舎審而秦王之定取舎不審也易曰君子慎始差若毫釐繆以千里取舎之謂也然則為人主師傅者不可不日夜明此案不可不各本訛作不可以今從方本問為天下如何曰天下器也今人之置器置諸安處則安置諸危處則危而天下之情與器無以異在天子所置爾湯武置天下于仁義禮樂而德澤洽禽獸草木廣育被蠻貊四夷累子孫十餘世厯年久五六百嵗此天下之所共聞也秦王置天下于法令刑罰德澤無一有而怨毒盈世民憎惡如仇讎禍幾及身子孫誅絶此天下之所共見也夫用仁義禮樂為天下者行五六百嵗猶存用法令為天下者十餘年即亡是非明斆大驗乎人言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮義之不如法令案今字下各本多衍子字今從方本及漢書教化之不如刑罰人主胡不承殷周秦事以觀之乎夏小正正月啟蟄言始發蟄也鴈北鄉先言鴈而後言鄉者何也見鴈而後數其鄉也鄉者何也鄉其居也鴈以北方為居何以謂之案此下各本或衍一居字或衍為居二字今從方本生且長焉爾九月遰鴻鴈先言遰而後言鴻鴈何也見遰而後數之則鴻鴈也何不謂南鄉也曰非其居也故不謂南鄉記鴻鴈之遰也而不記其鄉何也案而各本多作如今從傅本曰鴻不必當小正之遰者也雉震呴呴也者鳴也震也者鼓其翼也案各本訛作震也者鳴也呴也者鼓其翼也徐堅初學記兩引此文今據以訂正正月必雷雷不必聞惟雉為必聞之何以謂之案四字句絶篇内凡三見皆申上之辭雷則雉震呴相識以雷魚陟負氷陟升也負氷云者言解蟄也農緯厥耒緯束也束其耒云爾案此下各本衍者字今從方本用是見君之亦有耒也初嵗祭耒始用暢也案此下舊注暢一作畼及校書者所加非盧氏注文畼鬯暢古通用其曰初嵗云者暢也者終嵗之用祭也言是月之始用之也初者始也案此條惟初嵗祭耒四字是古經經不僅曰祭耒而必曰初嵗祭耒以祭必用暢而用之自是始故加初嵗二字以表此祭為終嵗用暢之始始用暢也正解經文言初嵗二字所兼含之意下復申之曰其曰初嵗云者以暢是終嵗之祭所皆用初嵗對終嵗而言各本或訛作其用初云爾儀禮經傳通解作其曰初云爾也者又移此句于暢也者終嵗之用祭也下文理隔礙不可通其列夏小正經文増始用暢三字為經愈生紛糾矣方本作其曰初嵗云者與下文一氣通貫或曰祭韭也案此五字當移下條園之燕者也下舛誤在此囿有見韭案各本脱見字今從傅本囿也者案各本脱者字今從傅本園之燕者也時有俊風俊者大也大風南風也何大于南風也曰合冰必于南風解冰必于南風生必于南風收必于南風故大之也寒日滌凍塗滌也者變也變而煖也凍塗者凍下而澤上多也案釋澤古通用田鼠出田鼠者嗛鼠也記時也農率均田率者循也均田者始除田也言農夫急除田也獺獻魚案各本多脱此三字今從方本獺祭魚其必與之獻何也案與之下舊注與疑作謂乃校書者所加非盧氏注文曰非其類也祭也者得多也善其祭而後食之十月豺祭獸謂之祭獺祭魚謂之獻何也豺祭其類獺祭非其類故謂之獻大之也鷹則為鳩鷹也者其殺之時也鳩也者非其殺之時也善變而知仁也故其言之也曰則案其字傅本作具非盡其辭也鳩為鷹變而之不仁也故不盡其辭也農及雪澤案釋澤古通用言雪澤之無髙下也初服于公田古有公田焉者古者先服公田案者字各本多作言今從方本而後服其田也采芸為廟采也鞠則見案鞠當作噣爾雅噣謂之柳詩召南鄭康成箋噣在東方正月時也鞠者何也星名也鞠則見者嵗再見云爾案云字各本訛在下條蓋記時也下今訂正初昏參中蓋記時也斗柄縣在下言斗柄者所以著參之中也柳稊案稊各本訛作梯今從關本下同稊也者發孚也梅杏杝桃則華杝桃山桃也緹縞縞也者案各本脱一縞字今從方本莎隨也緹也者其實也案儀禮經傳通解訛作緹也者莎隨也縞也者其實也先言緹而後言縞者何也緹先見者也何以謂之案四字句絶與前鴈北鄉及雉震呴二條同小正以著名也案儀禮經傳通解移上十字于篇題下非也此言小正立言之體以緹著而先見故不曰縞緹而名其物候曰緹縞耳雞桴粥粥也者相粥之時也案一本作相粥粥呼也或曰桴嫗伏也粥養也二月往耰黍禪禪單也初俊羔助厥母粥俊也者大也粥也者養也言大羔能食草木而不食其母也羊蓋非其子而後養之案蓋各本訛作羔今從關本善養而記之也或曰夏有暑祭案夏各本訛作憂今從傅本暑各本多作煮今從方本祭也者用羔是時也不足喜樂喜羔之為生也而記之謂羔羊腹時也案謂羔羊他本訛作與牛羊或訛作與羊牛今從傅崧卿所言舊本及方本綏多女士綏安也冠子取婦之時也丁亥萬用入學丁亥者吉日也萬也者干戚舞也入學也者大學也謂今時大舎采也案舎采即釋菜古通用祭鮪祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時榮菫采繁菫采也案繁蘩古通用各本訛作榮黄菜色菜繁今從劉本繁由胡案由各本訛作田下同胡下又衍繁字今從爾雅及方本由胡者繁母也繁旁勃也案旁各本訛作萬今從陸璣毛詩草木蟲魚疏所引皆豆實也故記之昆小蟲抵蚳昆者衆也由魂魂也案由猶古通用各本訛作田魂螺也今從劉本魂魂也者動也案各本脱魂魂也三字今從方本小蟲動也其先言動而後言蟲者何也萬物至是動動而後著案各本脱至字又脱一動字今從傅本方本合訂抵猶推也蚳螘卵也為祭醢也取之則必推之推之不必取案各本訛作必不取今從傅本故言推而不言取案故言各本訛作取必今從方本來降燕乃睇案此下當脱一室字燕乙也降者下也言來者何也莫能見其始出也故曰來降言乃睇何也睇者眄也眄者視可為室者也百鳥皆曰巢突穴又謂之室何也案突穴即燕之所為似穴而突出者也又謂各本訛作取與今從方本操泥而就家案操各本作摻今從傅本入人内也案各本訛作人人或作人入今從關本剝鱓案鱓鼉古通用以為鼓也有鳴倉庚倉庚者商庚也商庚者長股也榮芸時有見稊始收有見稊而後始收是小正序也小正之序時也皆若是也稊者所為豆實三月參則伏伏者非亡之辭也案亡各本訛作忘今從傅本星無時而不見我有不見之時故曰伏云攝桑攝而記之案各本重一桑字今從傅本急桑也委楊案委下舊注委一作萎乃校書者所加非盧氏注文楊則花而後記之䍷羊案䍷之言圍也謂其環聚羊有相還之時案還環古通用其類䍷䍷然記變爾或曰䍷羝也􅕪則鳴􅕪天螻也頒冰頒冰者分冰以授大夫也采識案爾雅作蘵識草也妾子始蠶先妾而後子何也曰事有漸也言事自卑者始案事字各本訛在自卑下今從傅菘卿説訂正執養宫事執操也養長也祈麥實麥者案各本作麥實者今從傅本五穀之先見者故急祈而記之也越有小旱越于也記是時恒有小旱田䑕化為鴽鴽鵪也變而之善故盡其辭也鴽為䑕變而之不善故不盡其辭也拂桐芭拂也者拂也桐芭之時也或曰言桐芭始生貌拂拂然也鳴鳩言始相命也先鳴而後鳩何也鳩者鳴而後知其鳩也四月昴則見初昏南門正南門者星也嵗再見壹正蓋大正所取法也鳴札案爾雅作蚻札者寧縣也案爾雅注引作虎縣鳴而後知之故先鳴而後札囿有見杏囿者山之燕者也鳴蜮案蜮蟈古通用蜮也者或曰屈造之屬也王萯秀取荼荼也者以為君薦蔣也秀幽越有大旱記時爾執陟攻駒執也者始執駒也執駒也者離之去母也陟升也案各本脱此三字今從張本方本執而升之君也攻駒也者教之服車數舎之也五月參則見參也者伐星也案伐各本訛作牧今從傅本故盡其辭也浮游有殷殷衆也浮游殷之時也浮游者渠略也朝生而莫死稱有何也有見也鴂則鳴鴂者百鷯也鳴者相命也其不辜之案辜沈本訛作事時也是善之故盡其辭也時有養日養長也一則在本一則在末案本末猶初終謂或在初或在終鄭注月令云辰角見九月本也天根見九月末也故其記曰時有養日云也案各本脱有字云訛作之今從方本傅本合訂乃瓜乃者急瓜之辭也瓜也者始食瓜也良蜩鳴良蜩也者五采具匽之興五日翕望乃伏案匽爾雅注作蝘其不言生而稱興何也不知其生之時故曰興以其興也故言之興五日翕也望也者月之望也而伏云者不知其死也故謂之伏五日也者十五日也翕也者合也伏也者入而不見也啓灌藍蓼啓者别也陶而疏之也灌者聚生者也記時也鳩為鷹唐蜩鳴唐蜩者案蜩下各本有鳴字今從方本匽也初昏大火中大火者心也心中種黍菽糜時也煮梅為豆實也蓄蘭為沐浴也菽糜已在經中又言之案上初昏大火中説曰心中種黍菽糜時也謂種黍與菽糜二事皆以心中為候此民事之常記心中則二事自見故云巳在經中又言之非經重出此文也是何也時食矩關而記之案是字時字各本互訛今從方本矩當作巨大也古字規矩鉅細通作巨經不復著種黍而詳記菽糜夏時以菽為糜乃時所食之大關或解矩為法者非頒馬分夫婦之駒也將閒諸則案閒當作閑或取離駒納之則法也案此下舊注矩關一作短閔夫婦一作夫卿乃校書者所加非盧氏注文六月初昏斗柄正在上五月大火中六月斗柄正在上用此見斗柄之不正當心也案正各本訛作在今從方本蓋當依依尾也煮桃桃也者杝桃也杝桃也者山桃也煮以為豆實也鷹始摯始摯而言之何也諱殺之辭也故言摯云案各本脱言字今從傅本七月秀雚葦未秀則不為雚葦秀然後為雚葦故先言秀狸子肇肆肇始也肆遂也言其始遂也其或曰案其字衍文肆殺也湟潦生苹湟下處也有湟然後有潦潦而後有苹草也案下潦字各本亦作有潦今從傅本爽死爽也者猶疏也苹秀案苹爾雅作荓苹也者案此下各本衍有字今從傅本馬帚也漢案户漢也者天漢也案各本脱此四字今據文選西征賦月賦注所引案户也者直户也言正南北也寒蟬鳴蟬也者蝭􅧽也初昏織女正東鄉時有霖雨灌荼灌聚也荼雚葦之秀為蔣褚之也雚未秀為菼葦未秀為蘆斗柄縣在下則旦八月剝𤓰剝𤓰也者案各本脱此四字今從傅本畜𤓰之時也𤣥校𤣥也者黑也校也者若綠色然婦人未嫁者衣之剝棗剥也者取也栗零零也者降也零而後取之故不言剝也丹鳥羞白鳥丹鳥也者謂丹良也白鳥也者案兩也者各本脱也字今從月令注所引謂蚊蚋也其謂之鳥者何也案各本脱者何二字今從傅本重其養者也有翼者為鳥羞也者進也不盡食也辰則伏辰也者房星也案各本脱者字今從通解本房各本訛作謂今從初學記所引伏也者入而不見也鹿人從鹿人從者案各本不重鹿人從三字今從方本從羣也鹿之養也離羣而善案此下各本衍而字今從傅本之離而生非所知時也故記從不記離君子之居幽也不言或曰人從也者案各本重一人字今從方本大者于外小者于内率之也鴽為䑕參中則旦九月内火内火也者大火大火也者心也遰鴻鴈遰往也主夫出火主夫也者主以時縱火也陟𤣥鳥蟄陟升也𤣥鳥者燕也先言陟而後言蟄何也陟而後蟄也熊羆貊貉鼶鼬則穴案爾雅注引鼶鼬則穴各本訛作鼬鼪則大言蟄也案各本作若蟄而今從方本榮鞠鞠草也鞠榮而樹麥時之急也王始裘王始裘者何也案各本不重王始裘三字今從通解本衣裘之時也辰繫于曰雀入于海為蛤蓋有矣非常入也十月豺祭獸善其祭而後食之也初昏南門見案此月南門三星朝見于東南隅非昏見也初昏二字乃衍文南門者星名也及此再見矣黑鳥浴案鳥各本訛作烏今從關本黑鳥者何也鳥也案各本脱黑鳥二字及下也字今從傅本浴也者飛乍髙乍下也時有養夜養者長也案各本脱夜養二字今從關本若日之長也𤣥雉入于淮為蜃蜃者蒲盧也案古語謂隨變而成者曰蒲盧織女正北鄉則旦織女星名也十有一月王狩王狩者案各本脱下王字今從傅本言王之時田也案各本脱也字今從方本冬獵為狩陳筋革陳筋革者省兵甲也嗇人不從不從者弗行案此下有脱文于時月也萬物不通隕麋角隕墜也日冬至陽氣至始動諸向生皆蒙蒙符矣故麋角隕記時焉爾十有二月鳴弋案弋鳶古字通弋也者禽也先言鳴而後言弋者何也鳴而後知其弋也𤣥駒賁𤣥駒也者螘也賁者何也走于地中也納卵蒜卵蒜也者本如卵者也納者何也納之君也虞人入梁虞人官也梁者主設罔罟者也隕麋角蓋陽氣且睹也案且各本作旦今從傅本故記之也大戴禮記卷二
