body:
  text: 大戴禮記卷九漢戴德撰千乗第六十七案各本改作六十八今訂正四代第六十八案各本改作六十九今訂正虞戴徳第六十九案各本改作七十今訂正誥志第七十案各本改作七十一今訂正千乗公曰千乗之國受命于天子通其四疆教其書社修其灌廟案修各本訛作循今從高安本方本建其宗主設其四佐列其五官處其朝市為仁如何子曰不仁國不化公曰何如之謂仁子曰不淫于色子曰立妃設如太廟然乃中治中治不相陵不相陵斯庶嬪遧遧則事上靜靜斯潔信在中朝大夫必慎以恭出㑹謀事必敬以慎言長幼小大必中度此國家之所以崇也立子設如宗社案各本脱如字今從楊本方本宗社先示威威明顯見辨爵集徳是以母弟官子咸有臣志莫敢援于外大夫中婦私謁不行此所以使五官治執事正也案正各本作政今從方本夫政以教百姓百姓齊以嘉善故蠱佞不生此之謂良民國有道則民昌此國家之所以大遂也卿設如大門大門顯美小大尊卑中度開明閉幽内禄出災以順天道近者閑焉遠者稽焉君發禁宰受而行之案各本脱受字今從楊本以時通于地散布于小理案理方本作治天之災祥地寳豐省及民共饗其禄共任其災此國家之所以和也國有四輔輔卿也卿設如四體毋易事毋假名毋重食凡事尚賢進能使知事爵不世能官之不愆案各本脱官字今從楊本凡民戴名以能食力以時成以事立此所以使民讓也民咸孝弟而安讓此以怨省而亂不作也此國家之所以長也案各本脱家字今從方本下無用則國家富上有義則國家治長有禮則民不爭立有神則國家敬兼而愛之則民無怨心以為典令案各本訛作以為無命今從方本則民不偷案盛徳篇云無度量則小者偷惰昔者先王本此六者而樹之徳此國家之所以茂也案各本脱之字今從方本設其四佐而官之司徒典春以教民之不則治不若不令案治各本訛作時今從方本成長幼老疾孤寡以時通于四疆有闔而不通有煩而不治則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發圖功謀案圖字從劉本訂正他本訛作國下舊注一作同乃校書者語齋戒必敬㑹時必節日厯巫祝執伎以守官俟命而作祈王年禱民命及畜榖蜚征庶虞百草案各本脱百字今從方本方春三月緩施生育動作百物于時有事享于皇祖皇考朝孤子八人以成春事司馬司夏以教士車甲凡士執伎論功修四衞强股肱質射御才武聰慧治衆長卒可以為儀綴于國案可各本訛作所今從楊本出可以為率誘于軍旅四方諸侯之遊士國中賢餘秀與閱焉案與各本訛作興今從方本方夏三月養長秀蕃庶物于時有事享于皇祖皇考爵士之有慶者七人以成夏事司寇司秋以聽獄訟治民之煩亂執權變民中凡民之刑萌本以安閒案之下各本衍不字萌訛作安訛作要今從楊本作起不敬以欺惑憧愚作于財賄六畜五榖曰盜誘居室家及幼子曰不義案此六字各本訛作有君子曰義五字今從方本子女專曰妖飭五兵及木石曰賊以中情出小曰間大曰講案講當作構或古通用利辭以亂屬曰讒以財投長曰貸凡犯天子之禁陳刑制辟以追罔民之不率上教者案罔各本作國今從楊本夫是故一家三夫道行三人餘食哀樂平無獄方秋三月收斂以時于時有事嘗新于皇祖皇考食農夫九人以成秋事司空司冬以制度制地事準揆山林規表衍沃畜水行衰濯浸以節四時之事治地遠近以任民力以節民食太古食壯之食攻老之事公曰功事不少而餱糧不多乎子曰太古之民秀長以壽者食也在今之民羸醜以胔者事也太古無游民食節事時民各安其居樂其官案各本訛作宫下又加室字今從楊本服事信上上下交信地移民聚案各本脱聚字今從方本在今之世上治不平民治不和百姓不安其居不樂其官老疾用財壯狡用力于兹民游薄事貪食于兹民憂古者殷書為成男成女名屬升于公門此以氣食得節作事得時民勸有功案各本脱民字今從楊本夏服君事不及暍冬服君事不及凍是故年榖順成案順各本訛作不今從方本天之饑饉道無殣者在今之世男女屬散名不升于公門此以氣食不節作事不時案時各本作成今從楊本天之饑饉于時委民不得以疾死是故立民之居必于中國之休地因寒暑之和六畜育焉五榖宜焉辨輕重制剛柔和五味以節食時事東辟之民曰夷精以僥至于大遠有不火食者矣南辟之民曰蠻信以朴至于大遠有不火食者矣西辟之民曰戎勁以剛至于大遠有不火食者矣北辟之民曰狄肥以戾至于大遠有不火食者矣及中國之民曰五方之民咸有安居和味案各本脱咸字居訛作民今從楊本咸有實用利器知通之信令之及量地度居有城郭立朝市地以度邑邑以度民以觀安危距封後利先慮乆固依固可守為奥可乆案奥隩古通用能節四時之事霜露時降方冬三月草木落庶虞藏五榖必入于倉于時有事蒸于皇祖皇考息國老六人以成冬事民咸知孤寡之必不末也案末字他本訛作未今從劉本楊本咸知有大功之必進等也咸知用勞力之必以時息也推而内之水火案内納古通用入也弗之顧矣而况有强適在前案適敵古通用有君長正之者乎公曰善哉四代公曰四代之政刑論其明者可以為法乎子曰何哉四代之政刑皆可法也公曰以我行之其可乎子曰否不可臣願君之立知而以觀聞也四代之政刑君若用之則緩急將有所不節不節君將約之約之卒將棄法棄法是無以為國家也公曰巧匠輔繩而斲胡為其棄法也子曰心未之度習未之狎案未之楊本皆作之未此以數踰而棄法也夫規矩準繩鈞衡此昔者先王之所以為天下也小以及大近以知遠今日行之可以知古可以察今其此耶水火金木土榖此謂六府廢一不可進一不可民竝用之今日行之可以知古可以察今其此耶昔夏商之未興也伯夷謂此三常之眇案三常又見虞戴徳篇各本常訛作帝因又訛為二帝公曰長國治民恒幹論政之大體以教民辨厯大道以時地性興民之陽徳以教民事上服周室之典以順事天子修政勤禮以交諸侯大節無廢小眇其後乎案小各本訛作少今從程本子曰否不可後也詩云東有開明于時雞三號以興庶虞動案各本重庶虞二字今從楊本蜚征作嗇民執功百草咸淳地傾水流之是以天子盛服朝日于東堂以教敬示威于天下也是以祭祀昭有神明燕食昭有慈愛宗廟之事昭有義率禮朝廷昭有五官無廢甲胄之戒昭果毅以聽天子曰崩諸侯曰薨大夫曰卒士曰不禄庻人曰死昭哀哀慶無失節案慶各本訛作愛今從方本是以父慈子孝兄愛弟敬此昔先王之所先施于民也君而後此則為國家失本矣公曰善哉子察教我也子曰鄉也君之言善執國之節也君先眇而後善中備以君之言案之各本訛作子今從楊本可以知古可以察今奐然而與民壹始案與各本訛作興今從方本公曰是非吾言也吾一聞于師也子吁焉其色曰嘻君行道矣公曰道耶子曰道也公曰吾未能知人未能取人子曰君何為不觀器視才公曰視可明乎子曰可以表儀公曰願學之子曰平原大藪瞻其草之高豐茂者必有怪鳥獸居之且草可財也案財材古通用如艾而夷之案艾刈古通用夷薙古通用其地必宜五榖高山多林必有怪虎豹蕃孕焉深淵大川必有蛟龍焉民亦如之君察之此可以見器見才矣公曰吾猶未也子曰羣然戚然頤然睪然踖然柱然抽然首然僉然湛然淵淵然淑淑然齊齊然節節然穆穆然皇皇然見才色脩聲不視聞怪物怪命不改志案怪命各本作恪命今從楊本舌不更氣君見之舉也得之取也有事事也事必與食食必與位無相越踰昔虞舜天徳嗣堯取相十有六人如此公曰嘻美哉子道廣矣吾恐惽而不能用也何以哉子曰由徳徑徑案各本脱子字下五字訛在子道廣矣之下今從方本公曰請問圖徳何尚子曰聖知之華也知仁之實也仁信之器也信義之重也義利之本也委利生孽公曰嘻言之至也道天地以民輔之聖人何尚子曰有天徳有地徳有人徳此謂三徳三徳率行乃有陰陽陽曰徳隂曰刑公曰善哉再聞此矣陽徳何出子曰陽徳出禮禮出刑刑出慮慮則節事于近而揚聲于遠公曰善哉載事何以子曰徳以監位位以充局局以觀功功以養民民于此乎上公曰禄不可後乎子曰食為味味為氣氣為志發志為言發言定名名以出信信載義而行之禄不可後也公曰所謂民與天地相參者何謂也子曰天道以視地道以履人道以稽廢一曰失統恐不長饗國公愀然其色子曰君藏玉惟慎用之惟慎案惟各本訛作雖今從方本敬而勿愛民亦如之執事無貳五官有差喜無竝愛卑無加尊淺無測深小無招大此謂楣機楣機賓薦不䝉昔舜徴薦此道于堯堯親用之不亂上下公曰請問民徴子曰無以為也難行公曰願學之幾必能子曰貪于味不讓妨于政願富不乆妨于政慕寵假貴妨于政治民惡衆妨于政為父不慈妨于政為子不孝妨于政大縱耳目妨于政好色失志妨于政好見小利妨于政變從無節妨于政案各本脱此三字今從高安本撓弱不立妨于政剛毅犯神妨于政鬼神過節妨于政幼勿與衆克勿與比依勿與謀放勿與游徼勿與事臣聞之弗薦案薦各本訛作慶今從楊本非事君也君聞之弗用以亂厥徳臣將薦其簡者案薦各本亦訛作慶今從楊本蓋人有可知者焉貌色聲衆有美焉必有美質在其中者矣貌色聲衆有惡焉必有惡質在其中者矣此皆伯夷之所後出也案皆各本訛作者今從高安本子曰伯夷曰案各本脱曰字今從楊本建國建政修國修政案上修字下舊注一作循乃校書者語公曰善哉虞戴徳公曰昔有虞戴徳何以深慮何及高舉安取子曰君已聞之案已各本作以今從楊本惟丘無以更也君之聞而未成也案而各本作如今從方本黄帝慕修之案修下舊注一作循乃校書者語曰明法于天明案此下各本衍一開字楊本重一明字今從方本施教于民行此以上明于天化也開物畢起案各本脱開字畢訛作必今從方本是故民聽命而弗改也案各本脱聽字今從方本公曰善哉以天教于民可以班乎子曰可哉雖可而弗由此上知所以行斧鉞也案此下各本衍以字今從方本父之于子天也君之于臣天也有子不事父有臣不事君是非反天而倒行耶故有子不事父不順有臣不事君必刃順天作刑地生庶物是故聖人之教于民也率天而祖地案而各本作如今從方本能用民徳是以高舉不過天深慮不過地質知而好仁能用民力此以三常之禮明而名不蹇禮失則壞名失則惽是故上古不諱正天名也天子之官四通正地事也天子御珽諸侯御荼大夫服笏正民徳也斂此三者而一舉之戴天履地以順民事天子告朔于諸侯率天道而敬行之以示威于天下也諸侯内貢于天子案内納古通用率名斆地實也案斆效古通用是以不至必誅諸侯相見卿為介以其教士畢行使仁守㑹朝于天子天子以嵗二月為壇于東郊建五色設五兵具五味陳六律奏五聲案律下各本衍品字今從方本聽明教置離抗大侯規鵠豎物案豎各本訛作堅今從楊本九卿佐三公三公佐天子天子踐位諸侯各以其屬就位乃升諸侯之教士案各本重諸侯二字今從方本教士執弓挾矢揖讓而升履物以射其心志端案各本訛作其地心端今從方本色容正時以斆伎時有慶以地不時有讓以地天下之有道也有天子存國之有道也君得其正家之不亂也有仁父存是故聖人之教于民也以其近而見者稽其遠而明者天事曰明地事曰昌人事曰樂案各本脱樂字今從方本比兩以慶違此三者謂之愚民愚民曰姦姦必誅是以天下平而國家治民亦無貸居小不約居大則治衆則集寡則繆案繆穆古通用祀則得福以征則服此惟官民之上徳也公曰三代之相授必更制典物道乎子曰否猷徳保保惽乎前以小繼大變民視也案視各本作示今從方本公曰善哉子之察教我也子曰丘于君惟無言言必盡于他人則否公曰教他人則如何子曰否丘則不能昔啇老彭及仲傀案即仲虺政之教大夫官之教士技之教庻人揚則抑抑則揚綴以徳行不任以言任庻人以言案各本脱任字今從楊本猶以夏后氏之袝懷袍褐也案朱本沈本脱袍字今從各本行不越境公曰善哉我則問政子事教我子曰君問已參黄帝之制制之大禮也公曰先聖之道斯為美乎子曰斯為美雖有美者必偏屬于斯昭天之福迎之以祥作地之穡案穯各本訛作福今從方本制之以昌興民之徳守之以長公曰善哉誥志公曰誥志無荒以㑹民義齋戒必敬㑹時必節犧牲必全齊盛必潔上下禋祀外内無失節其可以省怨遠災乎子曰丘未知其可以省怨也公曰然則何以事神子曰以禮㑹時夫民見其禮則上不援案不各本訛作下今從楊本不援則樂案各本脱不字今從楊本樂斯無憂此以怨省而亂不作也案此以各本訛作以此今從楊本夫禮㑹其四時四孟四季五牲五榖順至必時其節案此下各本衍也字今從楊本丘未知其可以遠災也案此下各本衍為字今從楊本公曰然則為此何以子曰知仁合則天地成天地成則庶物時庶物時則民財􅥚案􅥚字從楊本各本訛作敬下有一作欲三字乃校書者語民財􅥚以時作時作則節事節事以動衆則有極案各本重動衆二字今從楊本有極以使民則勸勸則有功有功則無怨無怨則嗣世乆世乆惟聖人案各本脱下世乆二字今從楊本是故政以勝衆非以陵衆衆以勝事非以傷事事以靖民非以徴民故地廣而民衆非以為災長之禄也丘聞周太史曰政不率天案此下各本衍下字今從楊本不由人則凡事易壞而難成虞史伯夷曰明孟也幽幼也明幽雌雄也雌雄迭興而順至正之統也日歸于西起明于東月歸于東起明于西虞夏之厯建正于孟春案建正各本訛作正建今從晉志所引于時冰泮發蟄百草權輿瑞雉無釋案史記作百草奮興秭鳺先􅗍物乃嵗俱生于東次案各本訛作以今從楊本順四時卒于冬方案各本訛作萬今從楊本于時雞三號卒明載于青色撫十二月節卒于丑日月成嵗厯再閏以順天道此謂虞汁月案謂下各本衍嵗字今從楊本天曰作明日與維天是戴地曰作昌日與維地是事人曰作樂日與維民是嬉案三日字各本訛作曰今從袁本楊本方本民之動能不遠厥事民之妃色案妃各本訛作悲今從方本不遠厥徳此謂表裏時合物之所生而蕃昌之道如此天生物地養物物備興而時用常節曰聖人主祭于天曰天子天子崩步于四川伐于四山卒葬曰帝天作仁地作富人作治樂治不倦財富時節是故聖人嗣則治文王治以俟時湯治以伐亂禹治以移衆衆服以立天下堯貴以樂治時舉舜舜治以徳使力在國統民而恕案而各本作如今從方本在家撫官如國案如各本作而今從方本安之勿變勸之勿沮民咸廢惡而進良案而各本亦作如今從方本上誘善而行罰百姓盡于仁而遂安之此古之明制之治天下也仁者為聖貴次力次美次射御次古之治天下者必聖人聖人有國則日月不食星辰不孛案孛各本訛作勃上又衍隕字今從高安本海不運河不滿溢川澤不竭山不崩解陵不阤案阤各本作施下又衍谷字今從方本川谷不處案谷各本訛作浴今從方本深淵不涸于時龍至不閉鳯降忘翼鷙獸忘攫爪鳥忘距䗦蠆不螫嬰兒蟁䖟不食夭駒雒出服河出圖自上世以來莫不降仁國家之昌國家之臧信仁是故不賞不罰而民咸盡力案而各本作如今從方本車不建戈遠邇咸服𦙍使來往地濱畢極案濱各本訛作賓今從方本無怨無惡率惟懿徳此無空禮無空名賢人竝優殘毒以時省舉良良舉善善恤民使仁日斆仁賓案此下各本有也字今從楊本大戴禮記卷九
