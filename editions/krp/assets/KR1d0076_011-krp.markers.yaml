  - {type: variant, offset: 3562, length: 274, content: 其臣佐乃遷姒姓于杞封夏后氏之後于杞亦命氏焉發厥明徳順天嗇地案各本作順民天心嗇地今從方本作物配天制典慈民發其明徳而順天之心嗇收也咸合諸侯作八政命于總章八政洪範所云是也總章重屋之西堂于此命事取萬物之成功也服禹功以修舜緒為副于天粒食之民昭然明視民明教通于四海海之外肅慎北發渠搜氐羌來服成湯既崩案既他本或訛作年或訛作卒今從方本殷徳小破二十有二世乃有武丁即位開先祖之府取其明法以為君臣上下之節殷民更服案各本訛作眩今從楊本近者説遠者至粒食之民昭然明視武丁盤根弟小乙之子也有雊雉之變懼而修徳重興殷道號為高宗武丁既崩案既他本或訛作年或訛作卒今亦從方本殷徳大破九世乃, SBCK: ''}
