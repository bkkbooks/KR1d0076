  - {type: variant, offset: 1051, length: 275, content: 之所以長有道也成王學竝正于三公也獨云太傅舉中言及太子既冠成人免于保傅之嚴則有司過之史有虧膳之宰案有下各本衍徹字今從方本太子齒于學有榎楚之威成王雖幼固與成人等且王既冠太子有過史必書之史之義不得不書過不書過則死過書而宰徹去膳案此下各本衍夫膳二字今從方本及太平御覽所引宰之義不得不徹膳不徹膳則死于是有進善之旍堯置之令進善者立于旍下也有誹謗之木堯置之使書政之愆失也有敢諫之鼓舜置之使諫者擊之以自聞也鼓夜誦詩賈誼云瞽史誦詩然瞽與鼓聲誤也夜史為字誤工誦正諫大夫進謀工樂人也瞽官長誦謂隨其過誦詩以諷大夫諫之以義後于瞽史士傳民語習與智長故切而不攘量知授業故雖勞能受也, SBCK: ''}
