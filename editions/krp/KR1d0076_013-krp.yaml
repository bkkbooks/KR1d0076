body:
  text: 大戴禮記卷十三漢戴德撰公冠第七十九本命第八十易本命第八十一公冠案冠各本訛作符今訂正公冠案此冠字各本變訛作符今訂正自為主迎賓揖升自阼立于席入堂深異于士既醴降自阼君尊故其降也不使就賓階也其餘自為主者其降也自西階以異不敢終于正其餘皆與公同也謂迎賓升阼之等公𤣥端與皮弁皆蹕𤣥端緇布冠及𤣥冠之服也玉繅曰始冠緇布之冠自諸侯下逹冠而弊之可二服皆鞸也古者田狩而食其肉衣其皮先以兩皮如鞸以蔽其前後及後世聖人易之以布帛猶存其皮前示不妄古尊祭服異其名曰芾其制上廣一尺下廣二尺長三尺其頸五寸肩革帶博二寸朝服素鞸𤣥端諸侯之朝服皮弁天子朝服鞸從裳色皆素也公冠四加𤣥冕四當為三𤣥當為衮字之誤饗之以三獻之禮饗賓也士于賓以一獻之禮也無介于饗而贊冠者退為衆賓者君禮于臣本無介也無樂亦饗時也冠者成人代父始宜盡孝子之感不可以歡樂取之孔子曰娶婦之家三日不舉樂思嗣親也然則冠禮不舉樂同也春秋左氏傳曰以金石之樂節之謂冠之時謂節也皆𤣥端君臣同服其醻幣朱錦采四馬其慶也同其慶賓亦如是太子儗焉案太各本誤作天今據下節注訂正儗公禮也太子與庶子其冠皆自為主主侯自主之重言太子誤也家語曰王太子庶子之冠儗焉非也其禮與士同其饗賓也皆同士冠禮記曰天子之元子猶士也天下無生而貴者也成王冠周公使祝雍祝王雍太祝當辭與王為祝辭于冠告焉曰達而勿多也辭多則史少則必達祝雍曰使王近于民視民如子逺于年嗇于時惠于財反時惠施親賢使能案成王冠辭止此陛下離顯先帝之光耀案博物記離作摛離明也以承皇天嘉禄案博物記天下有之字欽順仲春之吉日案春各本誤作夏今據注文改正博物記作欽奉仲春之吉辰古者冠以仲春遵並大道邠或案博物記作普遵大道郊域邠或當為芬彧聲字之誤也秉集萬福之休靈案博物記集作率萬作百始加昭明之元服推逺稚免之幼志案博物記稚免作沖孺免猶弱也崇積文武之寵徳案博物記崇作藴寵作就文皇帝武皇帝肅勤髙祖清廟案博物志祖下有之字髙祖髙皇帝也六合之内靡不息案博物記作靡不蒙徳陛下永永與天無極案博物記無陛下二字此句下注云凡一百應是衍文孝昭冠辭案此四字題上文以别于成王冠辭漢孝昭帝冠辭皇皇上天昭臨下土集地之靈降甘風雨禮運曰地秉隂竅于山川庶物羣生各得其所靡今靡古言覆施均維予一人某敬拜皇天之祐案以上祀天辭古祝辭則云嗣王某或曰一人某王者親告之辭也薄薄之土承天之神薄旁薄也易曰乃順承天也興甘風雨庶卉百榖莫不茂者既安且寧維予一人某敬拜下土之靈案以上祭地辭維某年某月上日年謂太嵗所在月正月也其天地祝辭皆爾省文過于下明之也明光于上下勤施于四方旁作穆穆維予一人某敬拜迎于郊案以上朝日辭以正月朔日迎日于東郊古者帝王以正月朝聘率有司迎日于東郊也所以為萬品先而尊事天也本命分于道謂之命道謂𡨕化自然之道也人資始焉案資始從永樂大典本訂定他本多改作莫違者非或分得其長或分得其短其中脩促謂之命也案中他本多誤作變今從永樂大典本孔子曰死生有命形于一謂之性形法家也凡人禀于本則象之以仁受於金則象之以義孔子曰天命之謂性性者資于未生之前發于既生之後原其所始故于此言之化于隂陽象形而發謂之生象微昧易曰男女構精萬物化生也化窮數盡謂之先化窮者身也數盡者年也故命者性之終也命初分于道則是生之始也分道則脩短已定故為生之終是以始末舉也則必有終矣人生而不具者五目無見不能食不能行不能言不能化三月而徹盷案盷各本誤作盷今據玉篇所引改正盷精也轉視貌或為徹也然後能有見八月生齒然後食朞而生臏然後能行三年瞦合然後能言三月萬物一成朞年天道一備三年而天道大成故因之以變化也十有六情通然後能化隂窮反陽陽窮反隂夏至陽往隂動冬至隂消陽息是故隂以陽化陽以隂變故男以八月而生齒八嵗而齔案齔各本作毁齒二字今據文王世子疏所引訂正一隂一陽然後成道易曰一隂一陽之謂道也二八十六然後情通然後其施行施道行也女七月生齒七嵗而齔案齔各本誤毁今據文王世子疏所引訂正二七十四然後其化成化道成陽施而隂化亦天地之道也合于三也小節也男女合于三十中古男三十而娶女二十而嫁合于五也中節也合于五十太古男五十而室女三十而嫁備于三五合于八也備三五十合于八十也不言大節省文按周禮媒氏職曰令凡男三十而娶女二十而嫁内則曰二十而冠三十而有室十五笄二十而嫁尚書大傳曰男三十而娶女二十而嫁書曰有鰥在下曰虞舜喪服為夫之姑姊妹之長殤然則古者皆以二十三十為婚姻之年十六十四為嫁娶之期今有三十五十則非也故譙周云師言此說似漢初學者所續焉八者維綱也案綱各本誤作剛今從方本天地以發明故聖人以合隂陽之數也八為方維八卦之數也天地以之明聖人以之合隂陽九六大衍之數也禮義者恩之主也冠昏朝聘喪祭賔主鄉飲酒軍旅此之謂九禮也君臣冠昏朝聘五也喪祭七也鄉飲賓主八也軍旅九也禮經三百禮經統于心也威儀三千曲禮也行于貌也機其文之變也機危也謂二禮動行九事皆有其文每變不同也禮之象五行也其義四時也象五行謂内外爵與五服義宜也故以四制有恩有義有節有權恩厚者其服重故為父斬衰三年以恩制者也案各本脫也字今從方本門内之治恩掩義門外之治義斷恩資于事父以事君而敬同貴貴尊尊義之大者也故為君亦服斬衰三年以義制者也貴貴謂為大夫君尊尊謂為天子諸侯也三日而食食食粥也三月而沐將虞時朞而練毁不滅性不以死傷生也喪不過三年苴衰不補異于吉無飾也墳墓不坯同于丘陵除之日鼓素琴漸有終因省哀示民有終也以節制者也資于事父以事母而愛同天無二日國無二君家無二尊以一治之也父在為母齊衰朞見無二尊也百制具不言具不言而事行者扶而起謂天子諸侯言而後事行者杖而起謂士大夫身自執事而後事行者面垢而已謂庶人凡此以權制者也始死三日不怠三月不解朞悲號三年憂恩之殺也東夷二連其不怠者哭不絶聲不解者不脫絰帶也聖人因殺以制節也謂卒哭祥禫之變男者任也子者孶也男子者言任天地之道而長萬物之義也故謂之丈夫丈者長也夫者扶也言長萬物也知可為者知不可為者知可言者知不可言者知可行者知不可行者是故審倫而明其别謂之知所以正夫徳也案也各本誤作者今從方本女者如也子者孶也女子者言如男子之教而長其義理者也故謂之婦人婦人伏于人也是故無専制之義有三從之道在家從父適人從夫夫死從子無所敢自遂也從其教令不出閨門案各本作教令不出閨門即上注教令二字誤作正文因誤致衍事在饋食之間而已矣易曰無攸遂在中饋詩曰無非無儀惟酒食是議也是故女日及乎閨門之内案日及各本訛作及日今從方本専其志且逺嫌不百里而犇喪案不百里據注當是不見星之誤言及日故絰成見星事無獨為行無獨成之道參知而後動可驗而後言宵行以燭案各本誤作宵夜行燭今從方夲宮事必量六畜蕃于宮中謂之信也如此乃為信固也所以正婦徳也女有五不取逆家子不取亂家子不取亂淫亂也世有刑人不取世有惡疾不取喪婦長子不取逆家子者為其逆徳也亂家子者為其亂人倫也世有刑人者為其棄于人也世有惡疾者為其棄于天也喪婦長子者為其無所受命也案喪婦儀禮經傳通解所引誤作喪父後人不復檢本書致滋疑惑何休致公羊傳云婦人有五不娶喪婦長女不娶無教戒也世有惡疾不娶棄于天也世有刑人不娶棄于人也亂家女不娶類不正也逆家女不娶廢人倫也意與此同其以無所受命為無教戒義尤明顯蓋命者教戒也自女之父言故曰喪婦長謂踰笄字之年恐此女失母教致長而莫與為婚婦有七去不順父母去無子去淫去妒去有惡疾去多言去竊盗去不順父母為其逆徳也無子為其絶世也淫為其亂族也妒為其亂家也有惡疾為其不可與共粢盛也口多言為其離親也詩云婦有長舌惟厲之階盗竊為其反義也婦有三不去有所取無所歸不去與更三年喪不去前貧賤後富貴不去大罪有五逆天地者罪及五世欺造化及要君者誣文武者罪及四世非聖人者逆人倫者罪及三世非孝者此皆大亂之道也誣鬼神者罪及二世殺人者罪止其身周書曰大命世小命身故大罪有五殺人為下易本命子曰夫易之生人禽獸萬物昆蟲各有以生易說曰渾元之始是曰太易二象之所資萬品之所生易曰易有太極是生兩儀兩儀生四象四象生八卦易說曰太易者未見氣也太初者氣之始也太素者質之始也禮運曰夫禮必本于太一分而為天地轉而為隂陽變而為四時然禮易之說雖殊而會歸一或竒或偶或飛或行而莫知其情惟達道徳者能原本之矣孔子曰聖人智通于大道應化而不窮能測萬物之情也天一地二人三三三而九九九八十一一主日天之神日為尊日數十甲乙之屬故人十月而生萬類人為貴也八九七十二偶以承竒貴偶用竒竒主辰辰方主各三也辰主月月主馬月契天駟于上馬統乾于下故馬十二月而生七九六十三三主斗象次日月斗主狗斗之次似狗故擇人也故狗三月而生六九五十四四知時時主豕豕知時詩云有豕白蹢烝涉波矣故豕四月而生五九四十五五主音音主猨故猨五月而生四九三十六六主律律主禽鹿麋鹿角長短大小似律故禽鹿六月而生也麏麋之屬皆以六月生也宋均曰以所包者多故舉禽獸之名雖有飛走之異實亦通也三九二十七七主星案袁本沈本脫一七字餘本有二十八宿方各七星主虎虎炳文似星也故虎七月而生二九十八八主風風之大數盡于八也風主蟲蟲有蟄見似風動息也故蟲八日化也案日他本多誤作月今從方本蟲多生非類也其餘各以其類也謂貍兔魚鼈之屬各以其類化者然亦有本而生之也鳥魚皆生于隂而屬于陽生于隂者謂卵生也屬于陽者謂飛游于虚也故鳥魚皆卵魚遊于水鳥飛于雲釋上事也故冬燕雀入于海化而為蚧案海字下沈本衍故字以同生于隂而屬于陽故有其形性也萬物之性各異類故蠶食而不飲蟬飲而不食蜉蝣不飲不食淮南子曰蠶食而不飲三十二日而化蟬飲而不食三十日而死蜉蝣不飲不食三日而終也介鱗夏食冬蟄熊羆魚蛇之屬齕吞者案吞各本誤作蠶今從方本八竅而卵生鳥屬也凡物之有異類者韓詩外傳曰鶬鴿胎生孔子渡江見而異之者乎咀噍者案噍各本誤作嚾今從方本九竅而胎生人及獸屬異物志又曰狸十有一種囊狸卵生也四足者無羽翼戴角者無上齒董仲舒曰受于大者不取于小無角者膏凝者為膏而無前齒無前齒者齒盛于後不用前也有角者脂案角各作誤作羽今從方本釋者為脂而無後齒齒盛于前不任後也晝生者類父夜生者類母至隂至陽類甚多也至隂為男至陽為女者即隂窮反陽陽窮反隂之類凡地東西為緯南北為經山為積徳川為積刑山積陽川積隂陽為徳隂為刑髙者為生下者為死丘陵為牡谿谷為牝蜯蛤龜珠與月盛虚月者太隂之精故龜蛤之屬因之以盛虧呂氏春秋曰月望則蜯蛤實月虧則蜯蛤虚孝經爰神契曰月虧于天則隂類消于淵也是故堅土之人肥虚土之人大肥者象地堅實大者象地虚縱也沙土之人細沙土養細乃薄也息土之人美耗土之人醜息土為衍沃之田耗土為疏薄之地地有美惡故生人有好醜也周禮大司徒職曰山林之民毛而方川澤之民黒而津丘陵之民専而長墳衍之民晳而瘠原隰之民豐肉而庳此大辨五土之分是故食水者善游能寒案沈本誤作善走而寒魚鼈之屬食土者無心而不息蚯蚓之屬不氣息也若魚無耳而聴蟋蟀無口而鳴皆自然之性也食木者多力而拂熊犀之屬拂戾也食草者善走而愚麋鹿之屬食桑者有絲而蛾食肉者勇敢而悍案悍各本誤作捍今從方本虎狼鷹鶻之屬食榖者智惠而巧食氣者神明而壽王喬赤松之類也西極亦有食氣之民也不食者不死而神伸于道者則神而常存也故曰有羽之蟲三百六十而鳯凰為之長有毛之蟲三百六十而麒麟為之長有甲之蟲三百六十而神龜為之長有鱗之蟲三百六十而蛟龍為之長倮之蟲三百六十而聖人為之長此乾坤之美類禽獸萬物之數也三百六十乾坤之中央萬一千五百二十當萬物之數也故帝王好壊巢破卵則鳯凰不翔焉好竭水摶魚則蛟龍不出焉好刳胎殺夭則麒麟不來焉好塡谿塞谷則神龜不出焉故王者動必以道静必以理動不以道靜不以理則自夭而不壽訞㜸數起神靈不見風雨不時暴風水旱竝興人民夭死五榖不滋六畜不蕃息大戴禮記卷十三
