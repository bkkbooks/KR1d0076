body:
  text: 大戴禮記卷第十文王官人第七十二王曰太師慎維深思內觀民務察度情偽變官民能歷其才藝女維敬哉女何慎乎非倫倫有七屬屬有九用用有六微一曰觀誠二曰考志三曰視中四曰觀色五曰觀隱六曰揆德王曰於乎女因方以觀之富貴者觀其有禮施也貧窮者觀其有德守也嬖寵者觀其不驕奢也隱約者觀其不懾懼也其少者觀其恭敬好學而能弟也其壯者觀其潔廉務行而勝其私也其老者觀其意憲慎強其所不足者觀其不踰也父子之間觀其孝慈也兄弟之間觀其和友也君臣之間觀其忠惠也鄉黨之間觀其信憚也省其居處觀其義方省其喪哀觀其貞良省其出入觀其交友省其交友觀其任廉考之以觀其信挈之以謀以觀其知示之以難以觀其勇煩之以事以觀其治淹之以利以觀其不貪藍之以樂以觀其不寧喜之以觀其不輕怒之以觀其重醉之以觀其不失也縱之以觀其常遠使之以觀其不二邇之以觀其不倦探取其志以觀其情考其陰陽以觀其誠覆其微言以觀其信曲省其行以觀其備成此之謂觀誠也二曰方與之言以觀其志志殷如深其氣寬以柔其色儉而不諂其禮先人其言後人見其所不足曰日益者也如臨人以色高人以氣賢人以言防其所不足伐其所能曰日損者也其貌直而不傷其言正而不私不飾其美不隱其惡不防其過曰有質者也其貌固嘔其言工巧飾其見物務其小徵以故自説曰無質者也喜怒以物而色不作煩亂之而志不營深道以利而心不移臨懾以威而氣不卑曰平心而固守者也喜怒以物而變易知煩亂之而志不裕示之以利而易移臨懾以威而易懾曰鄙心而假氣者也設之以物而遫驚決之以卒而度料不學而性辨曰有慮者也難投以物難説以言知一如不可以解也困而不知其止無辨而自慎曰愚怒者也營之以物而不虞犯之以卒而不懼置義而不可遷臨之以貨色而不可營曰潔廉而果敢者也易移以言存志不能守錮已諾無斷曰弱志者也順與之弗為喜非奪之弗為怒沉靜而寡言多稽而儉貌曰質靜者也辨言而不固行有道而先困自慎而不讓當如強之曰始妬誣者也徵清而能發度察而能盡曰治志者也華如誣巧言令色足恭一也皆以無為有者也此之為考志也三曰誠在其中必見於外以其見占其隱以其細占其大以其聲處其氣氣初生物物生有聲聲有剛有柔有濁有清有好有惡咸發於聲也心氣華誕者其聲流散心氣順信者其聲順節心氣鄙戾者其聲嘶醜心氣寬柔者其聲溫好信氣中易義氣時舒智氣簡備勇氣壯直聽其聲處其氣考其所為觀其所由察其所安以其前占其後以其見占其隱以其小占其大此之謂視中也四曰民有五性喜怒欲懼憂也喜氣內畜雖欲隱之陽喜必見怒氣內畜雖欲隱之陽怒必見欲氣內畜雖欲隱之陽欲必見懼氣內畜雖欲隱之陽懼必見憂悲之氣內畜雖欲隱之陽憂必見五氣誠于中發形于外民情不可隱也喜色由然以生怒色拂然以侮欲色嘔然以偷懼色薄然以下憂悲之色纍然而靜誠智必有難盡之色誠仁必有可尊之色誠勇必有難懾之色誠忠必有可親之色誠潔必有難污之色誠靜必有可信之色質色皓然固以安偽色縵然亂以煩雖欲改之中色不聽也雖變可知此之謂觀色也五曰生民有霒陽人有多隱其情飾其偽以賴於物以攻其名也有隱於仁質者有隱於知理者有隱於文藝者有隱於廉勇者有隱於忠孝者有隱於交友者如此者不可不察也小施而好大得小讓而好大事言願以為質偽愛以為忠面寬而貌慈假節以示之故其行以攻其名如此者隱於仁質也推前惡忠府知物焉首成功少其所不足慮誠不及佯為不言內誠不足色示有餘故知以動人自順而不讓錯辭而不遂莫知其情如此者隱於知理者也素動人以言涉物而不終問則不對詳為不窮色示有餘有道而自順用之物窮則為深如此者隱於文藝者也廉言以為氣驕厲以為勇內恐外悴無所不至亟稱其説以詐臨人如此者隱於廉勇者也自事其親好以告人乞言勞醉而面於敬愛飾其見物故得其名名揚於外不誠於內伐名以事其親戚以故取利分白其名以私其身如此者隱於忠孝者也陰行以取名比周以相譽明知賢可以徵與左右不同不同而交交必重己心説之而身不近之身近之而實不至而歡忠不盡歡忠盡見於衆而貌克如此者隱於交友者也此之謂觀隱也六曰言行不類終始相悖陰陽克易外內不合雖有隱節見行曰非誠質者也其言甚忠其行甚平其志無私施不在多靜而寡類而安人曰有仁心者也事變而能治物善而能説浚窮而能達錯身立方而能遂曰廣知者也少言如行恭儉以讓有知而不伐有施而不德曰慎謙良者也微忽之言久而可復幽間之行獨而不克行其亡如其存曰順信者也貴富雖尊恭儉而能施衆強嚴威有禮而不驕曰有德者也隱約而不懾安樂而不奢勤勞之不變喜怒之如度晣曰有守者也直方而不毀廉潔而不戾立強而無私曰有經者也正靜以待命不召不至不問不言言不過行行不過道曰沉靜者也忠愛以事其親歡欣以敬之盡力而不面敬以安人以名故不生焉曰忠孝者也合志如同方共其憂而任其難行忠信而不相疑迷隱遠而不相舍曰至友者也心色辭氣其入人甚俞進退工故其與人甚巧其就人甚速其叛人甚易曰位志者也飲食以親貨賄以交接利以合故得望譽征利而依隱於物曰貪鄙者也質不斷辭不至少其所不足謀而不已曰偽詐者也言行亟變從容謬易好惡無常行身不類曰無誠志者也小知而不大決小能而不大成顧小物而不知大論亟變而多私曰華誕者也規諫而不類道行而不平曰巧名者也故事阻者不夷畸鬼者不仁面譽者不忠飾貌者不情隱節者不平多私者不義揚言者寡信此之謂揆德王曰太師女推其往言以揆其來行聽其來言以省往行觀其陽以考其陰察其內以揆其外是故隱節者可知偽飾無情者可辨質誠居善者可得忠惠守義者可見也王曰於乎敬哉女何慎乎非心何慎乎非人人有六徵六徵既成以觀九用九用既立一曰取平人而有慮者二曰取慈惠而有理者三曰取直愍而忠正者四曰取順直而察聽者五曰取臨事而潔正者六曰取慎察而潔廉者七曰取好謀而知務者八曰取接給而廣中者九曰取猛毅而度斷者此之謂九用也平仁而有慮者使是治國家而長百姓慈惠而有理者使是長鄉邑而治父子直愍而忠正者使是蒞百官而察善否慎直而察聽者使是長民之獄訟出納辭令臨事而潔正者使是守內藏而治出入慎察而潔廉者使是分財臨貨主賞賜巧謀而知務者使治壤地而長百工接給而廉中者使是治諸侯而待賓客猛毅而度斷者使是治軍事為邊境因方而用之此之謂官能也九用有徵乃任七屬一曰國則任貴二曰鄉則任貞三曰官則任長四曰學則任師五曰族則任宗六曰家則任主七曰先則任賢正月王親命七屬之人曰於乎慎維深思內觀民務本慎在人女平心去私慎用六證論辨九用以交一人豫亦不私女廢朕命亂我法罪致不赦三戒然後及論王親受而考之然後論成諸侯遷廟第七十三成廟將遷之新廟君前徙三日齋祝宗人及從者皆齋徙之日君玄服從者皆玄服從至于廟群臣如朝位君入立於阼階下西向有司如朝位宗人擯舉手曰有司其請升君升祝奉幣從在左北面再拜興祝聲三曰孝嗣侯某敢以嘉幣告于皇考某侯成廟將徙敢告君及祝再拜興祝曰請導君降立於階下奉衣服者皆奉以從祝奉衣服者降堂君及在位者皆辟也奉衣服者至碑君從有司皆以次從出廟門奉衣服者升車乃步君升車從者皆就車也凡出入門及大溝渠祝下擯至于新廟筵于戶牖間樽於西序下脯醢陳于房中設洗當東榮南北堂深有司皆先入如朝位祝導奉衣服者乃入君從奉衣服者入門左在位者皆辟也奉衣服者升堂皆反位君從升奠衣服于席上祝奠幣于几東君北向祝在左贊者盥升適房薦脯醢君盥酌奠于薦西反位君及祝再拜興祝聲三曰孝嗣侯某敢用嘉幣告于皇考某侯今月吉日可以徙于新廟敢告再拜君就東廂西面祝就西廂東面在位者皆反走辟如食間擯者舉手曰請反位君反位祝從在左卿大夫及衆有司諸在位者皆反位祝聲三曰孝嗣侯某潔為而明薦之享君及祝再拜君反位祝徹反位擯者曰遷廟事畢請就燕君出廟門卿大夫有司執事者皆出廟門告事畢乃曰擇日而祭焉諸侯釁廟第七十四成廟釁之以羊君玄服立于寢門內南向祝宗人宰夫雍人皆玄服宗人曰請命以釁某廟君曰諾遂入雍人拭羊乃行入廟門碑南北面東上雍人舉羊升屋自中中屋南面刲羊血流于前乃降門以雞有司當門北面雍人割雞屋下當門郟室割雞於室中有司亦北面也既事宗人告事畢皆退反命于君君寢門中南向宗人曰釁某廟事畢君曰諾宗人請就宴君揖之乃退
