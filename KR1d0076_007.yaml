body:
  text: 大戴禮記卷第七五帝德第六十二宰我問於孔子曰昔者豫聞諸榮伊令黃帝三百年請問黃帝者人邪抑非人邪何以至於三百年乎孔子曰豫禹湯文武成王周公可勝觀邪夫黃帝尚矣女何以為先生難言之宰我曰上世之傳隱微之説卒業之辨暗忽之意非君子之道也則豫之問也固矣孔子曰黃帝少典之子也曰軒轅生而神靈弱而能言幼而彗齊長而敦敏成而聰明治五氣設五量撫萬民度四方教熊羆貔豹虎以與赤帝戰于版泉之野三戰然後得行其志黃帝黼黻衣大帶黼裳乘龍扆雲以順天地之紀幽明之故死生之説存亡之難時播百穀屮木故教化淳鳥獸昆蟲曆離日月星辰極畋土石金玉勞心力耳目節用水火材物生而民得其利百年死而民畏其神百年亡而民用其教百年故曰三百年宰我請問帝顓頊孔子曰五帝用記三王用度女欲一日辨聞古昔之説躁哉豫也宰我曰昔者豫也聞諸夫子曰小子無有宿問孔子曰顓頊黃帝之孫昌意之子也曰高陽洪淵以有謀疏通而知事養材以任地履時以象天依鬼神以制義治氣以教民潔誠以祭祀乘龍而至四海北至于幽陵南至于交趾西濟于流沙東至于蟠木動靜之物大小之神日月所照莫不祗屬宰我曰請問帝嚳孔子曰玄囂之孫蟜極之子也曰高辛生而神靈自言其名博施利物不於其身聰以知遠明以察微順天之義知民之急仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之曆日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士春夏乘龍秋冬乘馬黃黼黻衣執中而獲天下日月所照風雨所至莫不從順宰我曰請問帝堯孔子曰高辛之子也曰放勳其仁如天其知如神就之如日望之如雲富而不驕貴而不豫黃黼黻衣丹車白馬伯夷主禮龍夔教舞舉舜彭祖而任之四時先民治之流共工于幽州以變北狄放歡兜于崇山以變南蠻殺三苗于三危以變西戎殛鯀于羽山以變東夷其言不貣其德不回四海之內舟輿所至莫不説夷宰我曰請問帝舜孔子曰蟜牛之孫瞽叟之子也曰重華好學孝友聞于四海陶家事親寬裕溫良教敦而知時畏天而知時畏天而愛民恤遠而親親承受大命依于倪皇睿明通知為天下王使禹傅土主明山川以利於民使后稷播種務勤嘉穀以作飲食羲和掌曆敬授民時使益行火以辟山萊伯夷主禮以節天下夔作樂以歌籥舞和以鍾鼓皋陶作士忠信疏通知民之情契作司徒教民孝友敬政率經其言不惑其德不慝舉賢而天下平南撫交址大教西鮮支渠庾氐羌北山戎發息慎東長夷鳥夷羽民舜之少也惡悴勞苦二十以孝聞乎天下三十在位嗣帝所五十乃死葬于蒼梧之野宰我曰請問禹孔子曰高陽之孫鯀之子也曰文命敏給克濟其德不回其仁可親其言可信聲為律身為度稱以出亹亹穆穆為綱為紀巡九州通九道陂九澤度九山為神主為民父母左準繩右規矩履四時據四海平九州戴九天明耳目治天下舉皋陶與益以贊其身舉干戈以征不享不道無道之民四海之內舟車所至莫不賓服孔子曰豫大者如説民説至矣豫也非其人也宰我曰豫也不足誠也敬承命矣他日宰我以語人有為道諸孔子之所孔子曰吾欲以顏色取人於滅明邪改之吾欲以語言取人於豫邪改之吾欲以容貌取人於師邪改之宰我聞之懼不敢見帝繫第六十三少典産軒轅是為黃帝黃帝産玄囂玄囂産蟜極蟜極産高辛是為帝嚳帝嚳産放勳是為帝堯黃帝産昌意昌意産高陽是為帝顓頊顓頊産窮蟬窮蟬産敬康敬康産句芒句芒産蟜牛蟜牛産瞽叟瞽叟産重華是為帝舜及象産敖顓頊産鯀鯀産文命是為禹黃帝居軒轅之丘娶于西陵氏之子謂之嫘祖氏産青陽及昌意青陽降居泜水昌意降居若水昌意娶于蜀山氏蜀山氏之子謂之昌濮氏産顓頊顓頊娶于滕奔氏滕奔氏之子謂之女祿氏産老童老童娶于竭水氏竭水氏之子謂之高緺氏産重黎及吳回吳回産陸終陸終娶于鬼方氏鬼方氏之妹謂之女隤氏産六子孕而不粥三年啓其左脅六人出焉其一曰樊是為昆吾其二曰惠連是為參胡其三曰籛是為彭祖其四曰萊言是為云鄶人其五曰安是為曹姓其六曰季連是為羋姓季連産付祖付祖産內熊九世至于渠婁鯀出自熊渠有子三人其孟之名為無康為句亶王其中之名為紅為鄂王其季之名為疪為戚章王昆吾者衛氏也參胡者韓氏也彭祖者彭氏也云鄶人者鄭氏也曹姓者邾氏也季連者楚氏也帝嚳卜其四妃之子而皆有天下上妃有邰氏之女也曰薑嫄氏産后稷次妃有娀氏之女也曰簡狄氏産契次妃曰陳隆氏産帝堯次妃曰陬訾氏産帝摯帝堯娶于散宜氏之子謂之女皇帝舜娶于帝堯之子謂之女匽鯀娶于有莘氏有莘氏之子謂之女志氏産文命禹娶于塗山氏塗山氏之子謂之女憍氏産啓勸學第六十四君子曰學不可以已青取之於藍而青於藍水則為冰而寒於水木直中繩輮而為輪其曲中規雖有枯暴不復挺者輮使之然也是故不升高山不知天之高也不臨深溪不知地之厚也不聞先王之遺道不知學問之大也干越戎貉之子生而同聲長而異俗者教使之然也是故木從繩則直金就礪則利君子博學如日參己焉故知明而行無過矣詩云嗟爾君子無恆安息靖恭爾位好是正直神之聽之介爾景福神莫大於化道福莫長於無咎孔子曰吾嘗終日思矣不如須臾之所學也吾嘗跂而望矣不如升高之博見也升高而招非臂加長也而見者遠順風而呼非聲加疾也而聞者著假車馬者非利足也而致千里假舟楫者非能水也而絶江海君子之性非異也善假於物也南方有鳥名曰𧊷鳩以羽為巢編之以髮繫之葦苕風至苕折子死卵破巢非不完也所繫者然也西方有木名曰射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也蓬生麻中不扶自直蘭氏之根懷氏之苞漸之滫夫君子不近庶人不服質非不美也所漸者然也是故君子靖居恭學修身致志處必擇鄉遊必就士所以防僻邪而邇中正也物類之起必有所始榮辱之來各象其德肉腐出蟲魚枯生蠹怠敖亡身禍災乃作強自取折柔自取束邪穢在身怨之所構布薪若一火就燥也平地若一水就濕也草木疇生禽獸群居物各從其類也是故正鵠張而弓矢至焉林木茂而斧斤至焉樹成蔭而鳥息焉醯酸而蚋聚焉故言有召禍行有招辱君子慎其所立焉積土成山風雨興焉積水成川蛟龍生焉積善成德神明自傳聖心備焉是故不積跬步無以致千里不積小流無以成江海騏驥一躒不能十步駑馬無極功在不舍楔而舍之朽木不知楔而不舍金石可鏤夫蚓無爪牙之利筋脈之強上食晞土下飲黃泉者用心一也蟹二螯八足非蛇鱔之穴而無所寄託者用心躁也是故無憤憤之志者無昭昭之明無綿綿之事者無赫赫之功行跂塗者不至事兩君者不容目不能兩視而明耳不能兩聽而聰騰蛇無足而騰鼫鼠五伎而窮詩云鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心若結兮君子其結於一也昔者瓠巴鼓瑟而沉魚出聽伯牙鼓琴而六馬仰秣夫聲無細而不聞行無隱而不形玉居山而木潤淵生珠而岸不枯為善而不積乎豈有不至哉孔子曰野哉君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫遠而有光者飾也近而逾明者學也譬之如汙邪水潦屬焉莞蒲生焉從上觀之誰知其非源泉也珠者陰之陽也故勝火玉者陽之陰也故勝水其化如神故天子藏珠玉諸侯藏金石大夫畜犬馬百姓藏布帛不然則強者能守之知者能秉之賤其所貴而貴其所賤不然矜寡孤獨不得焉子貢曰君子見大川必觀何也孔子曰夫水者君子比德焉偏與之而無私似德所及者生所不及者死似仁其流行痺下倨句皆循其理似義其赴百仞之溪不疑似勇淺者流行深淵不測似智弱約危通似察受惡不讓似貞苞裹不清以入鮮潔以出似善化必出量必平似正盈不求概似厲折必以東西似意是以見大川必觀焉
