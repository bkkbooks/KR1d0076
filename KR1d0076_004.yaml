body:
  text: 大戴禮記卷第四曾子立事第四十九曾子曰君子攻其惡求其過彊其所不能去私欲從事於義可謂學矣君子愛日以學及時以行難者弗辟易者弗從唯義所在日旦就業夕而自省思以歿其身亦可謂守業矣君子學必由其業問必以其序問而不決承間觀色而復之雖不說亦不彊爭也君子既學之患其不博也既博之患其不習也既習之患其無知也既知之患其不能行也既能行之患其不能以讓也君子之學致此五者而已矣君子博學而孱守之微言而篤行之行必先人言必後人君子終身守此悒悒行無求數有名事無求數有成身言之後人揚之身行之後人秉之君子終身守此憚憚君子不絶小不殄微也行自微也不微人人知之則願也人不知苟吾自知也君子終身守此勿勿也君子禍之為患辱之為畏見善恐不得與焉見不善恐其及己也是故君子疑以終身君子見利思辱見惡思詬嗜欲思恥忿怒思患君子終身守此戰戰也君子慮勝氣思而後動論而後行行必思言之言之必思復之思復之必思無悔言亦可謂慎矣人信其言從之以行人信其行從之以復復宜其類類宜其年亦可謂外內合矣君子疑則不言未問則不言兩問則不行其難者君子患難除之財色遠之流言滅之禍之所由生自孅孅也是故君子夙絶之君子己善亦樂人之善也己能亦樂人之能也己雖不能亦不以援人君子好人之為善而弗趣也惡人之為不善而弗疾也疾其過而不補也飾其美而不伐也伐則不益補則不改矣君子不先人以惡不疑人以不信不說人之過成人之美存往者在來者朝有過夕改則與之夕有過朝改則與之君子義則有常善則有鄰見其一冀其二見其小冀其大苟有德焉亦不求盈於人也君子不絶人之歡不盡人之禮來者不豫往者不慎也去之不謗就之不賂亦可謂忠矣君子恭而不難安而不舒遜而不諂寬而不縱惠而不儉直而不徑亦可謂知矣君子入人之國不稱其諱不犯其禁不服華色之服不稱懼惕之言故曰與其奢也寧儉與其倨也寧句可言而不信寧無言也君子終日言不在尤之中小人一言終身為罪君子亂言而弗殖神言弗致也道遠日益矣衆信弗主靈言弗與人言不信不和君子不唱流言不折辭不陳人以其所能言必有主行必有法親人必有方多知而無親博學而無方好多而無定者君子弗與也君子多知而擇焉博學而算焉多言而慎焉博學而無行進給而不讓好直而徑儉而𠋤者君子不與也夸而無恥彊而無憚好勇而忍人者君子不與也亟達而無守好名而無體忿怒而無惡足恭而口聖而無常位者君子弗與也巧言令色能小行而篤難於仁矣嗜酤酒好謳歌巷遊而鄉居者乎吾無望焉耳出入不時言語不序安易而樂暴懼之而不恐說之而不聽雖有聖人亦無若何矣臨事而不敬居喪而不哀祭祀而不畏朝廷而不恭則吾無由知之矣三十四十之間而無藝即無藝矣五十而不以善聞則無聞矣七十而無德雖有微過亦可以勉矣其少不諷誦其壯不論議其老不教誨亦可謂無業之人矣少稱不弟焉恥也壯稱無德焉辱也老稱無禮焉罪也過而不能改倦也行而不能遂恥也慕善人而不與焉辱也弗知而不問焉固也說而不能窮也喜怒異慮惑也不能行而言之誣也非其事而居之矯也道言而飾其辭虛也無益而厚受祿竊也好道煩言亂也殺人而不戚焉賊也人言不善而不違近於說其言說其言殆於以身近之也殆於以身近之殆於身之矣人言善而色葸焉近於不說其言不悅其言殆於以身近之也殆於以身近之殆於身之矣故目者心之浮也言者行之指也作於中則播於外也故曰以其見者占其隱者故曰聽其言也可以知其所好矣觀說之流可以知其術也久而復之可以知其信矣觀其所愛親可以知其人矣臨懼之而觀其不恐也怒之而觀其不惛也喜之而觀其不輕也近諸色而觀其不踰也飲食之而觀其有常也利之而觀其能讓也居哀而觀其貞也居約而觀其不營也動勞之而觀其不擾人也君子之於不善也身勿為能也色勿為不可能也色也勿為可能也心思勿為不可能也太上樂善其次安之其下亦能自彊仁者樂道智者利道愚者從弱者畏不愚不弱執誣以彊亦可謂棄民矣太上不生惡其次生而能夙絶之也其下復而能改也復而不改殞身覆家大者傾覆社禝是故君子出言以鄂鄂行身以戰戰亦殆勉於罪矣是故君子為小由為大也居由仕也備則未為備也而勿慮存焉事父可以事君事兄可以事師長使子猶使臣也使弟猶使承嗣也能取朋友者亦能取所豫從政者矣賜與其宮室亦猶用慶賞於國也忿怒其臣妾亦猶用刑罰於萬民也是故為善必自內始也內人怨之雖外人亦不能立也居上位而不淫臨事而栗者鮮不濟矣先憂事者後樂事先樂事者後憂事昔者天子日旦思其四海之內戰戰唯恐不能乂諸侯日旦思其四封之內戰戰唯恐失損之大夫士日旦思其官戰戰唯恐不能勝庶人日旦思其事戰戰唯恐刑罰之至也是故臨事而栗者鮮不濟矣君子之於子也愛之而勿面也使之而勿貌也導之以道而勿強也宮中雍雍外焉肅肅兄弟憘憘朋友切切遠者以貌近者以情友以立其所能而遠其所不能苟無失其所守亦可與終身矣曾子本孝第五十曾子曰忠者其孝之本與孝子不登高不履危痺亦弗憑不苟笑不苟訾隱不命臨不指故不在尤之中也孝子惡言死焉流言止焉美言興焉故惡言不出於口煩言不及於己故孝子之事親也居易以俟命不興險行以徼幸孝子游之暴人違之出門而使不以或為父母憂也險塗隘巷不求先焉以愛其身以不敢忘其親也孝子之使人也不敢肆行不敢自專也父死三年不敢改父之道又能事父之朋友又能率朋友以助敬也君子之孝也以正致諫士之孝也以德從命庶人之孝也以力惡食任善不敢臣三德故孝之於親也生則有義以輔之死則哀以蒞焉祭祀則蒞之以敬如此而成於孝子也曾子立孝第五十一曾子曰君子立孝其忠之用禮之貴故為人子而不能孝其父者不敢言人父不能畜其子者為人弟而不能承其兄者不敢言人兄不能順其弟者為人臣而不能事其君者不敢言人君不能使其臣者也故與父言言畜子與子言言孝父與兄言言順弟與弟言言承兄與君言言使臣與臣言言事君君子之孝也忠愛以敬反是亂也盡力而有禮莊敬而安之微諫不倦聽從而不怠歡欣忠信咎故不生可謂孝矣盡力無禮則小人也致忠而不敬則不入也是故禮以將其力敬以入其忠飲食移味居處溫愈著心於此濟其志也子曰可入也吾任其過不可入也吾辭其罪詩云有子七人莫慰母心子之辭也夙興夜寐無忝爾所生言不自舍也不恥其親君子之孝也是故未有君而忠臣可知者孝子之謂也未有長而順下可知者弟弟之謂也未有治而能仕可知者先修之謂也故曰孝子善事君弟弟善事長君子一孝一悌可謂知終矣曾子大孝第五十二曾子曰孝有三大孝尊親其次不辱其下能養公明儀問於曾子曰夫子可謂孝乎曾子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者也安能為孝乎身者親之遺體也行親之遺體敢不敬乎故居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂災及乎身敢不敬乎故烹熟鮮香嘗而進之非孝也養也君子之所謂孝者國人皆稱願焉曰幸哉有子如此所謂孝也已民之本教曰孝其行之曰養養可能也敬為難敬可能也安為難安可能也久為難久可能也卒為難父母既歿慎行其身不遺父母惡名可謂能終矣夫仁者仁此者也義者宜此者也忠者中此者也信者信此者也禮者體此者也行者行此者也彊者彊此者也樂自順此生刑自反此作夫孝者天下之大經也夫孝置之而塞於天地衡之而衡於四海施諸後世而無朝夕推而放諸東海而準推而放諸西海而準推而放諸南海而準推而放諸北海而準詩云自西自東自南自北無思不服此之謂也孝有三大孝不匱中孝用勞小孝用力博施備物可謂不匱矣尊仁安義可謂用勞矣思慈愛忘勞可謂用力矣父母愛之喜而不忘父母惡之懼而無怨父母有過諫而不逆父母既歿以哀祀之如此之謂禮終矣樂正子春下堂而傷其足傷瘳數月不出猶有憂色門弟子問曰夫子傷足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也吾聞之曾子曾子聞諸夫子曰天之所生地之所養人為大矣父母全而生之子全而歸之可謂孝矣不虧其體可謂全矣故君子蹞步之不敢忘也今豫忘夫孝之道矣豫是以有憂色故君子一舉足不敢忘父母一出言不敢忘父母一舉足不敢忘父母故道而不徑舟而不游不敢以先父母之遺體行殆也一出言不敢忘父母是故惡言不出於口忿言不及於己然后不辱其身不憂其親則可謂孝矣草木以時伐焉禽獸以時殺焉夫子曰伐一木殺一獸不以其時非孝也曾子事父母第五十三單居離問於曾子曰事父母有道乎曾子曰有愛而敬父母之行若中道則從若不中道則諫諫而不用行之如由己從而不諫非孝也諫而不從亦非孝也孝子之諫達善而不敢爭辨爭辨者亂之所由興也由己為無咎則寧由己為賢人則亂孝子無私樂父母所憂憂之父母所樂樂之孝子唯巧變故父母安之若夫坐如尸立如齊弗訊不言言必齊色此成人之善者也未得為人子之道也單居離問曰事兄有道乎曾子曰有尊事之以為己望也兄事之不遺其言兄之行若中道則兄事之兄之行若不中道則養之養之內不養於外則是越之也養之外不養於內則是疏之也是故君子內外養之也單居離問曰使弟有道乎曾子曰有嘉事不失時也弟之行若中道則正以使之弟之行若不中道則兄事之詘事兄之道若不可然后舍之矣曾子曰夫禮大之由也不與小之自也飲食以齒力事不讓辱事不齒執觴觚杯豆而不醉和歌而不哀夫弟者不衡坐不苟越不干逆色趨翔周旋俯仰從命不見於顏色未成於弟也
