body:
  text: 大戴禮記卷第一主言第三十九孔子閒居曾子侍孔子曰參今之君子惟士與大夫之言之聞也其至於君子之言者甚希矣於乎吾主言其不出而死乎哀哉曾子起曰敢問何謂主言孔子不應曾子懼肅然摳衣下席曰弟子知其不孫也得夫子之閒也難是以敢問也孔子不應曾子懼退負序而立孔子曰參女可語明主之道與曾子曰不敢以為足也得夫子之閒也難是以敢問孔子曰吾語女道者所以明德也德者所以尊道也是故非德道不尊非道德不明雖有國之良馬不教不服不可以取千里雖有博地眾民不以其道治之不可以霸主是故昔者明主內脩七教外行三至七教脩焉可以守三至行焉可以征七教不脩雖守不固三至不行雖征不服是故明主之守也必折衝乎千里之外其征也衽席之上還師是故內修七教而上不勞外行三至而財不費此之謂明主之道也曾子曰敢問不費不勞可以為明乎孔子愀然揚麋曰參女以明主為勞乎昔者舜左禹而右皋陶不下席而天下治夫政之不中君之過也政之既中令之不行職事者之罪也明主奚為其勞也昔者明主關譏而不征市鄽而不稅稅十取一使民之力歲不過三日入山澤以時有禁而無征此六者取財之路也明主捨其四者而節其二者明主焉取其費也曾子曰敢問何謂七教孔子曰上敬老則下益孝上順齒則下益悌上樂施則下益諒上親賢則下擇友上好德則下不隱上惡貪則下恥爭上強果則下廉恥民皆有別則貞則正亦不勞矣此謂七教七教者治民之本也教定是正矣上者民之表也表正則何物不正是故君先立於仁則大夫忠而士信民敦工璞商愨女憧婦空空七者教之志也七者布諸天下四方而不窕內諸尋常之室而不塞是故聖人等之以禮立之以義行之以順而民之棄惡也如濯曾子曰弟子則不足道則至矣孔子曰參姑止又有焉昔者明主之治民也有法必別地以州之分屬而治之然後賢民無所隱暴民無所伏使有司日省如時考之歲誘賢焉則賢者親不肖者懼使之哀鰥寡養孤獨恤貧窮誘孝悌選賢舉能此七者修則四海之內無刑民矣上之親下也如腹心則下之親上也如保子之見慈母也上下之相親如此然後令則從施則行因民既邇者說服遠者來懷然後布指知寸布手知尺舒肘知尋十尋而索百步而堵三百步而里千步而井三井而句烈三句烈而距五十里而封百里而有都邑乃為畜積衣裘焉使處者恤行者有與亡是以蠻夷諸夏雖衣冠不同言語不合莫不來至朝覲於王故曰無市而民不乏無刑而民不違畢弋田獵之得不以盈宮室也徵歛於百姓非以充府庫也慘怛以補不足禮節以損有餘故曰多信而寡貌其禮可守其言可復其跡可履其於信也如四時春秋冬夏其博有萬民也如飢而食如渴而飲下土之人信之夫暑熱凍寒遠若邇非道邇也及其明德也是以兵革不動而威用利不施而親此之謂明主之守也折衝乎千里之外此之謂也曾子曰敢問何謂三至孔子曰至禮不讓而天下治至賞不費而天下之士說至樂無聲而天下之民和明主篤行三至故天下之君可得而知也天下之士可得而臣也天下之民可得而用也曾子曰敢問何謂也孔子曰昔者明王必盡知天下良士之名既知其名又知其數既知其數又知其所在焉明主因天下之爵以尊天下之士此之謂至禮不讓而天下治因天下之祿以富天下之士此之謂至賞不費而天下之士說天下之士說則天下之明譽興焉此之謂至樂無聲而天下之民和故曰所謂天下之至仁者能合天下之至親者也所謂天下之至知者能用天下之至和者也所謂天下之至明者能選天下之至良者也此三者咸通然後可以征是故仁者莫大於愛人知者莫大於知賢政者莫大於官賢有土之君修此三者則四海之內拱而俟然後可以征明主之所征必道之所廢者也彼廢道而不行然後誅其君致其征弔其民而不奪其財也故曰明主之征也猶時雨也至則民說矣是故行施彌博得親彌眾此之謂衽席之上乎還師哀公問五義第四十魯哀公問於孔子曰吾欲論吾國之士與之為政何如者取之孔子對曰生乎今之世志古之道居今之俗服古之服舍此而為非者不亦鮮乎哀公曰然則今夫章甫句屨紳帶而搢笏者此皆賢乎孔子曰否不必然今夫端衣玄裳冕而乘路者志不在於食葷斬衰蕑屨杖而歠粥者志不在於飲食故生乎今之世志古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎哀公曰善何如斯可謂庸人矣孔子對曰所謂庸人者口不能道善言而志不邑邑不能選賢人善士而託其身焉以為己憂動行不知所務止立不知所定日選於物不知所貴從物而流不知所歸五鑿為政心從而壞若此則可謂庸人矣哀公曰善何如斯可謂士矣孔子對曰所謂士者雖不能盡道術必有所由焉雖不能盡善美必有所處焉是故知不務多而務審其所知行不務多而務審其所由言不務多而務審其所謂知既知之行既由之言既順之若夫性命肌膚之不可易也富貴不足以益貧賤不足以損若此則可謂士矣哀公曰善何如斯可謂君子矣孔子對曰所謂君子者躬行忠信其心不德仁義在己而不害不知聞志廣博而色不伐思慮明達而辭不爭猶然如將可及也而不可及也如此可謂君子矣哀公曰善敢問何如斯可謂賢人矣孔子對曰所謂賢人者好惡與民同情取舍與民同統行中矩繩而不傷於本言足以法於天下而不害於其身躬為匹夫而願富貴為諸侯而無財如此則可謂賢人矣哀公曰善敢問何如斯可謂聖人矣孔子對曰所謂聖人者知通乎大道應變而不窮能測萬物之情性者也大道者所以變化而凝成萬物者也情性也者所以理然不取舍者也故其事大配乎天地參乎日月雜於雲蜺揔要萬物穆穆純純其莫之能循若天之司莫之能職百姓淡然不知其善若此則可謂聖人矣哀公曰善孔子出哀公送之哀公問於孔子第四十一哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人何足以知禮君曰否吾子言之也孔子曰丘聞之也民之所由生禮為大非禮無以節事天地之神明也非禮無以辨君臣上下長幼之位也非禮無以別男女父子兄弟之親昏姻䟽數之交也君子以此之為尊敬然然後以其所能教百姓不廢其會節有成事然後治其雕鏤文章黼黻以嗣其順之然後言其喪筭備其鼎俎設其豕腊修其宗廟歲時以敬祭祀以序宗族則安其居處醜其衣服卑其宮室車不雕幾器不刻鏤食不貳味以與民同利昔之君子之行禮者如此公曰今之君子胡莫之行也孔子曰今之君子好色無厭淫德不倦荒怠敖慢固民是盡忤其眾以伐有道求得當欲不以其所古之用民者由前今之用民者由後今之君子莫為禮也孔子侍坐於哀公哀公曰敢問人道誰為大孔子愀然作色而對曰君之及此言也百姓之德也固臣敢無辭而對人道政為大公曰敢問何謂為政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政如之何孔子對曰夫婦別父子親君臣嚴三者正則庶民從之矣公曰寡人雖無似也願聞所以行三言之道可得而聞乎孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至也大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地社稷宗廟之主君何謂已重乎公曰寡人固不固焉得聞此言乎寡人欲問不得其辭請少進孔子曰天地不合萬物不生大昏萬世之嗣也君何以謂已重焉孔子遂有言曰內以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物恥足以振之國恥足以興之為政先禮禮者其政之本與孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡三者百姓之象也身以及身子以及子配以及配君子行此三者則愾乎天下矣大王之道也如此國家順矣公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭如是則能敬其身能敬其身則能成其親矣公曰敢問何謂成親孔子對曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親之名也已孔子遂言曰古人為政愛人為大不能愛人不有其身不能有其身不能安土不能安土不能樂天不能樂天不能成身公曰敢問何謂成身孔子對曰不過乎物公曰敢問君何貴乎天道也孔子對曰貴其不已如日月西東相從而不已也是天道也不閉其久是天道也無為物成是天道也已成而明是天道也公曰寡人憃愚冥煩子識之心也孔子蹴然避席而對曰仁人不過乎物孝子不過乎物是仁人之事親也如事天事天如事親是故孝子成身公曰寡人既聞是言也無如後罪何孔子對曰君之及此言也是臣之福也禮三本第四十二禮有三本天地者性之本也先祖者類之本也君師者治之本也無天地焉生無先祖焉出無君師焉治三者偏亡無安之人故禮上事天下事地宗事先祖而寵君師是禮之三本也王者天太祖諸侯不敢懷大夫士有常宗所以別貴始德之本也郊止乎天子社止乎諸侯道及士大夫所以別尊卑尊者事尊卑者事卑宜鉅者鉅宜小者小也故有天下者事七世有國者事五世有五乘之地者事三世有三乘之地者事二世待年而食者不得立宗廟所以別積厚者流澤光積薄者流澤卑亦如之大饗尚玄尊俎生魚先大羹貴飲食之本也大饗尚玄尊而用酒食先黍稷而飯稻梁祭嚌大羹而飽乎庶羞貴本而親用也貴本之謂文親用之謂理兩者合而成文以歸太一夫是之謂大隆故尊之尚玄酒也俎之尚生魚也豆之先大羹也利雀之不卒也成事之俎不嘗也三侑之不食也一也大昏之未發齊也太廟之未納尸也始卒之未小斂一也大路車之素幭也郊之麻冕也喪服之先散帶一也三年之喪哭不反也清廟之歌一倡而三歎也縣一罄而尚拊搏朱弦而通越一也凡禮始於脫成於文終於隆故至備情文俱盡其次情文佚興其下復情以歸太一也天地以合四時以洽日月以明星辰以行江河以流萬物以倡好惡以節喜怒以當以為下則順以為上則明萬變不亂貸之則喪
