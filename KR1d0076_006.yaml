body:
  text: 大戴禮記卷第六武王踐阼第五十九武王踐阼三日召士大夫而問焉曰惡有藏之約行之行萬世可以為子孫常者乎諸大夫對曰未得聞也然後召師尚父而問焉曰黃帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣三日王端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉弗敬則不正枉者廢滅敬者萬世藏之約行之行可以為子孫常者此言之謂也且臣聞之以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世王聞書之言惕若恐懼退而為戒書於席之四端為銘焉於機為銘焉於鑑為銘焉於盥盤為銘焉於楹為銘焉於杖為銘焉於帶為銘焉於屨為銘焉於觴豆為銘焉於戶為銘焉於牖為銘焉於劍為銘焉於弓為銘焉於矛為銘焉席前左端之銘曰安樂必敬前右端之銘曰無行可悔後左端之銘曰一反一側爾不可不志後右端之銘曰所監不遠視邇所代機之銘曰皇皇惟敬口生㖃口戕口鑑之銘曰見爾前慮爾後盥盤之銘曰與其溺於人也寧溺於淵溺於淵猶可游也溺於人不可救也楹之銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長杖之銘曰惡乎危於忿疐惡乎失道於嗜欲惡乎相忘於富貴帶之銘曰火滅修容慎戒必恭恭則壽屨之銘曰慎之勞勞則富觴豆之銘曰食自杖食自杖戒之憍憍則逃戶之銘曰夫名難得而易失無勤弗志而曰我知之乎無勤弗及而曰我杖之乎擾阻以泥之若風將至必先搖搖雖有聖人不能為謀也牖之銘曰隨天之時以地之財敬祀皇天敬以先時劍之銘曰帶之以為服動必行德行德則興倍德則崩弓之銘曰屈伸之義廢興之行無忘自過矛之銘曰造矛造矛少閒弗忍終身之羞豫一人所聞以戒後世子孫衛將軍文子第六十衛將軍文子問於子贛曰吾聞夫子之施教也先以詩世道者孝悌說之以義而觀諸體成之以文德蓋受教者七十有餘人聞之孰為賢也子貢對辭以不知文子曰吾子學焉何謂不知也子貢對曰賢人無妄知賢則難故君子曰智莫難於知人此以難也文子曰若夫知賢人莫不難吾子親游焉是以敢問也子貢對曰夫子之門人蓋三千就焉賜有逮及焉有未及焉不得辨知也文子曰吾子之所及者請問其行也子貢對曰夙興夜寐諷誦崇禮行不二過稱言不苟是顏回之行也孔子說之以詩詩云媚茲一人應侯順德永言孝思孝思惟則故回一逢有德之君世受顯命不失厥名以御于天子以申之在貧如客使其臣如藉不遷怒不探怨不録舊罪是冉雍之行也孔子曰有土君子有衆使也有刑用也然後怒匹夫之怒惟以亡其身詩云靡不有初鮮克有終以告之不畏強禦不侮矜寡其言曰性都其富哉任其戎是仲由之行也夫子和之以文曰詩云受小共大共為下國恂蒙何天之寵傅奏其勇夫強乎武哉文不勝其質恭老恤孤不忘賓旅好學省物而勤是冉求之行也孔子因而語之曰好學則智恤孤則惠恭老則近禮克篤恭以天下其稱之也曰宜為國老志通而好禮擯相兩君之事篤雅其有禮節也是公西赤之行也孔子曰禮經三百可勉能也威儀三千則難也公西赤問曰何謂也孔子曰貌以擯禮禮以擯辭是之謂也主人聞之以成孔子之語人也曰當賓客之事則通矣謂門人曰二三子欲學賓客之禮者於赤也滿而不滿實如虛通之如不及先生難之博無不學其貌恭其德敦其言於人也無所不信其驕大人也常以皓皓是以眉壽是曾參之行也孔子曰孝德之始也弟德之序也信德之厚也忠德之正也參也中夫四德者矣哉以此稱之也美功不伐貴位不善不侮可侮不佚可佚不敖無告是顓孫師之行也孔子言之曰其不伐則猶可能也其不弊百姓者則仁也詩云愷悌君子民之父母夫子以其仁為大也學以深厲以斷送迎必敬上友下交銀手如斷是卜商之行也孔子曰詩云式夷式已無小人殆而商也其可謂不險也貴之不喜賤之不怒苟於民利矣廉於行己其事上也以佐其下是淡臺滅明之行也孔子曰獨貴獨富君子恥之夫也中之矣先成其慮及事而用之是故不忘是言偃之行也孔子曰欲能則學欲知則問欲善則詳欲給則豫當是如偃也得之矣獨居思仁公言言義其聞之於詩也則一日三復白圭之玷是南宮縚之行也夫子信其仁以為異姓自見孔子入戶未嘗越屨往來過人不履影開蟄不殺方長不折執親之喪未嘗見齒是高柴之行也孔子曰高柴執親之喪則難能也開蟄不殺則順天道也方長不折則恕也恕則仁也湯恭以恕是以日躋也此賜之所親睹也吾子有命而訊賜則不足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉百姓歸焉若吾子之語審茂則一諸侯之相也亦未逢明君所以不遇也子貢既與衛將軍文子言適魯見孔子曰衛將軍問二三子之行於賜也不一而三焉賜也辭不獲命以所見者對矣未知中否請嘗以告孔子曰言之子貢以其質告孔子既聞之笑曰賜汝偉為知人賜子貢對曰賜也焉能知人此賜之所親覩也孔子曰是女所親覩也吾語女耳之所未聞目之所未見思之所未至智之所未及者乎子貢曰賜則願得聞之也孔子曰不克不忌不念舊惡蓋伯夷叔齊之行也晉平公問於祁徯曰羊舌大夫晉國之良大夫也其行如何祁徯對辭曰不知也公曰吾聞女少長乎其所女其閹知之祁徯對曰其幼也恭而遜恥而不使其過宿也其為侯大夫也悉善而謙其端也其為公車尉也信而好直其功也至於其為和容也溫良而好禮博聞而時出其志也公曰嚮者問女女何曰弗知也祁徯對曰每位改變未知所止是以不知蓋羊舌大夫之行也畏天而敬人服義而行信孝乎父而恭於兄好從善而斆往蓋趙文子之行也其事君也不敢愛其死然亦不亡其身謀其身不遺其友君陳則進不陳則行而退蓋隨武子之行也其為人之淵泉也多聞而難誕也不內辭足以沒世國家有道其言足以生國家無道其默足以容蓋桐提伯華之行也外寬而內直自設於隱栝之中直己而不直人以善存亡汲汲蓋蘧伯玉之行也孝子慈幼允德稟義約貨去怨蓋柳下惠之行也其言曰君雖不量於其臣臣不可以不量於其君是故君擇臣而使之臣擇君而事之有道順命無道橫命晏平仲之行也德恭而行信終日言不在尤之內貧而樂也蓋老萊子之行也易行以俟天命居下位而不援其上觀於四方也不忘其親苟思其親不盡其樂以不能學為己終身之憂蓋介山子推之行也
