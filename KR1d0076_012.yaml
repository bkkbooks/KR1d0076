body:
  text: 大戴禮記卷第十二朝事儀第七十八古者聖王明義以別貴賤以序尊卑以體上下然後民知尊君敬上而忠順之行備矣是故古者天子之官有典命官掌諸侯之儀大行人掌諸侯之儀以等其爵故貴賤有別尊卑有序上下有差也典命掌諸侯之五儀諸臣之五等以定其爵故貴賤有別尊卑有序上下有差也命上公九命為伯其國家宮室車旌衣服禮儀皆以九為節諸侯諸伯七命其國家宮室車旌衣服禮儀皆以七為節子男五命其國家宮室車旌衣服禮儀皆以五為節王之三公八命其卿六命其大夫四命及其封也皆加一等其國家宮室車旌衣服禮儀亦如之凡諸侯之適子省於天子攝君則下其君之禮一等未省則以皮帛繼子男公之孤四命以皮帛視小國之君其卿二命其大夫再命其士一命其宮室車旌衣服禮儀各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宮室車旌衣服禮儀各如其命之數禮大行人以九儀別諸侯之命等諸臣之爵以同域國之禮而行其賓主上公之禮執桓圭九寸繅籍九寸冕服九章建常九旒樊纓九就二車九乘介九人禮九牢其朝位賓主之間九十步饗禮九獻食禮九舉諸侯之禮執信圭七寸繅籍七寸冕服七章建常七旒樊纓七就二車七乘介七人禮七牢其朝位賓主之間七十步饗禮七獻食禮七舉諸伯執躬圭其他皆如諸侯之禮諸子執穀璧五寸繅籍五寸冕服五章建常五旒樊纓五就二車五乘介五人禮五牢其朝位賓主之間五十步饗禮五獻食禮五舉諸男執蒲璧其他皆如諸子之禮凡大國之孤執帛皮以繼小國之君諸侯之卿禮各下其君二等以下及大夫士皆如之天子之所以明章著此義者以朝聘之禮是故千里之內歲一見千里之外千五百里之內二歲一見千五百里之外二千里之內三歲一見二千里之外二千五百里之內四歲一見二千五百里之外三千里之內五歲一見三千里之外三千五百里之內六歲一見各執其圭瑞服其服乘其輅建其旌旗施其樊纓從其二車委積之以其牢禮之數所以別義也然後天子冕而執鎮圭尺有二寸藻籍尺有二寸搢大圭乘大輅建大常十有二旒樊纓十有再就二車十有二乘率諸侯而朝日於東郊所以教尊尊也退而朝諸侯為壇三成宮旁一門天子南鄉見諸侯土揖庶姓時揖異姓天揖同姓所以別親疏外內也公侯伯子男各以其旗就其位諸公之國中階之前北面東上諸侯之國東階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上及其將幣也公於上等侯伯於中等子男於下等所以別貴賤序尊卑也奠圭降拜升成拜明臣禮也奉國地所出重物而獻之明臣職也肉袒入門而右以聽事也明臣禮職臣事所以教臣也率而祀天於南郊配以先祖所以教民報德不忘本也率而享祀於太廟所以教孝也與之大射以考其習禮樂而觀其德行與之圖事以觀其能儐而禮之三饗三食三宴以與之習禮樂是故一朝而近者三年遠者六年有德焉禮樂謂之益習德行謂之益修天子之命為之益行然後使諸侯世相朝交歲相問殷相聘以習禮考義正刑一德以崇天子故曰朝聘之禮者所以正君臣之義也諸侯相朝之禮各執其圭瑞服其服乘其輅建其旌旗施其樊纓從其二車委積之以其牢禮之數所以別義也介紹而相見君子於其所尊不敢質敬之至也君使大夫迎于境卿勞于道君親郊勞致館及將幣拜迎於大門外而廟受北面拜貺所以致敬也三讓而後升所以致尊讓也敬讓也者君子之所以相接也諸侯相接以敬讓則不相侵陵也此天子之所以養諸侯兵不用而諸侯自為正之具也君親致雍既還圭饗食致贈郊送所以相與習禮樂也諸侯相與習禮樂則德行修而不流也故天子制之而諸侯務焉聘禮上公七介侯伯五介子男三介所以明貴賤也介紹而傳命君子於其所尊不敢質敬之至也二讓而後傳命三讓而後入門三揖而後至階二讓而後升所以致尊讓也君使士迎于境大夫郊勞君親拜迎于大門之內而廟受北面拜貺拜君命之辱所以致敬讓也致敬讓也者君子之所以相接也故諸侯相接以敬讓則不相侵陵卿為上擯大夫為丞擯士為紹擯君親醴賓賓私面私覿致饔還圭璋賄贈饗食燕所以明賓主君臣之義也故天子之制諸侯交歲相問殷相聘相厲以禮使者聘而誤主君不親饗食所以恥厲之也諸侯相厲以禮則外不相侵內不相陵此天子所以養諸侯兵不用而諸侯自為正之具也以圭璋聘重禮也已聘而還圭璋輕財重禮之義也諸侯相厲以輕財重禮則民作讓矣主國待客出入五積既客於舍五牢之具陳於內米三十車禾三十車芻薪倍禾皆陳於外乘禽日五雙群介皆有餼牢一食再饗宴與時賜無數所以厚重禮也古之用財不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則內君臣不相陵而外不相侵故天子制之而諸侯務焉古者大行人掌大賓之禮及大客之義以親諸侯春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謀冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政時聘以結諸侯之好殷眺以除邦國之貣間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致會以補諸侯之災天子之所撫諸侯者歲遍在三歲遍眺五歲偏省七歲屬象胥喻言語計辭令九歲屬瞽史諭書名聽音聲十有一歲達瑞節同度量成牢禮同數器修法則十有二歲天子巡狩殷國是故諸侯上不敢侵陵下不敢暴小民然後諸侯之國札喪則令賻補之凶荒則令賙委之師役則令稿禬之有福事則令慶賀之有禍災則令哀弔之凡此五物者治其事故及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝欲犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國別異之天子以周知天下之故是故諸侯附於德服於義則天下太平古者天子為諸侯不行禮義不修法度不附於德不服於義故使射人以射禮選其德行職方氏大行人以其治國選其能功諸侯之得失治亂定然後明九命之賞以勸之明九伐之法以震威之尚猶有不附於德不服於義者則使掌交説之故諸侯莫不附於德服於義者此天子之所以養諸侯兵不用而諸侯自為政之具也投壺第七十九投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢峭壺請以樂賓賓曰子有旨酒嘉肴又重以樂敢辭主人曰枉矢峭壺不足辭也敢以請賓曰某賜旨酒嘉肴又重以樂敢固辭主人曰枉矢峭壺不足辭也敢固以請賓對曰某固辭不得命敢不敬從賓再拜受主人般還曰避主人阼階上再拜送賓般還曰避以拜受矢進則兩楹間退反位揖賓就筵司射進度壺反位設中執八算興請于賓曰奏投壺之令曰順投為入比投不釋算勝飲不勝者正爵既行請為勝者立馬三馬既立慶多馬請主人亦如之命弦者曰請奏貍首間若一太師曰諾左右告矢具請拾投投入者則司射坐而釋一算曰賓黨於右主黨於左卒投司射執餘算曰右左卒投請數二算為純一純以取一算為奇有勝則司射以奇算告曰某黨賢於某黨賢若干純奇則曰奇鈞則曰左右鈞舉手曰請勝者之弟子為不勝者酌酌者曰諾以酌皆請舉酒當飲者皆跪奉觗曰賜灌勝者跪曰敬養司正曰正爵既行請為勝者立馬各直其算上一馬從二馬以慶慶禮曰三馬既立請慶多馬賓主人皆曰諾正爵既行請徹馬周則復始既算算多少視其坐矢八介堂上七扶室中五扶庭下九扶算長尺二寸堂下司正司射庭長及冠士立者皆屬賓黨樂人及童子使者皆屬主黨降揖其阼階及樂事皆與射同節壺中置小豆為其矢躍而去也壺去席二矢半矢以柘若棘無去其皮大七分曾孫侯氏今日泰射于一張侯參之曰今日泰射四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽質參既設執旌既載干侯既亢中獲既置壺脰修七寸口徑二寸半壺高尺二寸受斗五升壺腹修五寸弓既平張四侯且良決拾有常既順乃讓乃揖乃讓乃隮其堂乃節其行既志乃張射夫命射射者之聲獲者之旌既獲卒莫凡雅二十六篇共八篇可歌歌鹿鳴貍首鵲巢采蘩采蘋伐檀白駒騶虞八篇廢不可歌七篇商齊可歌也三篇間歌史辟史義史見史童史謗史賓拾聲睿挾魯命弟子辭曰無荒無慠無倨立無踰言若是者有常爵嗟爾不寧侯為爾不朝于王所故亢而射女強食食爾曾孫侯氏百福
